id: aiox
name: AIOX Design System
status: active
owner_bu: aiox

source:
  type: local
  repo_root: .
  ds_root: src/components/brandbook

default_theme: main

themes:
  main:
    label: AIOX Main
    role: primary
    status: active
    description: Tema padrao lime para uso geral da BU AIOX.
    allowed_use_cases:
      - default_site
      - landing_page
      - product_page
      - calculator
      - brandbook
    forbidden_use_cases: []
    modes:
      - main
    tokens:
      primary: starter/variants/variant3/tokens.css
      files:
        - src/components/brandbook/styles/keyframes.css
        - src/components/brandbook/styles/patterns.css
        - src/components/brandbook/styles/primitives.css
        - src/components/brandbook/styles/components-lib.css
        - src/components/brandbook/styles/editorial-lib.css
      prefix: --bb-
    brandbook:
      picker_label: Lime
      edition_label: Dark Cockpit Edition
      accent_name: Kinetic Limon
      accent_hex: "#D1FF00"
      accent_rgb: "RGB 209,255,0"
      accent_cmyk: "CMYK 20,0,100,0"
      accent_text_color: "var(--bb-dark)"
      live_badge_color: "var(--bb-accent)"
      legacy_ids:
        - lime
    patterns:
      - pattern-crosshair-grid
      - pattern-dot-grid
      - pattern-circuit-board
    notes: ""

  secondary:
    label: AIOX Secondary
    role: secondary
    status: restricted
    description: Tema secundario para contextos premium, eventos seletivos e comunicacao especial.
    allowed_use_cases:
      - premium_offer
      - premium_event
      - executive_presentation
    forbidden_use_cases:
      - default_site
      - evergreen_landing
      - operational_ui
    modes:
      - secondary
    tokens:
      primary: starter/variants/variant3/tokens.css
      files:
        - src/components/brandbook/styles/keyframes.css
        - src/components/brandbook/styles/patterns.css
        - src/components/brandbook/styles/primitives.css
        - src/components/brandbook/styles/components-lib.css
        - src/components/brandbook/styles/editorial-lib.css
      prefix: --bb-
    brandbook:
      picker_label: Gold
      edition_label: Golden Guideline Edition
      accent_name: AIOX Gold
      accent_hex: "#DDD1BB"
      accent_rgb: "RGB 221,209,187"
      accent_cmyk: "CMYK 0,5,15,13"
      accent_text_color: "var(--bb-dark)"
      live_badge_color: "#DDD1BB"
      legacy_ids:
        - gold
    patterns:
      - frame-bracket
      - pattern-glow-center
    notes: Nao usar como default.

apps:
  - id: aiox-design-starter
    root: .
    theme: main
    framework: next.js
    ui_primitives: radix-ui
    components_root: src/components
    component_dirs:
      atoms: brandbook/atoms
      molecules: brandbook/molecules
      organisms: brandbook/organisms
      chrome: brandbook/chrome
      patterns: brandbook-sections/patterns
      motion: brandbook-sections/motion
      pages: brandbook/pages
      ui: ui
    hooks_dir: src/components/brandbook/hooks
    blueprint_files:
      - src/components/brandbook/pages/lp-sections-page.tsx
      - src/components/brandbook/pages/editorial-page.tsx
    token_files:
      - starter/variants/variant3/tokens.css
      - src/components/brandbook/styles/keyframes.css
      - src/components/brandbook/styles/patterns.css
      - src/components/brandbook/styles/primitives.css
      - src/components/brandbook/styles/components-lib.css
      - src/components/brandbook/styles/editorial-lib.css
    data_dir: src/components/brandbook/data
    app_dir: src/app
    notes: Preset local AIOX do starter. Nao depende de workspace bridge.

governance:
  requires_explicit_approval_for_theme_override: true
  fallback_theme: main
  validation_rules:
    - source_must_exist
    - source_type_must_be_local_or_external
    - source_repo_root_must_exist
    - source_ds_root_must_exist
    - default_theme_must_exist
    - secondary_cannot_be_default
    - app_theme_must_exist
    - declared_paths_must_exist
    - missing_config_means_ds_not_configured
