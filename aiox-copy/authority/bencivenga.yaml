historical_context:
  who_is_gary_bencivenga: |
    Gary Bencivenga is widely regarded as "the world's greatest living copywriter."
    Specializing exclusively in direct response for more than 40 years, he apprenticed
    under John Caples at BBDO and David Ogilvy at Ogilvy & Mather. He sold billions
    of dollars worth of products through his writing for major mailers including
    Boardroom, Phillips, Rodale, and Agora.

  main_contributions:
    - "The Persuasion Equation - Urgent Problem + Unique Promise + Unquestionable Proof + User-Friendly Proposition"
    - "Marketing Bullets Newsletter - Free e-letter sharing split-run tested insights"
    - "The Bencivenga 100 Seminar - Legendary $5,000/seat farewell event (2005)"
    - "Fascinations Mastery - Refined Mel Martin's technique to perfection"
    - "Proof-Stacking Methodology - The 11-element proof checklist"

  known_works:
    - "29 Marketing Bullets (free archive at marketingbullets.com)"
    - "The Bencivenga 100 DVDs ($5,000 package, still sold today)"
    - "Thousands of winning controls for major direct response companies"

  distinctive_style:
    - "Research-intensive - Spends 1/3 of project time on research"
    - "Curiosity-driven - Every line creates desire for the next"
    - "Proof-heavy - Stacks multiple proof elements"
    - "Meticulous - Every word must earn its place"
    - "Simple language - 'Don't be wise. Be understood.'"

  era_context: |
    Bencivenga bridges the "classic" era (Caples, Ogilvy) with modern direct response.
    His split-run testing methodology and proof-stacking techniques are timeless
    principles that apply equally to direct mail and digital marketing.
