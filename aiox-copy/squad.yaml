# DEPENDENCIES & TAGS
# ═══════════════════════════════════════════════════════════════════════════════
dependencies:
  - aiox-core
  # Future: mmos (when integration is enabled)

tags:
  - copywriting
  - marketing
  - sales
  - direct-response
  - conversion
  - tier-system
  - research-first

workspace_integration:
  level: workspace_first
  rationale: >-
    Copy squad must bootstrap from workspace domain governance and templates
    before executing workflows, ensuring context-first copy decisions and
    reproducible setup from zero.
  readiness_owner: coo-orchestrator
  readiness_resolver: squads/c-level/scripts/resolve-squad-workspace-readiness.cjs
  read_paths:
    - workspace/domains/content/
    - workspace/domains/brand/
    - workspace/_templates/product-offerbook/
    - workspace/_templates/product-narrative/
    - workspace/_templates/sales-process/
    - workspace/businesses/
  write_paths:
    - workspace/businesses/
    - outputs/copy/
  template_namespace: product-offerbook
  canonical_outputs_root: workspace/businesses/{business}/copy/{campaign_slug}/
  delivery_outputs_root: outputs/copy/{business}/
  legacy_projects_root: squads/copy/projects/
  bootstrap:
    required: true
    script: "scripts/bootstrap-copy-workspace.sh"
  essentials_validation:
    required: true
    script: "scripts/validate-copy-essentials.sh"

# ═══════════════════════════════════════════════════════════════════════════════
# YOLO MODE - Autonomous Workflow Execution (v2.0)
# ═══════════════════════════════════════════════════════════════════════════════
yolo_mode:
  enabled: true
  version: "2.0.0"
  description: "100% autonomous workflow execution with phase-based checkpoints"

  # Execution Settings
  execution:
    auto_mode: true                     # true = no pauses at checkpoints
    max_iterations: 30                  # Maximum loop iterations per run
    iteration_delay_seconds: 2          # Pause between iterations
    checkpoint_human_review: false      # Pause for human review at checkpoints
    workspace_preflight_required: true  # run bootstrap + essentials validator

  # Script Configuration
  script:
    entry_point: "scripts/copy.sh"
    usage: "./copy.sh <project-dir> [max-iterations]"
    workspace_bootstrap: "scripts/bootstrap-copy-workspace.sh"
    workspace_validator: "scripts/validate-copy-essentials.sh"
    skip_preflight_env: "COPY_SKIP_WORKSPACE_CHECK=1"

  # File Structure
  paths:
    workflows: "workflows/"
    templates: "templates/"
    projects: "outputs/copy/"
    legacy_projects: "squads/copy/projects/"
    outputs: "outputs/copy/"
    workspace: "workspace/"

  # State Management
  state:
    file: "copy-state.json"
    template: "templates/copy-state.json"
    tracked_fields:
      - project
      - workflow_id
      - current_phase
      - tasks_completed
      - artifacts
      - checkpoints
      - decision_matrix
      - agents_used
      - iteration_history

  # Progress Logging
  progress:
    file: "progress.txt"
    template: "templates/progress-copy.txt"
    sections:
      - "Project Info"
      - "Phase Progress"
      - "Artifacts Generated"
      - "Clone Combinations Used"
      - "Session Log"

  # Handoff Context
  handoff:
    file: "handoff.md"
    required_sections:
      - "Estado Atual"
      - "Context Mínimo"
      - "Erros a Evitar"
      - "Arquivos Tocados"
      - "Próxima Story"

  # Completion Signals (recognized by copy.sh)
  signals:
    complete: "<promise>COMPLETE</promise>"
    checkpoint: "<promise>CHECKPOINT:PHASE-X</promise>"
    blocked: "<promise>BLOCKED:reason</promise>"
    pattern_complete: "<promise>COMPLETE</promise>"
    pattern_checkpoint: "CHECKPOINT:PHASE-[0-9]+"
    pattern_blocked: "BLOCKED:[^<]+"

  # Default Workflow Selection
  default_workflow: "wf-1-full-launch"

  # Available Workflows
  workflows:
    - id: wf-1-full-launch
      name: "Full Product Launch"
      duration: "5-7 days"
      description: "Canonical campaign workflow for complete launches with full copy asset coverage"
      file: "workflows/wf-1-full-launch.yaml"
      phases: 5
      recommended_for:
        - "New product launches"
        - "Complete funnel builds"
        - "High-budget campaigns"

    - id: wf-2-paid-traffic
      name: "Paid Traffic Campaign"
      duration: "2-3 days"
      description: "Canonical campaign workflow for paid traffic and landing page execution"
      file: "workflows/wf-2-paid-traffic.yaml"
      phases: 3
      recommended_for:
        - "Facebook/Google ads"
        - "Quick traffic tests"
        - "Existing products"

    - id: wf-3-high-ticket
      name: "High-Ticket Sales"
      duration: "7-10 days"
      description: "Canonical campaign workflow for premium $5k+ offers with sales calls"
      file: "workflows/wf-3-high-ticket.yaml"
      phases: 4
      recommended_for:
        - "Coaching/consulting"
        - "Premium programs"
        - "B2B sales"

    - id: wf-4-organic-content
      name: "Organic Content System"
      duration: "Ongoing"
      description: "Blocked reference outline pending canonical rebuild"
      file: "workflows/wf-4-organic-content.yaml"
      phases: 6
      recommended_for:
        - "Brand building"
