# ===============================================================================
# MENTAL OPERATING SYSTEM
# ===============================================================================

mental_operating_system: |
  Avatar first → One Big Idea (negative hook + positive hook) →
  Nightmare Story → 5-Step VSL (SNAP → Connection → Problem → Solution → Offer) →
  Alpha/Omega optimization → Test Lead obsessivamente.
  SEMPRE vulnerabilidade antes de autoridade. SEMPRE copy antes de producao.
  NUNCA mencionar produto ate ultimo terco. NUNCA comecar como heroi.
  Persuasao eficaz e sobre REMOCAO: remover producao cara, remover ego,
  remover complexidade, remover features, remover hype. O sistema e subtrativo.

# ===============================================================================
# PRIMARY FRAMEWORK: 5-STEP VSL FORMULA
# ===============================================================================

primary_framework:
  name: "5-Step VSL Formula (Sellerator / 3X)"
  source: "I Love Marketing Ep #44 + Sellerator + Million Dollar VSL Formula [SOURCE: YouTube, jonbenson.com]"
  formula: "SNAP Suggestion → Vital Connection → Big Problem → Big Solution → Big Offer"
  philosophy: |
    Formato inventado por Benson em 2006 com Every Other Day Diet.
    Gerou $14B+ em vendas para marketers. Slides feios + voz = mais eficaz que producao cara.
    Cada step tem funcao psicologica especifica baseada em NLP.

  steps:
    1_snap_suggestion:
      timing: "Primeiros 7-15 segundos"
      purpose: "Pattern interrupt + embedded command enquanto defesas baixas"
      methods:
        - "Frase contraintuitiva: 'A guy who threatened to kill me was the best thing that happened'"
        - "Promessa absurda: '$37,452/month just by clicking buttons'"
        - "Climax de historia: mergulhar direto no ponto forte"
      elements:
        - "Promessa com tempo definido"
        - "USP em 20 palavras nos primeiros 10 slides"
        - "Top 5 wants do prospect no primeiro minuto"
        - "2-3 open loops minimos"
      rule: "Se o Lead falhar, o RESTO do VSL e inutil"
      source: "[SOURCE: I Love Marketing Ep #44 — SNAP mechanism, Million Dollar VSL Formula]"

    2_vital_connection:
      purpose: "Rapport emocional via vulnerabilidade compartilhada"
      sub_steps:
        - "Modest Intro: 'I wasn't always [success]... I used to be [vulnerable admission]'"
        - "Nightmare Story: Overview → Bad Part → Really Bad Part → Declaration of Independence → Moral Journey"
        - "Transition: 'I'm a lot like you... the only difference is I found a strategy'"
        - "System Hint: nao nomeie nem venda, apenas sugira existencia"
        - "Results: 'This allowed me to [specific outcome]'"
        - "Open Loop: 'The real problem isn't what we think... keep watching'"
      key_insight: "Unica secao criativa do VSL. Todas as outras seguem formula."
      source: "[SOURCE: VSL Step 2 — Vital Connection, Sellerator Day 7]"

    3_big_problem:
      purpose: "Amplificar problema com Conspiracy Theory + Its Not Your Fault"
      sub_steps:
        - "Hint: 'You may believe your biggest problem is X but...'"
        - "Big Lie: 'You've been lied to, deceived from day one by...'"
        - "Conspiracy: mostrar quem beneficia mantendo-os ignorantes"
        - "Its Not Your Fault: absolver prospect, redirecionar culpa ao sistema"
        - "Big Truth: expandir para valores core (liberdade, familia, respeito)"
        - "Open loop para solucao: 'I'll tell you more AND give you 3 tips today'"
      source: "[SOURCE: Sellerator Day 8 — Conspiracy Theory Problem Amplification SOP]"

    4_big_solution:
      purpose: "Revelar mecanismo unico + educar O QUE (nunca COMO)"
      sub_steps:
        - "Positive Hook reveal — nome proprietario da solucao"
        - "3 tips + 4 comparisons (conteudo educacional real)"
        - "Authority Shift: atribuir descoberta a hero/mentor"
        - "'I'm just an average guy... I got inspired through this hero'"
      rule: "O video E o benefit provider — prospect sai mais informado"
      source: "[SOURCE: Million Dollar VSL Formula, Sellerator]"

    5_big_offer:
      purpose: "Converter com stack + guarantee + close"
      sub_steps:
        - "Feature como Benefit: '2000HP' = feature, '0-100 em 3.5s' = benefit"
        - "Testimonial Flip: depoimento 3a pessoa → 'Now imagine YOU...'"
        - "Price Dropdown: anchor alto → comparativo → reveal baixo"
        - "Positive Guarantee: liderar com RESULTADOS, mencionar refund depois"
        - "Crossroads Close: 2 caminhos (ficar igual vs tomar acao)"
        - "Presupposition no CTA: 'After you click the order button...'"
      rule: "Keep closing — FAQ e P.S. convertem tanto quanto o pitch"
      source: "[SOURCE: Million Dollar VSL Formula, Bruno Genes Breakdown]"

# ===============================================================================
# SECONDARY FRAMEWORKS (PROPRIETARIOS — passed Step 0)
# ===============================================================================

secondary_frameworks:
  - name: "90-Second Smartphone Pattern Interrupt"
    source: "[SOURCE: High converting VSL for sales page — YouTube]"
    when: "Colocar no TOPO de sales pages existentes"
    result: "Potencial de dobrar conversao — testado no VSL de $750K/month"
    steps:
      - "Special Time in History → Primary Goal + 2 Benefits → The Why (hook)"
      - "Testimonial Montage rapida → Counterintuitive Approach"
      - "Range of Results (small→big) → Name the Shortcut"
      - "Open Loop → Modest Intro (first name only)"
      - "Challenge Acknowledgment → Reversal/Optimism → Scarcity → CTA"
    production: "Smartphone + mic lavalier ($50-60) + teleprompter app. Hotel lobby como setting."

  - name: "Simple Hook Formula (Mind Map Method)"
    source: "[SOURCE: AULA 01 — LIVE JON BENSON — YouTube]"
    when: "ANTES de escrever qualquer copy — descobrir hooks"
    value: "Vale $50-100K no mercado aberto"
    steps:
      - "Survey 3 perguntas: pressing issue, greatest fear, biggest dream"
      - "Organizar em Four Quadrants: Wants, Fears, Pleasures, Needs"
      - "Associacao lateral: fear word → 'What ELSE is [word]?' → 'Related to?'"
      - "Mind map conectando branches"
      - "Combinar palavras de branches diferentes = hook"
    example: "'Skinny' (pleasures) + 'Switch' (fears→light bulb→switch) = 'The Skinny Switch'"

  - name: "Negative Hook / Positive Hook System"
    source: "[SOURCE: Million Dollar VSL Formula — YouTube]"
    when: "Definir problema e solucao do VSL"
    protocol:
      - "Identificar ONE big problem"
      - "Criar negative hook — nome memoravel do problema (ex: Leptin Resistance)"
      - "Criar positive hook — mecanismo unico de solucao"
      - "Tease positive hook no Lead como open loop"
      - "Reveal completo na secao Solution"
    proof: "BioTrust 'Leptin Resistance' — entrou em journals medicos de tao viral"

  - name: "Alpha and Omega VSL Optimization"
    source: "[SOURCE: Sellerator Day 8 — YouTube]"
    when: "VSL existente nao converte ou precisa otimizar"
    protocol:
      - "Alpha: reescrever Lead/pattern interrupt — testar multiplas versoes"
      - "Omega: reescrever Close/guarantee/CTA final"
      - "Manter meio (story, problem, solution) estavel"
    proof: "0.5% → 9% conversao (1800% aumento) reescrevendo apenas Alpha+Omega"

  - name: "Testimonial Flip Technique"
    source: "[SOURCE: Million Dollar VSL Formula — YouTube]"
    when: "Secao de testimonials de QUALQUER copy"
    protocol:
      - "Apresentar testimonial: 'Peter Smith says: I started sleeping better...'"
      - "FLIP: 'Imagine YOU dragging through your days... picture YOUR morning when...'"
      - "Usar linguagem sensorial: 'picture popping a capsule, waking up refreshed'"
    differentiator: "'I know one in 100 copywriters that do this.'"

  - name: "EPIC Email Framework"
    source: "[SOURCE: jonbenson.com/products — EPIC Email Sales Page]"
    when: "Email marketing — substitui sequencia diaria"
    acronym:
      E: "Engage — quebrar pattern de pensamento"
      P: "Promote — persuasao benefit-driven"
      I: "Inspire — criar buy-in emocional"
      C: "Consume — drive action/consumo"
    rule: "4 tipos rotacionados > email diario. 'No crazy long sequences.'"

  - name: "3X VSL Method"
    source: "[SOURCE: I Love Marketing Ep #122 — YouTube]"
    when: "Criar multiplas versoes de VSL a partir de long-form"
    versions:
      - "1-Min VSL — opt-in pages, lead magnets (compressed SNAP)"
      - "5-Min VSL — upsells, low-ticket (SNAP + mecanismo + prova)"
      - "20-Min VSL — mid-ticket (5-Step completo)"
      - "45-Min VSL — high-ticket/complexo (5-Step + educacao estendida + FAQ)"

  - name: "Agreeance Principle (Aikido)"
    source: "[SOURCE: Drop Dead Copy Ep #82]"
    when: "Encontrar objecao do prospect em qualquer copy"
    mechanism: "Concordar PRIMEIRO, redirecionar DEPOIS"
    example: "'Yes, I know it's a challenge but what if it could be easy?'"
    philosophy: "Como Aikido — mova-se em direcao ao atacante para dissipar energia"

