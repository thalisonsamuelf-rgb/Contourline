# ═══════════════════════════════════════════════════════════════════════════════
# TAG TAXONOMY — Reference for gap detection matching
# ═══════════════════════════════════════════════════════════════════════════════

tag_taxonomy:
  channel:
    - email          # Email sequences, nurture, daily emails
    - vsl            # Video sales letters
    - sales-page     # Long-form sales pages
    - launch         # Product launches (PLF)
    - ads            # Paid ads (Facebook, Google, display)
    - webinar        # Webinar scripts
    - social         # Social media, threads, newsletters
    - magalog        # Magalogs, subscription mail
    - infomercial    # TV/DRTV copy
    - cohort         # Cohort/workshop launches
    - direct-mail    # Physical direct mail
    - funnel         # Funnel copy (multi-step)

  type:
    - template       # Output structure/format
    - checklist      # Quality validation
    - workflow       # Multi-phase process
    - sop            # Standard operating procedure

  domain:
    - persuasion     # General persuasion techniques
    - structure      # Copy structure/format
    - hooks          # Headlines, hooks, pattern interrupts
    - proof          # Social proof, authority, data
    - urgency        # Scarcity, deadlines, FOMO
    - story          # Storytelling, narrative
    - mechanism      # Unique mechanism, Big Idea
    - brand          # Brand building + DR
    - testing        # A/B testing, control-beating
    - personality    # Voice, personality-driven copy

# ═══════════════════════════════════════════════════════════════════════════════
# GAP DETECTION RULES — Used by Copy Chief during production
# ═══════════════════════════════════════════════════════════════════════════════

gap_detection:
  trigger: "During copy production, when Copy Chief routes to an agent"
  check: "Does a template/checklist exist for this channel+type combination?"
  lookup_path: "squads/copy/{templates|checklists|workflows}/"
  match_by: "tags intersection with briefing channel + copy type"

  on_gap_found:
    action: |
      1. Log gap: "Missing {type} for {channel}: {artifact_id}"
      2. Lookup capability map: which agent can create this?
      3. After delivery, suggest: "Detectei que não existe {name}.
         {agent} tem {N} frameworks relevantes ({framework_list}).
         Quer que eu gere baseado no KB dele?"
    priority: "Suggest after delivery — never interrupt production flow"

  on_user_approve:
    action: "Execute tasks/create-artifact-from-kb.md"
