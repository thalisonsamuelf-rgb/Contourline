# Tags follow the pattern: {dimension}:{value}
#   channel: email | vsl | sales-page | launch | ads | webinar | social | magalog | infomercial | cohort | direct-mail | funnel
#   type: template | checklist | workflow | sop
#   phase: briefing | diagnostic | creation | review | qa | delivery
#   domain: persuasion | structure | hooks | proof | urgency | story | mechanism | brand | testing

