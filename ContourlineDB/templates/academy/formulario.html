{% extends "base.html" %}
{% block title %}Novo Aluno - Contourline DB{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px;">
    <a href="{{ url_for('academy_lista') }}" class="btn btn-sm btn-outline-secondary mb-3">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>

    <div class="form-container">
        <h4 class="mb-4">Novo Aluno Academy</h4>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Nome *</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Telefone</label>
                    <input type="text" name="telefone" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Curso *</label>
                    <input type="text" name="curso" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Cliente</label>
                    <select name="cliente_id" class="form-select">
                        <option value="">Nenhum</option>
                        {% for c in clientes %}
                        <option value="{{ c.id }}">{{ c.razao_social }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Observacoes</label>
                    <textarea name="observacoes" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Cadastrar Aluno
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
