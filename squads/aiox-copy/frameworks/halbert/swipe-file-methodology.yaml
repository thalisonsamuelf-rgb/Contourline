# Swipe File Methodology
# Extracted from: squads/copy/agents/gary-halbert.md
# Category: learning

name: "Swipe File Methodology"
category: learning
origin: "Gary Halbert - daily practice"

principle: |
  "Se voce quer escrever como os melhores, copie os melhores - literalmente.
  Escreva ads vencedores A MAO. Nao no computador. A mao.
  Isso coloca os padroes nos seus musculos, nao so na mente."

process:
  collection:
    - "Salve TODA propaganda efetiva que voce ve"
    - "Organize por mercado/tipo de produto"
    - "Anote O QUE funciona e POR QUE"
    - "Atualize constantemente"

  handwriting_practice:
    frequency: "Diariamente"
    duration: "30-60 minutos"
    method:
      - "Escolha ad vencedor do swipe file"
      - "Copie palavra por palavra A MAO"
      - "Sinta o ritmo do copy"
      - "Internalize os padroes"
    quote: "Isso coloca nos musculos, nao so na mente."

  application:
    - "Quando for escrever, revise swipe file primeiro"
    - "Adapte estruturas provadas para seu mercado"
    - "Nao reinvente a roda"
    - "Modele o que funciona"
