# ═══════════════════════════════════════════════════════════════════════════
# OPTIMIZATION MODE (quando VSL ja roda)
# ═══════════════════════════════════════════════════════════════════════════
optimization_mode:
  description: |
    Quando a VSL ja esta rodando e precisa de otimizacao, usar o
    SOP de diagnostico (vsl-diagnostic-optimization-sop.md) em vez
    de recriar do zero. O workflow se adapta:

  entry_point: "Phase 0 (load context) → SOP Diagnostic → Fix/Scale"

  diagnostic_matrix:
    retencao_alta_conversao_alta: "ESCALAR (Phase 5: metricas + criativos)"
    retencao_baixa_conversao_ok: "FORMATO ruim → mudar formato, manter copy (Phase 3: T-3.2)"
    retencao_alta_conversao_baixa: "COPY ruim → reescrever copy, manter formato (Phase 3: T-3.1)"
    retencao_baixa_conversao_baixa: "VSL nova → reiniciar Phase 2"

  priority_order:
    1: "Formato (maior ROI — case: 2X com mesma copy)"
    2: "Lead (testar 3-5 novas leads)"
    3: "Coerencia criativo-VSL"
    4: "Upsell (formato + headline)"
    5: "Checkout (limpar bumps)"
    6: "Copy (so se formato validado)"
    7: "Order bump (30 dias off, 30 dias on)"

# ═══════════════════════════════════════════════════════════════════════════
# AGENT ROLES
# ═══════════════════════════════════════════════════════════════════════════
agent_roles:
  copy-chief:
    specialty: "Orquestracao, niche qualification, funnel architecture, quality gates"
    applies_to: [PHASE-0, PHASE-1, PHASE-5, PHASE-6]
    key_framework: "Tier System + SOP Framework @thiagoroas"

  eugene-schwartz:
    specialty: "Awareness levels, market sophistication, belief mapping"
    applies_to: [PHASE-2]
    key_framework: "5 Levels of Awareness + 5 Stages of Sophistication"

  todd-brown:
    specialty: "Unique Mechanism, Big Idea, E5 Method"
    applies_to: [PHASE-2]
    key_framework: "E5 Method + Positioning Architecture 4 layers"

  jon-benson:
    specialty: "VSL structure, micro videos, leads, format, post-pitch page"
    applies_to: [PHASE-3, PHASE-5]
    key_framework: "3X Formula + Micro Video Architecture"

  dan-kennedy:
    specialty: "Urgency, commitment escalation, upsell/downsell, DR principles"
    applies_to: [PHASE-4]
    key_framework: "3Ms + PIX-aware copy + Cost Cap"

  claude-hopkins:
    specialty: "Scientific audit, testing, validation"
    applies_to: [PHASE-6]
    key_framework: "Scientific Advertising + Audit Checklist"

  joe-sugarman:
    type: "TOOL (not clone)"
    specialty: "30 Psychological Triggers Checklist"
    applies_to: [PHASE-6]
    note: "30 triggers, NOT 31. Applied AFTER copy written, BEFORE delivery."

