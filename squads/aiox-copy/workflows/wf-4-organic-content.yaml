workflow:
  id: wf-4-organic-content
  name: Organic Content Creation Pipeline
  duration: 5-8 days
  description: |
    Content-first workflow for building audience through valuable organic content.
    Designed for thought leadership, newsletter growth, and SEO-driven traffic.
    Uses Robert Collier's letter writing, Gary Halbert's storytelling, and
    David Ogilvy's editorial excellence for high-engagement content.
  target_output:
    - Blog posts (SEO-optimized)
    - Newsletter series
    - Social media content
    - LinkedIn articles
    - Email sequences (value-first)
  key_agents:
    primary:
      - robert-collier
      - gary-halbert
      - david-ogilvy
    secondary:
      - joe-sugarman
      - ben-settle
  status: blocked_pending_rebuild
  blocked_reason: This workflow references tasks that do not exist in the current squad and must be rebuilt on the canonical content campaign model before use
  governance_target_model: Campaign Brief -> Message Architecture -> Creative Brief -> Asset Brief -> Copy Deck -> Review Gates
  execution_mode: reference_only_until_rebuild
  type: blocked-reference-playbook
  sequence:
    - step: phase-1
      id: phase-1
      phase: 1
      phase_name: Content Strategy & Research
      agent: david-ogilvy
      action: execute_define-content-pillars-understand-audience-conversation
      next: phase-2
    - step: phase-2
      id: phase-2
      phase: 2
      phase_name: Content Architecture
      agent: robert-collier
      action: execute_create-content-pillars-topic-clusters-and-editorial-calendar
      next: phase-3
    - step: phase-3
      id: phase-3
      phase: 3
      phase_name: Long-Form Content Creation
      agent: david-ogilvy
      action: execute_create-flagship-content-blog-posts-articles-guides
      next: phase-4
    - step: phase-4
      id: phase-4
      phase: 4
      phase_name: Social Content Adaptation
      agent: joe-sugarman
      action: execute_repurpose-long-form-content-into-social-formats
      next: phase-5
    - step: phase-5
      id: phase-5
      phase: 5
      phase_name: Email Integration
      agent: ben-settle
      action: execute_create-value-first-email-sequences-that-support-content-distribu
      next: phase-6
    - step: phase-6
      id: phase-6
      phase: 6
      phase_name: Quality Assurance & Polish
      agent: david-ogilvy
      action: execute_final-review-seo-optimization-and-content-polish
    - workflow_end:
        id: complete
        action: workflow_complete
  handoff_prompts:
    david-ogilvy_to_robert-collier: Handoff context from david-ogilvy to robert-collier. Preserve outputs, risks, and open decisions.
    robert-collier_to_david-ogilvy: Handoff context from robert-collier to david-ogilvy. Preserve outputs, risks, and open decisions.
    david-ogilvy_to_joe-sugarman: Handoff context from david-ogilvy to joe-sugarman. Preserve outputs, risks, and open decisions.
    joe-sugarman_to_ben-settle: Handoff context from joe-sugarman to ben-settle. Preserve outputs, risks, and open decisions.
    ben-settle_to_david-ogilvy: Handoff context from ben-settle to david-ogilvy. Preserve outputs, risks, and open decisions.
phases:
  - id: PHASE-1
    name: Content Strategy & Research
    day: 1
    tier: 0
    description: |
      Define content pillars, understand audience conversation,
      and create editorial calendar foundation.
    tasks:
      - reference_task: copysearch.md
        agent: david-ogilvy
        required: true
        focus: Research audience, content gaps, competitor content
        output: Content research brief
      - reference_task: create-avatar.md
        agent: copy-chief
        required: true
        focus: Reader avatar for content consumption
        output: Content reader profile
    checkpoint:
      criteria:
        - AUDIENCE research complete
        - CONTENT GAPS identified
        - READER AVATAR defined
      human_review: false
      message: Research complete. Proceeding to content architecture.
  - id: PHASE-2
    name: Content Architecture
    day: 2
    tier: 1
    description: |
      Create content pillars, topic clusters, and editorial calendar.
      Apply Robert Collier's "entering the conversation" principle.
    tasks:
      - reference_task: create-content-pillars.md
        agent: robert-collier
        required: true
        focus: Define 3-5 content pillars based on audience conversation
        output: Content pillars document
      - reference_task: create-content-calendar.md
        agent: copy-chief
        required: true
        focus: 30-day content calendar
        output: Editorial calendar
    checkpoint:
      criteria:
        - CONTENT PILLARS defined (3-5)
        - TOPIC CLUSTERS mapped
        - EDITORIAL CALENDAR created
      human_review: true
      message: Review content strategy before production begins.
  - id: PHASE-3
    name: Long-Form Content Creation
    day: 3-4
    tier: 2
    description: |
      Create flagship content: blog posts, articles, guides.
      Apply David Ogilvy's "the more you tell, the more you sell" and
      Gary Halbert's storytelling for engagement.
    tasks:
      - reference_task: create-blog-post.md
        agent: david-ogilvy
        required: true
        focus: Research-based, editorial long-form content
        output: 2-3 flagship blog posts
      - reference_task: create-newsletter.md
        agent: gary-halbert
        required: true
        focus: Story-driven newsletter series
        output: 4-week newsletter series
      - reference_task: create-article.md
        agent: robert-collier
        required: false
        focus: LinkedIn articles, industry publications
        output: 2 LinkedIn articles
    checkpoint:
      criteria:
        - BLOG POSTS written (2-3)
        - NEWSLETTER SERIES complete (4 editions)
        - ARTICLES drafted
      human_review: true
      message: Review long-form content before social adaptation.
  - id: PHASE-4
    name: Social Content Adaptation
    day: 5
    tier: 3
    description: |
      Repurpose long-form content into social formats.
      Apply Joe Sugarman's slippery slide for scroll-stopping hooks.
    tasks:
      - reference_task: create-social-content.md
        agent: joe-sugarman
        required: true
        focus: Hook-driven social posts from long-form content
        output: Social content batch
      - reference_task: create-carousel.md
        agent: gary-halbert
        required: false
        focus: Story-based carousels for LinkedIn/Instagram
        output: 4 carousels
      - reference_task: create-threads.md
        agent: robert-collier
        required: false
        focus: Twitter/X threads from blog posts
        output: 4 threads
    checkpoint:
      criteria:
        - SOCIAL POSTS created
        - CAROUSELS designed (if applicable)
        - THREADS written (if applicable)
      human_review: false
      message: Social content ready. Proceeding to email integration.
  - id: PHASE-5
    name: Email Integration
    day: 6
    tier: 4
    description: |
      Create value-first email sequences that support content distribution.
      Apply Ramit Sethi's email philosophy.
    tasks:
      - reference_task: create-welcome-sequence.md
        agent: ben-settle
        required: true
        focus: Value-first welcome sequence for new subscribers
        output: 5-email welcome sequence
      - reference_task: create-email-sequence.md
        agent: gary-halbert
        required: true
        focus: Content nurture sequence
        output: 7-email nurture sequence
    checkpoint:
      criteria:
        - WELCOME SEQUENCE complete
        - NURTURE SEQUENCE complete
        - SEQUENCES aligned with content pillars
      human_review: true
      message: Review email sequences before final QA.
  - id: PHASE-6
    name: Quality Assurance & Polish
    day: 7-8
    tier: 5
    description: |
      Final review, SEO optimization, and content polish.
      Apply David Ogilvy's editorial standards.
    tasks:
      - reference_task: review-content.md
        agent: david-ogilvy
        required: true
        focus: Editorial review for clarity and quality
        output: Review notes and edits
      - reference_task: optimize-seo.md
        agent: copy-chief
        required: true
        focus: SEO optimization for all content
        output: SEO-optimized content
      - reference_task: create-content-brief.md
        agent: copy-chief
        required: true
        focus: Distribution and promotion brief
        output: Content launch brief
    checkpoint:
      criteria:
        - ALL content reviewed
        - SEO optimization complete
        - CONTENT LAUNCH BRIEF ready
      human_review: true
      message: Final review before content launch.
outputs:
  flagship_content:
    - 2-3 SEO-optimized blog posts
    - 2 LinkedIn articles
    - 4-week newsletter series
  social_content:
    - Social post batch (20+ posts)
    - 4 carousels
    - 4 threads
  email_sequences:
    - 5-email welcome sequence
    - 7-email nurture sequence
  documentation:
    - Content pillars document
    - 30-day editorial calendar
    - Content launch brief
completion_signal: <promise>COMPLETE</promise>
checkpoint_signal: <promise>CHECKPOINT:PHASE-X</promise>
blocked_signal: <promise>BLOCKED:T-X.Y</promise>
automation:
  state_file: copy-state.json
  progress_file: progress.txt
  handoff_file: handoff.md
agent_roles:
  robert-collier:
    specialty: Entering the reader's conversation
    applies_to:
      - Content pillars (audience conversation)
      - LinkedIn articles
      - Twitter threads
    key_framework: Six Essentials of Letter Writing
  gary-halbert:
    specialty: Story-driven content that builds relationship
    applies_to:
      - Newsletter series
      - Carousels
      - Nurture sequences
    key_framework: A-Pile Letter Method
  david-ogilvy:
    specialty: Research-based, editorial excellence
    applies_to:
      - Blog posts
      - Content research
      - Editorial review
    key_framework: 38 Principles + Long Copy Doctrine
  joe-sugarman:
    specialty: Hooks and slippery slide engagement
    applies_to:
      - Social content hooks
      - First lines
      - Scroll-stopping content
    key_framework: Slippery Slide + Psychological Triggers
  ben-settle:
    specialty: Value-first email philosophy, daily email mastery
    applies_to:
      - Welcome sequence
      - Email strategy
      - Daily emails
    key_framework: Email Players Method
quality_gates:
  content_standards:
    - All content passes editorial review
    - SEO optimization complete
    - Brand voice consistency across all pieces
    - CTAs aligned with content goals
  engagement_markers:
    - Hooks optimized for attention
    - Stories integrated for connection
    - Value delivery before any ask
  technical_requirements:
    - All links functional
    - Meta descriptions complete
    - Images/graphics specified
    - Mobile-friendly formatting
metadata:
  version: "1.0"
  framework: copy-framework-v2
  created: "2026-01-23"
  story_id: US-006
  primary_use_case: Thought leadership and audience building
  secondary_use_cases:
    - Newsletter growth
    - SEO traffic generation
    - LinkedIn presence building
    - Email list nurturing
