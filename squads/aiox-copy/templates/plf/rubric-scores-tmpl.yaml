# ═══════════════════════════════════════════════════════════════════════════════
# RUBRIC SCORES — CPL {{cpl_number}}
# ═══════════════════════════════════════════════════════════════════════════════
#
# Generated by: wf-evaluate-cpl v2.0
# Source: Production Aid Section 8 (Self-Assessment Rubric)
# Analyzed: {{analysis_date}}
#
# Scale: 1 (Weak) → 3 (Solid) → 5 (Exceptional)
# Minimum Viable: All dimensions >= 3
# Launch-Winning: Most dimensions 4-5, none below 3
#
# ═══════════════════════════════════════════════════════════════════════════════

metadata:
  cpl_number: {{cpl_number}}
  cpl_type: "{{cpl_type}}"
  transcript_file: "{{transcript_file}}"
  production_aid: "{{production_aid_file}}"
  rubric_section: "Section 8 — Self-Assessment Rubric"
  analysis_date: "{{analysis_date}}"

# ═══════════════════════════════════════════════════════════════════════════════
# SUMMARY
# ═══════════════════════════════════════════════════════════════════════════════
summary:
  total_dimensions: {{total_dimensions}}
  dimensions_scored: {{dimensions_scored}}

  scores:
    raw_average: {{raw_average}}          # Simple average of all scores
    weighted_average: {{weighted_average}} # With dimension weights applied
    converted_score: {{converted_score}}   # 0-10 scale (weighted * 2)

  distribution:
    exceptional_5: {{count_5}}
    good_4: {{count_4}}
    solid_3: {{count_3}}
    below_average_2: {{count_2}}
    weak_1: {{count_1}}

  status:
    minimum_viable_met: {{minimum_viable}}  # All >= 3
    launch_winning: {{launch_winning}}       # Most 4-5, none < 3
    critical_dimensions_passed: {{critical_passed}}

  veto_conditions:
    any_dimension_1: {{any_score_1}}
    critical_dimension_below_3: {{critical_below_3}}
    veto_triggered: {{veto_triggered}}
    veto_reason: "{{veto_reason}}"

# ═══════════════════════════════════════════════════════════════════════════════
# DIMENSION SCORES
# ═══════════════════════════════════════════════════════════════════════════════
dimensions:

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 1: Empathy
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "empathy"
    name: "Empathy"
    weight: 1.0
    critical: false

    score: {{empathy_score}}
    weighted_score: {{empathy_weighted}}

    rubric:
      weak_1: "Generic opening, no sign of understanding their world"
      solid_3: "Addresses their situation specifically, uses their language"
      exceptional_5: "Viewer feels 'they're inside my head' within first 60 seconds"

    evidence:
      quote: |
        "{{empathy_quote}}"
      line_reference: {{empathy_line}}

    justification: |
      {{empathy_justification}}

    gap_to_next_level:
      current_level: {{empathy_current_level}}
      next_level: {{empathy_next_level}}
      gap: |
        {{empathy_gap}}
      specific_improvement: |
        {{empathy_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 2: Opportunity Clarity
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "opportunity_clarity"
    name: "Opportunity Clarity"
    weight: 1.2
    critical: true

    score: {{opportunity_score}}
    weighted_score: {{opportunity_weighted}}

    rubric:
      weak_1: "Vague promises, abstract benefits"
      solid_3: "Clear transformation stated, 'after' picture is visible"
      exceptional_5: "Vivid, multi-dimensional 'after' picture that creates genuine desire"

    evidence:
      quote: |
        "{{opportunity_quote}}"
      line_reference: {{opportunity_line}}

    justification: |
      {{opportunity_justification}}

    gap_to_next_level:
      current_level: {{opportunity_current_level}}
      next_level: {{opportunity_next_level}}
      gap: |
        {{opportunity_gap}}
      specific_improvement: |
        {{opportunity_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 3: Positioning
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "positioning"
    name: "Positioning"
    weight: 1.0
    critical: false

    score: {{positioning_score}}
    weighted_score: {{positioning_weighted}}

    rubric:
      weak_1: "Credentials listed, no story"
      solid_3: "Story-based credentials with some vulnerability"
      exceptional_5: "Empathy → story → credentials → bridge sequence executed perfectly"

    evidence:
      quote: |
        "{{positioning_quote}}"
      line_reference: {{positioning_line}}

    justification: |
      {{positioning_justification}}

    gap_to_next_level:
      current_level: {{positioning_current_level}}
      next_level: {{positioning_next_level}}
      gap: |
        {{positioning_gap}}
      specific_improvement: |
        {{positioning_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 4: Teaching Value
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "teaching_value"
    name: "Teaching Value"
    weight: 1.2
    critical: true

    score: {{teaching_score}}
    weighted_score: {{teaching_weighted}}

    rubric:
      weak_1: "Teaser only, nothing actionable"
      solid_3: "One useful insight or framework they can apply"
      exceptional_5: "Genuinely valuable content that could generate results on its own"

    evidence:
      quote: |
        "{{teaching_quote}}"
      line_reference: {{teaching_line}}

    justification: |
      {{teaching_justification}}

    gap_to_next_level:
      current_level: {{teaching_current_level}}
      next_level: {{teaching_next_level}}
      gap: |
        {{teaching_gap}}
      specific_improvement: |
        {{teaching_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 5: Objection Handling
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "objection_handling"
    name: "Objection Handling"
    weight: 0.8
    critical: false

    score: {{objection_score}}
    weighted_score: {{objection_weighted}}

    rubric:
      weak_1: "Ignored or glossed over"
      solid_3: "1-2 objections raised and partially addressed"
      exceptional_5: "Top objections raised with honest, specific responses or strategic promises"

    evidence:
      quote: |
        "{{objection_quote}}"
      line_reference: {{objection_line}}

    justification: |
      {{objection_justification}}

    gap_to_next_level:
      current_level: {{objection_current_level}}
      next_level: {{objection_next_level}}
      gap: |
        {{objection_gap}}
      specific_improvement: |
        {{objection_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 6: Anticipation
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "anticipation"
    name: "Anticipation"
    weight: 1.0
    critical: true

    score: {{anticipation_score}}
    weighted_score: {{anticipation_weighted}}

    rubric:
      weak_1: "No foreshadow or generic 'stay tuned'"
      solid_3: "Specific tease of next content"
      exceptional_5: "Tease creates genuine desire to see next video immediately"

    evidence:
      quote: |
        "{{anticipation_quote}}"
      line_reference: {{anticipation_line}}

    justification: |
      {{anticipation_justification}}

    gap_to_next_level:
      current_level: {{anticipation_current_level}}
      next_level: {{anticipation_next_level}}
      gap: |
        {{anticipation_gap}}
      specific_improvement: |
        {{anticipation_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 7: CTA
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "cta"
    name: "CTA"
    weight: 0.8
    critical: false

    score: {{cta_score}}
    weighted_score: {{cta_weighted}}

    rubric:
      weak_1: "Generic 'leave a comment'"
      solid_3: "Specific question that's easy to answer"
      exceptional_5: "Emotionally engaging prompt that generates quality comments and self-revelation"

    evidence:
      quote: |
        "{{cta_quote}}"
      line_reference: {{cta_line}}

    justification: |
      {{cta_justification}}

    gap_to_next_level:
      current_level: {{cta_current_level}}
      next_level: {{cta_next_level}}
      gap: |
        {{cta_gap}}
      specific_improvement: |
        {{cta_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 8: Zero Pitch
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "zero_pitch"
    name: "Zero Pitch"
    weight: 1.5
    critical: true

    score: {{zero_pitch_score}}
    weighted_score: {{zero_pitch_weighted}}

    rubric:
      weak_1: "Product/price/offer mentioned or implied"
      solid_3: "No explicit pitch but some 'salesy' energy leaks through"
      exceptional_5: "Completely educational/inspirational — zero hint of selling"

    evidence:
      quote: |
        "{{zero_pitch_quote}}"
      line_reference: {{zero_pitch_line}}

    justification: |
      {{zero_pitch_justification}}

    # Special handling for this dimension
    pitch_detected:
      any_product_mention: {{product_mentioned}}
      price_mentioned: {{price_mentioned}}
      offer_mentioned: {{offer_mentioned}}
      salesy_language:
        {{#each salesy_language}}
        - "{{this}}"
        {{/each}}

    gap_to_next_level:
      current_level: {{zero_pitch_current_level}}
      next_level: {{zero_pitch_next_level}}
      gap: |
        {{zero_pitch_gap}}
      specific_improvement: |
        {{zero_pitch_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 9: Emotional Arc
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "emotional_arc"
    name: "Emotional Arc"
    weight: 1.0
    critical: false

    score: {{emotional_arc_score}}
    weighted_score: {{emotional_arc_weighted}}

    rubric:
      weak_1: "Flat energy throughout"
      solid_3: "Some emotional variation across beats"
      exceptional_5: "Clear arc: recognition → respect → hope → surprise → trust → anticipation"

    evidence:
      quote: |
        "{{emotional_arc_quote}}"
      line_reference: {{emotional_arc_line}}

    justification: |
      {{emotional_arc_justification}}

    # Emotional arc mapping
    arc_analysis:
      expected_arc:
        - "Recognition (being seen)"
        - "Respect/curiosity"
        - "Hope/excitement"
        - "Surprise/gratitude (teaching)"
        - "Trust/relief"
        - "Anticipation/desire"
        - "Engagement/commitment"

      actual_arc:
        {{#each actual_emotional_arc}}
        - beat: "{{this.beat}}"
          emotion: "{{this.emotion}}"
          intensity: {{this.intensity}}
        {{/each}}

      arc_completeness: {{arc_completeness}}

    gap_to_next_level:
      current_level: {{emotional_arc_current_level}}
      next_level: {{emotional_arc_next_level}}
      gap: |
        {{emotional_arc_gap}}
      specific_improvement: |
        {{emotional_arc_improvement}}

  # ─────────────────────────────────────────────────────────────────────────────
  # Dimension 10: Rewatchability
  # ─────────────────────────────────────────────────────────────────────────────
  - id: "rewatchability"
    name: "Rewatchability"
    weight: 0.5
    critical: false

    score: {{rewatchability_score}}
    weighted_score: {{rewatchability_weighted}}

    rubric:
      weak_1: "One-and-done content"
      solid_3: "Good enough to recommend to a friend"
      exceptional_5: "So valuable that viewers share it unprompted and reference it later"

    evidence:
      quote: |
        "{{rewatchability_quote}}"
      line_reference: {{rewatchability_line}}

    justification: |
      {{rewatchability_justification}}

    # Rewatchability factors
    factors:
      memorable_frameworks:
        {{#each memorable_frameworks}}
        - "{{this}}"
        {{/each}}
      quotable_moments:
        {{#each quotable_moments}}
        - "{{this}}"
        {{/each}}
      unique_insights:
        {{#each unique_insights}}
        - "{{this}}"
        {{/each}}

    gap_to_next_level:
      current_level: {{rewatchability_current_level}}
      next_level: {{rewatchability_next_level}}
      gap: |
        {{rewatchability_gap}}
      specific_improvement: |
        {{rewatchability_improvement}}

# ═══════════════════════════════════════════════════════════════════════════════
# SCORE CALCULATIONS
# ═══════════════════════════════════════════════════════════════════════════════
calculations:
  dimension_scores:
    - {id: "empathy", score: {{empathy_score}}, weight: 1.0, weighted: {{empathy_weighted}}}
    - {id: "opportunity_clarity", score: {{opportunity_score}}, weight: 1.2, weighted: {{opportunity_weighted}}}
    - {id: "positioning", score: {{positioning_score}}, weight: 1.0, weighted: {{positioning_weighted}}}
    - {id: "teaching_value", score: {{teaching_score}}, weight: 1.2, weighted: {{teaching_weighted}}}
    - {id: "objection_handling", score: {{objection_score}}, weight: 0.8, weighted: {{objection_weighted}}}
    - {id: "anticipation", score: {{anticipation_score}}, weight: 1.0, weighted: {{anticipation_weighted}}}
    - {id: "cta", score: {{cta_score}}, weight: 0.8, weighted: {{cta_weighted}}}
    - {id: "zero_pitch", score: {{zero_pitch_score}}, weight: 1.5, weighted: {{zero_pitch_weighted}}}
    - {id: "emotional_arc", score: {{emotional_arc_score}}, weight: 1.0, weighted: {{emotional_arc_weighted}}}
    - {id: "rewatchability", score: {{rewatchability_score}}, weight: 0.5, weighted: {{rewatchability_weighted}}}

  totals:
    sum_of_weights: {{sum_weights}}
    sum_of_weighted_scores: {{sum_weighted_scores}}
    weighted_average: {{weighted_average}}
    final_score_0_10: {{final_score}}

# ═══════════════════════════════════════════════════════════════════════════════
# PRIORITY IMPROVEMENTS
# ═══════════════════════════════════════════════════════════════════════════════
priority_improvements:
  critical_gaps:
    {{#each critical_gaps}}
    - dimension: "{{this.name}}"
      current_score: {{this.score}}
      target_score: {{this.target}}
      priority: {{this.priority}}
      action: |
        {{this.action}}
    {{/each}}

  quick_wins:
    {{#each quick_wins}}
    - dimension: "{{this.name}}"
      current_score: {{this.score}}
      effort: "{{this.effort}}"
      action: |
        {{this.action}}
    {{/each}}

  high_impact:
    {{#each high_impact}}
    - dimension: "{{this.name}}"
      current_score: {{this.score}}
      weight: {{this.weight}}
      potential_gain: {{this.potential_gain}}
      action: |
        {{this.action}}
    {{/each}}
