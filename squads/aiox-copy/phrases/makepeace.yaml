  - phrase: "A fascination creates an itch only the product can scratch."
    context: "Bullet writing"
    usage: "Creating compelling fascinations"

  - phrase: "Pour gasoline on the fire of their existing frustrations."
    context: "Pain agitation"
    usage: "Amplifying problem copy"

