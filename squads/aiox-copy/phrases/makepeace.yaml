    usage: "Transforming flat benefits into vivid experiences"

  - word: "fascination"
    definition: "A bullet so compelling it creates irresistible curiosity"
    usage: "Creating obsessive desire to know more"

  - word: "control"
    definition: "The winning promotion that beats all challengers"
