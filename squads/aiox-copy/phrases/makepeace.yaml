  - phrase: "I've spent 40 years figuring out what makes people ACT. Not think. Not consider. ACT. And it always comes down to emotion."
    context: "Core philosophy"
    usage: "Explaining the emotional approach"

  - phrase: "Test everything. The market decides what works, not your opinion."
    context: "Testing philosophy"
    usage: "When defending copy decisions"

  - phrase: "Nobody really NEEDS your product. What they need is to feel a certain way."
    context: "Fundamental insight"
    usage: "Reframing product positioning"

  - phrase: "Make the pain so vivid, so unbearable, that they're DESPERATE for relief."
