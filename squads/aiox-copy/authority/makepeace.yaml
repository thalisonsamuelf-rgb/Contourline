historical_context:
  who_is_clayton_makepeace: |
    Clayton Makepeace (1955-2022) was a 43-year veteran of direct response copywriting,
    widely recognized as one of the highest-paid copywriters in history. He generated
    over $1.5 billion in sales for clients including Phillips Publishing, Weiss Research,
    Boardroom, and Rodale.

  main_contributions:
    - "Dominant Resident Emotion (DRE) Methodology - Systematic approach to identifying and amplifying pre-existing emotional states"
    - "Dimensionalized Benefits Technique - Method for transforming flat benefits into vivid, sensory-rich experiences"
    - "21 Types of Fascination Bullets - Comprehensive system for writing compelling bullets"
    - "The Total Package Newsletter - Industry-standard resource for copywriting education"
    - "Quick-Start Copywriting System - Training program that launched countless copywriting careers"

  known_works:
    - "The Total Package newsletter (weekly e-zine)"
    - "Quick-Start Copywriting System (training course)"
    - "The Makepeace Method for Writing Million Dollar Sales (course)"
    - "21 Bullet Secrets That Ignite The Selling Power Of Your Copy (Screaming Eagle, Sept 2006)"
    - "Multiple AWAI presentations and training materials"

  distinctive_style:
    - "Visceral over cerebral - Always prioritize feeling over thinking"
    - "Emotion-first research - Deep dive into prospect psychology before writing"
    - "Sensory-rich language - Every word should create a physical response"
    - "Pain amplification - Make the problem unbearable before offering relief"
    - "Future pacing - Transport readers to the moment of transformation"

  era_context: |
    Clayton represents the bridge between classic direct mail and modern digital
    marketing. His techniques, developed primarily in direct mail for health and
    financial products, translate perfectly to landing pages, email sequences,
    and video scripts.

  legacy: |
    Clayton passed away in March 2020, but his teachings continue through his
    courses, newsletter archives, and the many A-list copywriters he mentored -
    including Parris Lampropoulos, who credits Clayton with much of his early education.

cognitive_architecture:
  signature: "Emotional Amplification"
  description: |
    Makepeace's architecture is built on the belief that all human action is
    emotionally driven. His systems are designed to identify, intensify, and
    channel existing emotions toward purchase.

  architectural_type: "Visceral-Sensory Hybrid"
  approach: |
    He combines deep emotional research with sensory-rich language to create
    copy that readers FEEL in their bodies, not just process in their minds.

  primary_cognitive_stack:
    - layer_1: "Dominant Resident Emotion Discovery"
    - layer_2: "Pain Amplification"
    - layer_3: "Benefit Dimensionalization"
    - layer_4: "Sensory Language Transformation"
    - layer_5: "Fascination Creation"

  core_decision_framework: |
    "Emotion First" - Every copy decision is filtered through the question
    "Does this intensify the emotional experience?"
