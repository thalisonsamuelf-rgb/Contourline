structural_gaps:
  - area: swipe
    gap: swipe.sh initializes a broader category set than the committed swipe corpus currently populates.
    impact: Tooling contract is broader than the library actually available to operators.
  - area: swipe
    gap: Swipe assets are still mostly isolated behind swipe.sh and not first-class inputs to the mainline copy tasks.
    impact: Good material exists, but much of it is not leveraged by the core execution path.
  - area: docs_frameworks
    gap: Some framework docs are still tooling-oriented summaries rather than canonical operator guidance.
    impact: They should remain supporting references, not primary workflow truth.
  - area: projects
    gap: Most project artifacts are design-memory or migration residue, not runtime knowledge.
    impact: Useful historically, but dangerous if confused with current truth.

