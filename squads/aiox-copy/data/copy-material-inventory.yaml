metadata:
  id: copy-material-inventory
  version: "2.0"
  updated_at: "2026-03-10"
  purpose: >
    Canonical inventory for 100% of the squad copy document families. Every file
    must be classified as active, integrate_next, or archive so the squad knows
    what truly governs execution.

status_definitions:
  active: Material is part of current operations, runtime, workflows, tasks, agents, or specialized tooling.
  integrate_next: Material has clear value but is not wired strongly enough into execution yet.
  archive: Material is historical, duplicative, or too disconnected to justify active guidance.

governance_rules:
  - README, chief, runtime, workflows, and registry should expose only active materials by default.
  - integrate_next materials belong in backlog and targeted hardening waves.
  - archive materials must not masquerade as live operator guidance.
  - if a file cannot justify one of the three statuses, it is governance drift.

