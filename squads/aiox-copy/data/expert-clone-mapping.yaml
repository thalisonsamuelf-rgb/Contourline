# ════════════════════════════════════════════════════════════════════════════════
# DETECTION RULES
# ════════════════════════════════════════════════════════════════════════════════

detection:
  process:
    1: "Scan briefing for exact name matches"
    2: "Check product name matches"
    3: "Look for high-confidence keywords"
    4: "If no match → check medium-confidence keywords"
    5: "If still no match → ask user"

  confidence_thresholds:
    auto_load: "high (exact name or product match)"
    suggest: "medium (keyword match)"
    ask: "low (no clear match)"

  fallback_prompt: |
    Não consegui identificar automaticamente qual expert deve ser o autor.

    Clones disponíveis:
    - José Carlos Amorim (cohort-based, AI, Nexialismo)
    - Alan Nicolas (AI development, automation)
    - [Copywriters: Gary Halbert, Dan Kennedy, etc.]

    Qual clone devo carregar para esta copy?

