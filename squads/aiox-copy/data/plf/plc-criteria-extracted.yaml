# =============================================================================
# FUNDAMENTAL PRINCIPLES
# =============================================================================
fundamental_principles:
  the_secret_that_makes_it_work:
    title: "What REALLY makes PLF work"
    principle: |
      It's not psychological tricks - it's DELIVERING MASSIVE VALUE.

      - Don't give everything away for free or cater to freebie-seekers
      - Give real content that creates real value for people
      - Don't just provoke - give substance
      - Teach about the opportunity in CPL #1, but go BEYOND the opportunity
      - Each CPL should deliver content people can actually use

    quote: |
      "Your success will be directly proportional to the amount of value
      you create in the world."

  the_process_is_the_equalizer:
    principle: |
      "Success doesn't depend on you being a talented copywriter or master
      salesman. PLF is something like an equalizer in the marketing world.
      It's the process that allows people who are NOT ninja marketers to
      build a super-effective sales process."

  launch_conversation:
    principle: |
      Each CPL should be posted on a blog with space for comments.
      By asking for comments and responding:
      - Monologue → dialogue
      - Real-time insight about objections
      - Social proof (others seeing the excitement)
      - Instant community
      - Allows adjusting messaging in real time
      - Walker uses exact language from comments in subsequent CPLs

  the_fear_of_giving_too_much:
    myth: "If I give too much away, they won't need to buy"
    reality: |
      "The mistake I see far more often is NOT giving away enough
      high-quality content."

      If you sell in the premium segment (like Barry, charging $2,000),
      the best way to attract high-end clients is to deliver MASSIVE
      free value upfront.

      Walker taught the ENTIRE Seed Launch concept in ~18 minutes in
      CPL #2. People actually DID Seed Launches from that free video.
      And they STILL bought the full program.

