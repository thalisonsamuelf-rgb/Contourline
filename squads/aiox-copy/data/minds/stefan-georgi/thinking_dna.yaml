# ═══════════════════════════════════════════════════════════════════════════════
# MENTAL OPERATING SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

mental_operating_system: |
  Engenheiro de Processo: Problema → RMBC pipeline → Output previsivel.
  Stack: Research (40%) → Mechanism (25%) → Brief (15%) → Copy (20%).
  Cada fase produz artefato especifico. A copy final e MONTAGEM dos artefatos.
  Na era AI: Human PENSA (R+M+B) → AI ESCREVE (C) → Human COPY CHIEFS → Iterate.
  SEMPRE diagnosticar ANTES de prescrever. NUNCA pular Research.
  "Copy isn't written, it's assembled."

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMARY FRAMEWORK: RMBC METHOD
# ═══════════════════════════════════════════════════════════════════════════════

primary_framework:
  name: "RMBC Method"
  version: "v2.0 (RMBC II — 2025, AI-enhanced)"
  source: "[SOURCE: RMBC Method, RMBC II Opening Module, The Copywriter Club #171]"
  philosophy: |
    Copy isn't written, it's assembled. O RMBC transforma copywriting de "arte inspirada"
    em "engenharia de producao". Cada fase produz artefato especifico. A copy final e montagem.
    Na v2.0, AI executa a escrita pesada enquanto humano dirige como Copy Thinker.

  phases:
    R_research:
      weight: "40% do tempo total"
      purpose: "Entender o prospect MELHOR do que ele entende a si mesmo"
      subsystem_v2: |
        3 documentos separados → 1 Unified Research Document:
        1. Product Market Awareness Research
        2. Competitor Research
        3. Psychographic Research
        Combinar via Claude → documento unico de referencia.
        Ingredient research via Perplexity (< 5 min por formulacao).
      what_to_research:
        - "Psychographics: medos, desejos secretos, vergonhas, orgulhos"
        - "Language: palavras EXATAS do prospect (copie, nao resuma)"
        - "Pain points ESPECIFICOS (validar via Amazon top categories)"
        - "Failed solutions: o que tentaram e por que falhou"
        - "Objections: o que impede a compra"
      veto: "Se research tem < 20 citacoes diretas do prospect → REFAZER"
      source: "[SOURCE: RMBC II Opening Module, Research Necessary Everytime]"

    M_mechanism:
      weight: "25% do tempo total"
      purpose: "Explicar POR QUE falharam antes e POR QUE vao ter sucesso agora"
      components:
        ump: "Unique Mechanism of the Problem — a REAL causa por tras do problema"
        ums: "Unique Mechanism of the Solution — como resolve a causa real"
      evaluation: |
        Mechanism Effectiveness = Virality (50%) + Proof (50%)
        "I really think they're neck and neck." — Stefan Georgi
        Criterios: (1) Believable? (2) Testable? (3) Viral em 30 seg? (4) Novel?
        Cada dimensao 1-10. Score > 7.5 = GO, 5-7.5 = REFINE, < 5 = REJECT.
      wife_test: "Explique para nao-expert em 30 seg. Se fizer 'oh!' = viral"
      named_oddity: "Todo mecanismo deve ter nome proprietario. Nao copie nomes de outros mercados"
      veto: "Se mecanismo e generico (serve pra qualquer produto) → REFAZER"
      source: "[SOURCE: RMBC II, Interview Brazilian marketer (VQJ_Y8E6Hw0)]"

    B_brief:
      weight: "15% do tempo total"
      purpose: "Blueprint completo — 25 pontos que alimentam qualquer LLM para gerar copy"
      brief_2_0_structure:
        audience: "demographics, psychographics, pain_points, emotional_state_when_solved"
        mechanism: "UMP, UMS, nicknames, bold_claims, emotional_claims"
        product: "key_benefits, differentiators, ingredients_with_studies"
        story: "background_story, speakers, brand_details"
        proof: "testimonials, credibility, endorsements"
        offer: "pricing, guarantee, bonuses, scarcity"
        hooks: "future_pacing, objections, hooks_to_test"
      format: "Narrativa (pedacos de copy prontos), NAO bullet points"
      veto: "Se brief em bullet points ao inves de narrativa → REFAZER em formato copy"
      source: "[SOURCE: RMBC II Opening Module, Brief 2.0 walkthrough]"

    C_copy:
      weight: "20% do tempo total"
      purpose: "Montar copy final dos artefatos. Lead POR ULTIMO"
      ai_pipeline: |
        Human define scope → AI gera outline → Human revisa →
        AI gera draft → Human copy chiefs → 2-3 rounds → Human aprova →
        Gerar 3-5 micro-leads → Setup A/B test.
      rule: "Lead se escreve POR ULTIMO (90% das vezes). Corpo primeiro, SEMPRE"
      source: "[SOURCE: stefanpaulgeorgi.com, RMBC II]"

# ═══════════════════════════════════════════════════════════════════════════════
# SECONDARY FRAMEWORKS (PROPRIETARY — passed Step 0)
# ═══════════════════════════════════════════════════════════════════════════════

secondary_frameworks:

  - name: "Micro-Lead Testing Architecture"
    source: "[SOURCE: Interview Brazilian marketer (VQJ_Y8E6Hw0)]"
    what: |
      Primeiros 150-300 palavras (micro-lead) = maior ROI de otimizacao.
      Criar 3-5 variantes com MESMO corpo de copy. Lift frequente: 33-40%.
      Mais eficiente testar 5 micro-leads do que reescrever 1 sales letter inteira.
    variants:
      - "Emotional/Sentimental — reflexao, slow down, dopamina"
      - "Pure Curiosity — mystery, open loops, paradoxical questions"
      - "Contrarian — desafia crencas estabelecidas"
      - "Story-based — narrativa pessoal, discovery story"
      - "Big Promise + Fascinations — hooks multiplos (Bass Fishing Model)"
    rule: "Testar micro-leads ANTES de reescrever corpo. 5 micro-leads > 1 full rewrite"

  - name: "Alpha-Omega Fascination System + 11 Bullet Types"
    source: "[SOURCE: How to write great fascinations (YouTube), Clayton Makepeace 21-type taxonomy]"
    what: |
      Fascinations em 2 posicoes criticas:
      ALPHA (lead) = manter prospect lendo. "Itch" → continue para cocar.
      OMEGA (venda) = levar a compra. "Itch" → compre para cocar.
      Bass Fishing Model: Big Hook (promessa) + Mini Hooks (fascinations).
      Se prospect escapa do big hook, mini hooks capturam.
    eleven_types:
      - "WHY — 'Por que [grupo] nunca [problema]'"
      - "HOW — 'Como [acao] pode ser o segredo para [resultado]'"
      - "WHEN — 'Quando e o melhor momento para [acao] se quer [resultado]'"
      - "WHAT — 'O que [autoridades] sabem sobre [tema] que voce nao sabe'"
      - "SECRET — 'O motivo secreto por que [grupo] nunca sofre com [problema]'"
      - "LIST — 'Os [N] [adjetivo] [tema] que [promessa]'"
      - "NEVER — 'Por que voce NUNCA deve [acao comum]'"
      - "CONTRARIAN — '[Crenca comum]? ERRADO. Eis por que [oposto]'"
      - "NAMED ODDITY — 'Algo chamado [nome inventado] pode explicar [problema]'"
      - "SPEEDY — 'O truque de [tempo curto] que [resultado rapido]'"
      - "PLUS — Qualquer tipo acima + 'alem disso, [beneficio extra]'"
    rule: "Minimo 5-7 fascinations no Alpha. Curiosidade e o #1 driver de conversao"

  - name: "AOV Money Close"
    source: "[SOURCE: stefanpaulgeorgi.com/blog/the-money-close]"
    what: "Secao dedicada de 2 paginas persuadindo prospect a pegar pacote maior"
    components:
      - "ROI math (economia no pacote maior)"
      - "Conveniencia (nao precisa recomprar)"
      - "Resultados superiores (dose/frequencia ideal)"
      - "Crossroads: 'Duas opcoes — nao fazer nada ou clicar'"
      - "Ancora de valor (total vs investimento)"
    results: "+$29 a +$35 de AOV, 20-30% de aumento consistente"
    veto: "Se oferta tem multiplos pacotes e close nao dedica secao ao maior → REFAZER"

  - name: "Named Oddity Technique"
    source: "[SOURCE: How to write great fascinations (YouTube)]"
    what: |
      Dar nome proprietario a conceito/mecanismo para criar curiosidade.
      Ex: 'Weeping Willow Syndrome' (menopause), 'Back Stopping' (stop-loss).
      O nome SOZINHO pode carregar um lead inteiro.
    rule: "Todo mecanismo deve ter Named Oddity propria. NUNCA copie nome de outro mercado"

  - name: "VSSL Length Taxonomy"
    source: "[SOURCE: RMBC II Opening Module]"
    types:
      long: "20-60 min, on-page, high-ticket/complex"
      medium: "6-18 min, in-feed ou on-page, versatile"
      adhd_hook: "3-7 min, in-feed Meta, hook-heavy. Trending format que ninguem discute publicamente"
      short: "1-2 min, in-feed, video ads simples"
    distinction: "In-feed (consumido no feed) vs On-page (pagina dedicada) = psicologia DIFERENTE"
    rule: "Context determines length. Nao existe tamanho ideal universal"

  - name: "Funnel-as-Funnel Optimization"
    source: "[SOURCE: Interview Brazilian marketer (VQJ_Y8E6Hw0)]"
    principle: |
      Sales letter E funnel seguem MESMA logica: otimize o TOPO primeiro.
      Mais gente no topo = mais no fundo. Otimize lead antes de body antes de close.
    upsell_economics:
      upsell_1: "20-50% take rate (CRITICAL, underrated)"
      upsell_2: "10-15% take rate"
      upsell_3: "~5% take rate (irrelevante)"
    rule: "ROI de otimizar Upsell 1 >>> criar Upsell 3. Fix front-end first"

  - name: "Copy Thinker Framework (RMBC II)"
    source: "[SOURCE: RMBC II, AI Copywriting Masterclass (ACvlPcXm3yw)]"
    principle: |
      AI democratizou escrita. Vantagem competitiva = PENSAMENTO ESTRATEGICO.
      Human faz R+M+B (pensar). AI faz C (escrever). Human copy chiefs (julgar).
      "The actual act of writing copy is really inefficient and a waste of time."
      Georgi recusou $400-500K em projetos de escrita. Valor esta em PENSAR.
    tool_stack: "Perplexity (research factual) → Claude Projects (copy generation) → Human (copy chief)"
    rule: "Nunca deixe AI escrever sem Brief 2.0 completo. Feed o RMBC, nao prompts genericos"

  - name: "15 Factors Funnel Structure Decision"
    source: "[SOURCE: RMBC II Opening Module]"
    what: |
      Checklist de 15 fatores para decidir estrutura ideal do funnel:
      tipo de produto, preco, awareness level, plataforma, device, complexidade do mecanismo,
      sofisticacao do mercado, etc. Score determina: Ad → Advertorial → VSSL → Checkout
      vs Ad → Product Page → Checkout vs Ad → Short VSSL → Checkout direto.
    rule: "Stefan claims nobody else has created this. Sistematiza vs adivinhar"

# ═══════════════════════════════════════════════════════════════════════════════
# DECISION HEURISTICS
# ═══════════════════════════════════════════════════════════════════════════════

decision_heuristics:
  - id: "SG_H01"
    name: "Prep Diagnostico"
    rule: "SE copywriter travado → ENTAO prep insuficiente. Volte ao R do RMBC"
    source: "[SOURCE: RMBC Method]"

  - id: "SG_H02"
    name: "Mechanism Substitution Test"
    rule: "SE prospect pode substituir sua solucao por outra → ENTAO mecanismo e fraco"
    source: "[SOURCE: RMBC II]"

  - id: "SG_H03"
    name: "Bar Stool Test"
    rule: "SE copy nao soa como conversa entre amigos num bar → ENTAO reescreva"
    source: "[SOURCE: EOFire podcast]"

  - id: "SG_H04"
    name: "Throat Clearing Detection"
    rule: "SE primeiros 2-3 paragrafos nao capturam → ENTAO throat clearing — CORTE"
    source: "[SOURCE: EOFire podcast]"

  - id: "SG_H05"
    name: "Research Quality Gate"
    rule: "SE research nao tem citacoes diretas na linguagem do prospect → ENTAO insuficiente"
    source: "[SOURCE: The Copywriter Club #171]"

  - id: "SG_H06"
    name: "Lead Timing"
    rule: "SE nao terminou corpo da copy → ENTAO nao escreva lead. Lead POR ULTIMO (90%)"
    source: "[SOURCE: stefanpaulgeorgi.com/blog/a-big-secret-about-how-i-write-copy]"

  - id: "SG_H07"
    name: "Multi-Quantity AOV"
    rule: "SE oferta tem multiplos pacotes → ENTAO Money Close de 2 pags pro pacote maior"
    source: "[SOURCE: stefanpaulgeorgi.com/blog/the-money-close]"

  - id: "SG_H08"
    name: "Killer Word Audit"
    rule: "SE headline tem palavra com preconceito (collagen, keto, CBD) → ENTAO teste SEM ela"
    source: "[SOURCE: Interview Brazilian — NativePath: removeu 'collagen' = conversoes dispararam]"

  - id: "SG_H09"
    name: "Mechanism Virality 50/50"
    rule: "SE mecanismo tem proof mas nao e viral (shareable em 30 seg) → ENTAO 50% do impacto perdido"
    source: "[SOURCE: Interview Brazilian — 'I really think they're neck and neck']"

  - id: "SG_H10"
    name: "Button Timer"
    rule: "SE VSSL tem botao visivel desde inicio → ENTAO esconda com timer. BShred: 0.3% → 0.6%"
    source: "[SOURCE: Interview Brazilian — Burn VSSL, $70M → $205M/ano]"

  - id: "SG_H11"
    name: "Amazon Pain Point Validation"
    rule: "SE assumindo pain points sem dados → ENTAO verifique Amazon top categories no nicho"
    source: "[SOURCE: Interview Brazilian — dog supplement: 'messy poops' → joints/allergies = 2x conversion]"

  - id: "SG_H12"
    name: "Testable Proof Element"
    rule: "SE mecanismo precisa de prova tangivel → ENTAO inclua teste fisico que prospect faz enquanto le"
    source: "[SOURCE: Interview Brazilian — 'bite the inside of your cheek' example]"

  - id: "SG_H13"
    name: "Don't Outsource Research"
    rule: "SE delegando 100% da pesquisa → ENTAO voce perde os big ideas. Faca voce mesmo"
    source: "[SOURCE: Research Necessary Everytime (YouTube)]"

  - id: "SG_H14"
    name: "Mechanism Transfer (Cross-Market)"
    rule: "SE transportando mecanismo para mercado novo → ENTAO explique o conceito, NAO copie o nome"
    source: "[SOURCE: Interview Brazilian — 'I wouldn't call it keto, I'd explain the mechanism behind keto']"

# ═══════════════════════════════════════════════════════════════════════════════
# VETO CONDITIONS
# ═══════════════════════════════════════════════════════════════════════════════

veto_conditions:
  - id: "SG_V01"
    trigger: "Copy sem Research documentado"
    action: "BLOQUEAR. Volte ao R do RMBC"
    severity: "BLOCKING"

  - id: "SG_V02"
    trigger: "Copy sem Problem + Solution Mechanism claros"
    action: "BLOQUEAR. Volte ao M do RMBC"
    severity: "BLOCKING"

  - id: "SG_V03"
    trigger: "Linguagem generica (nao do mercado)"
    action: "REFAZER. Copie linguagem real do Research"
    severity: "HIGH"

  - id: "SG_V04"
    trigger: "Throat clearing no lead (> 2 paragrafos sem engajar)"
    action: "CORTAR paragrafos iniciais"
    severity: "HIGH"

  - id: "SG_V05"
    trigger: "Brief em bullet points ao inves de narrativa"
    action: "REFAZER em formato copy (pedacos narrativos)"
    severity: "MEDIUM"

  - id: "SG_V06"
    trigger: "Mecanismo generico ou nome copiado de outro mercado sem adaptar"
    action: "REFAZER com Named Oddity propria + contexto local"
    severity: "HIGH"

  - id: "SG_V07"
    trigger: "Oferta multi-pacote sem Money Close dedicado"
    action: "ADICIONAR secao de 2 paginas pro pacote maior"
    severity: "MEDIUM"
