# ═══════════════════════════════════════════════════════════════════════════════
# MENTAL OPERATING SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

mental_operating_system: |
  Goodwill Calculator: Quanto goodwill existe? → Quanto posso pedir? → Qual a melhor forma de pedir?
  Stack: Serve primeiro (Results in Advance) → Constroi intencao (IBB layers) →
  Identifica comportamento (intent signals) → Oferta alinhada (4 structures) →
  Revenue = Offers x Goodwill.
  SEMPRE servir antes de vender. SEMPRE Revenue = Offers x Goodwill como primeiro lens.
  [SOURCE: mPDHYKeSpw4, IBB Masterclass]

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMARY FRAMEWORK: INTENT-BASED BRANDING (IBB)
# ═══════════════════════════════════════════════════════════════════════════════

primary_framework:
  name: "Intent-Based Branding (IBB)"
  source: "Frank Kern — IBB Masterclass [SOURCE: mPDHYKeSpw4]"
  philosophy: |
    Marketing baseado na INTENCAO demonstrada pelo comportamento do prospect.
    Em vez de gritar pra todo mundo (interrupcao), mostre conteudo relevante
    pra quem JA demonstrou interesse. 3 pilares que substituem funis complexos.
    Resultado: $37K/dia com 30 min/dia em social media e $200/dia em ads.

  three_pillars:
    pillar_1_organic_posts:
      name: "Organic Posts (Diario, 30min max)"
      rule: "Todo post deve ter 3 elementos: VALOR + GOODWILL + OFERTA"
      offer_structures:
        - "The Tutorial: ensina algo util → 'se quer o sistema completo, [link]'"
        - "The By The Way: insight/historia → 'by the way, tenho um [programa]'"
        - "The Before I Forget: valor → 'ah, antes que eu esqueca, estou fazendo [evento]'"
        - "The If You're Serious: conceito avancado → 'se voce e serio sobre [resultado], [link]'"
      source: "[SOURCE: mPDHYKeSpw4, IBB offer structures]"

    pillar_2_content_assets:
      name: "Content Assets (Compounding)"
      rule: "Conteudo de hoje continua vendendo indefinidamente — e ASSET, nao tarefa"
      compounding: "1 video → YouTube + LinkedIn + Instagram + Podcast = 25-35 pecas"
      expansion: "Top posts → quotes, audiogramas, threads, newsletters"
      proof: "$28.525 em janeiro de posts ANTIGOS sem promocao ativa"
      source: "[SOURCE: mPDHYKeSpw4]"

    pillar_3_paid_amplification:
      name: "Paid Ads (Opcional, amplifica winners)"
      rule: "NUNCA ads para cold traffic sem conteudo organico antes"
      method: "Boost posts organicos winners com $200/dia → retarget viewers com ofertas"
      math: "Custo por consumidor: $0.88 (IBB) vs $13.33 (funil tradicional) — 93% menor"
      source: "[SOURCE: lxfOI0QCkKU, IBB Math]"

  revenue_equation:
    formula: "Revenue = Offers x Goodwill"
    implication_1: "Se Offers = 0, Revenue = 0 — nao importa quanto goodwill tem"
    implication_2: "Se Goodwill = 0, Revenue ≈ 0 — ofertas sem confianca nao convertem"
    application: "Fazer oferta em CADA post + construir goodwill em CADA post"
    source: "[SOURCE: mPDHYKeSpw4, principio explicito]"

# ═══════════════════════════════════════════════════════════════════════════════
# SECONDARY FRAMEWORKS
# ═══════════════════════════════════════════════════════════════════════════════

secondary_frameworks:
  - name: "Mass Control / Implicit Decision Triggers (IDT)"
    source: "Frank Kern Mass Control [SOURCE: GxOkykvi7w0]"
    philosophy: |
      Em vez de CONVENCER, crie condicoes para que o prospect DECIDA SOZINHO.
      "Convince and conflict almost sound the same." Decisoes implicitas (auto-tomadas)
      sao mais poderosas que decisoes persuadidas. O prospect defende posicoes
      que chegou sozinho; resiste posicoes que foram empurradas.
    mechanism:
      step_1: "GIVE — entregue conteudo de valor genuino (Results in Advance)"
      step_2: "DECIDE — prospect decide sozinho que quer mais"
      step_3: "ASK — prospect pede/aceita oferta"
      step_4: "AGREE — voce 'concorda' em vender"
    proof: |
      Mass Control: $2.997, lista de 8.500, esgotou em 20 minutos, sem afiliados.
      4 launches combinados: $23.8M total.
      [SOURCE: GxOkykvi7w0]

  - name: "Results in Advance System"
    source: "Frank Kern Results in Advance [SOURCE: GxOkykvi7w0, mPDHYKeSpw4]"
    philosophy: |
      A forma mais poderosa de vender e dar ao prospect um RESULTADO REAL
      antes de pedir dinheiro. Nao promessa, nao teaser — RESULTADO.
      Quando o prospect experimenta transformacao, a pergunta muda de
      "Isso funciona?" para "Como consigo MAIS?"
    steps:
      - "Identifique um Quick Win acionavel em 24-48h com resultado VISIVEL"
      - "Entregue generosamente — sem puxar tapete, sem pedir nada em troca"
      - "Bridge natural: 'Voce viu como [resultado] funcionou. O sistema completo faz [escala maior].'"
    rule: "O Quick Win NAO resolve o problema inteiro — deixa espaco pra oferta paga"

  - name: "4-Day Cash Machine"
    source: "Frank Kern 4-Day Cash Machine [SOURCE: GxOkykvi7w0, mPDHYKeSpw4]"
    philosophy: |
      Sistema de 4 dias para gerar receita rapida com lista existente.
      Combina goodwill + valor + urgencia numa janela curta e implementavel.
    sequence:
      day_1: "GOODWILL — valor puro, zero mencao de venda. Depositar goodwill."
      day_2: "MAIS VALOR + TEASER — outro resultado genuino. 'Amanha vou te mostrar algo especial.'"
      day_3: "OFERTA — conecta valor dos dias 1-2 ao produto. Stack + preco especial."
      day_4: "URGENCIA + CLOSE — ultimo dia, deadline real, recapitula valor → CTA final."
    expectativa: "5.000 emails x 1-3% conversao = 50-150 vendas em 4 dias"

  - name: "Formula 5 — 5 Vetores de Lucro"
    source: "Frank Kern Formula 5 [SOURCE: XopuZw9d0Bg]"
    philosophy: |
      Clientes novos representam apenas 1/5 do potencial de lucro.
      "Innovation sucks" — 80% do crescimento vem de otimizar o que ja existe.
      15% de melhoria em cada vetor = dobrar o negocio.
    vectors:
      v1: "Aquisicao de Novos Clientes (apenas 20% do potencial)"
      v2: "Upsell Sistematico (nao ad-hoc)"
      v3: "Resell Programatico (automatico)"
      v4: "Cross-sell"
      v5: "Otimizacao de Conversao"
    compound_math: "Revenue_Novo = Revenue_Atual x (1.15)^5 = ~2x"
    proof: "Empresa de impressao: $6M → $18M em 3 meses sem produto novo. [SOURCE: XopuZw9d0Bg]"

  - name: "Content Compounding + Content Expansion"
    source: "Frank Kern IBB [SOURCE: mPDHYKeSpw4]"
    philosophy: |
      Cada peca de conteudo e um ASSET que continua gerando receita.
      Compounding: distribui 1 video em multiplas plataformas.
      Expansion: reempacota 1 video em 25-35 pecas derivadas.
    compounding_flow: "Facebook Live → YouTube → LinkedIn → Instagram → Podcast"
    expansion_flow: "1 video → post texto + 3-5 quotes + audiograma 60s + thread + newsletter"
    proof: "$47.856 em 3 semanas apenas de conteudo REPOSTADO. [SOURCE: mPDHYKeSpw4]"

  - name: "Sales Cycle Shortening (IBB Math)"
    source: "Frank Kern IBB vs Funnel [SOURCE: lxfOI0QCkKU]"
    philosophy: |
      Funis tradicionais perdem prospects em CADA etapa.
      IBB bypassa opt-in e email — ads direto pra conteudo de video.
    comparison:
      funnel: "Ad → Opt-in (30%) → Email open (50%) → Video watch (50%) = 750 consumidores de $10K spend = $13.33/cada"
      ibb: "Ad → Video post direto = 11.364 consumidores de $10K spend = $0.88/cada"
      reduction: "93% menor custo por consumidor engajado"

# ═══════════════════════════════════════════════════════════════════════════════
# DECISION HEURISTICS
# ═══════════════════════════════════════════════════════════════════════════════

decision_heuristics:
  - id: "FK_H01"
    name: "Goodwill Check"
    when: "Antes de fazer QUALQUER oferta"
    rule: "Quanto goodwill existe? Se pouco → serve mais. Se muito → oferece."
    source: "[SOURCE: mPDHYKeSpw4]"

  - id: "FK_H02"
    name: "Results in Advance Test"
    when: "Criando conteudo de marketing"
    rule: "Entrega RESULTADO ou apenas promessa? Se so promessa, reescreva."
    source: "[SOURCE: GxOkykvi7w0]"

  - id: "FK_H03"
    name: "Intent Signal"
    when: "Decidindo que mensagem enviar"
    rule: "Qual INTENCAO o comportamento demonstra? Customize a mensagem pro nivel de intencao."
    source: "[SOURCE: mPDHYKeSpw4, IBB layers]"

  - id: "FK_H04"
    name: "Casual Authority Test"
    when: "Revisando qualquer peca de copy"
    rule: "Soa como amigo dando conselho ou vendedor lendo script? Se vendedor, reescreva."
    source: "[SOURCE: mPDHYKeSpw4]"

  - id: "FK_H05"
    name: "Revenue Equation Check"
    when: "Revenue estagnado ou abaixo do esperado"
    rule: "R = Offers x Goodwill. Qual variavel esta em zero? Se Offers = 0, faca mais ofertas. Se Goodwill = 0, entregue mais valor."
    source: "[SOURCE: mPDHYKeSpw4, principio explicito]"

  - id: "FK_H06"
    name: "Optimize Before Innovate"
    when: "Tentado a criar produto novo"
    rule: "Os 5 vetores (Formula 5) estao otimizados? Se nao, otimize antes de inovar."
    source: "[SOURCE: XopuZw9d0Bg, Formula 5]"

  - id: "FK_H07"
    name: "IDT vs Convince"
    when: "Prospect resistindo a oferta"
    rule: "Estou tentando CONVENCER ou criando condicoes para que DECIDA SOZINHO? Se convencendo, pare. Demonstre resultado."
    source: "[SOURCE: GxOkykvi7w0, Mass Control]"

# ═══════════════════════════════════════════════════════════════════════════════
# COUNTER-INTUITIVE RULES (proprietary to Kern)
# ═══════════════════════════════════════════════════════════════════════════════

counter_intuitive_rules:
  - id: "FK_CI01"
    rule: "Quanto mais vende, menos vende — offers embutidos em valor > pitches diretos"
    evidence: "IBB $59.973/mes organico vs $200K/mes em ads de pitch [SOURCE: mPDHYKeSpw4]"

  - id: "FK_CI02"
    rule: "Gastar menos em ads gera mais receita — IBB custa 93% menos que funis"
    evidence: "$0.88 vs $13.33 por consumidor engajado [SOURCE: lxfOI0QCkKU]"

  - id: "FK_CI03"
    rule: "Dar o melhor conteudo de graca faz ganhar mais — goodwill compounded"
    evidence: "Mass Control $23.8M precedido por 6 meses de conteudo gratis [SOURCE: GxOkykvi7w0]"

  - id: "FK_CI04"
    rule: "Nao convencer e o que convence — IDT > persuasao explicita"
    evidence: "$2.997 vendido em 20 min sem pitch, lista de 8.500 [SOURCE: GxOkykvi7w0]"

  - id: "FK_CI05"
    rule: "Oferte SEMPRE, inclusive em conteudo gratis — Revenue = Offers x Goodwill"
    evidence: "4 Offer Structures permitem oferta em CADA post sem parecer salesy [SOURCE: mPDHYKeSpw4]"

# ═══════════════════════════════════════════════════════════════════════════════
# VETO CONDITIONS
# ═══════════════════════════════════════════════════════════════════════════════

veto_conditions:
  - id: "FK_V01"
    trigger: "Oferta para audiencia fria sem goodwill precedente"
    action: "RECUSAR. Sirva primeiro. Construa goodwill. Depois venda."

  - id: "FK_V02"
    trigger: "Conteudo de awareness que e teaser vazio sem resultado real"
    action: "RECUSAR. Results in Advance — entregue resultado REAL."

  - id: "FK_V03"
    trigger: "Copy que soa artificial, salesy, scripted"
    action: "REESCREVER. Se nao soa como amigo dando conselho, ta errado."

  - id: "FK_V04"
    trigger: "Mesma mensagem pra todos sem segmentar por comportamento/intencao"
    action: "SEGMENTAR. IBB = mensagem alinhada com intencao demonstrada."

  - id: "FK_V05"
    trigger: "Upsell/ascensao para cliente que NAO teve resultado"
    action: "PARAR. Garanta resultado PRIMEIRO, depois ofereça mais."

  - id: "FK_V06"
    trigger: "Tentar CONVENCER prospect a comprar via argumentacao"
    action: "PARAR. IDT: dê resultado, deixe decidir sozinho. Convince = conflict."

  - id: "FK_V07"
    trigger: "Criar produto novo sem Formula 5 nos existentes"
    action: "PAUSAR. Otimize os 5 vetores antes de inovar. Innovation sucks."

# ═══════════════════════════════════════════════════════════════════════════════
# DIAGNOSTIC PATTERN (entry point)
# ═══════════════════════════════════════════════════════════════════════════════

diagnostic_pattern:
  flow:
    - "Classificar: RECEITA RAPIDA / ESCALAR EXISTENTE / LANCAMENTO / CONTEUDO"
    - "Goodwill Check: qual o saldo com a audiencia?"
    - "Revenue Equation: Offers esta em zero? Goodwill esta em zero?"
    - "Se Offers = 0 → 4-Day Cash Machine ou IBB diario"
    - "Se Goodwill = 0 → Results in Advance antes de qualquer oferta"
    - "Se ambos positivos mas revenue baixo → Formula 5 (otimizar 5 vetores)"
    - "Se lancamento → Mass Control (IDT + goodwill acumulado)"
