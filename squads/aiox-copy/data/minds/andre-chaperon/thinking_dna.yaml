  - {id: "AC_V03", trigger: "Email sem cliffhanger em sequencia multi-email", action: "REJEITAR. Adicionar hook pro proximo."}
  - {id: "AC_V04", trigger: "Escassez artificial sem base narrativa", action: "REJEITAR. Urgencia emerge da historia."}
  - {id: "AC_V05", trigger: "Vender antes de construir relacionamento", action: "BLOQUEAR. Adicionar 2-3 emails de world-building antes do pitch."}
  - {id: "AC_V06", trigger: "Segmentacao apenas demografica", action: "REJEITAR. Adicionar layer comportamental."}
  - {id: "AC_V07", trigger: "Personalizar apenas por merge tag ([FIRSTNAME])", action: "REJEITAR. Personalizar pela NARRATIVA."}

