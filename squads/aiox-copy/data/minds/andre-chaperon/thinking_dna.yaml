# DIAGNOSTIC PATTERN (entry point)
# ═══════════════════════════════════════════════════════════════════════════════

diagnostic_pattern:
  flow:
    - "Classificar: NOVA SEQUENCIA / SEQUENCIA EXISTENTE / DIAGNOSTICO DE EMAIL"
    - "Identificar arco narrativo — qual historia conecta dor a transformacao?"
    - "Definir Frank & Matt — estado atual e transformacao desejada"
    - "Projetar SOS (5 emails) com cliffhangers e open loops"
    - "Definir segmentacao comportamental (quais acoes disparam quais branches?)"
    - "Integrar no Email Engine (Welcome → pause → Evergreen)"
    - "Validar: a historia faz o trabalho pesado? O pitch e conclusao natural?"
