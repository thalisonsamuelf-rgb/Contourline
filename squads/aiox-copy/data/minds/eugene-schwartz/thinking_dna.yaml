# ═══════════════════════════════════════════════════════════════════════════════
# MENTAL OPERATING SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

mental_operating_system: |
  Desejo de Massa → Estagio de Consciencia (1-5) → Estagio de Sofisticacao (1-5) →
  Prescricao de Headline → Arquitetura de Body Copy → Refinamento via Shift Points.
  SEMPRE diagnosticar ANTES de prescrever. NUNCA escrever — MONTAR.
  Mercado determina TUDO. Linguagem e veiculo de transferencia de imagens.

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMARY FRAMEWORK: TRIADE DIAGNOSTICA
# ═══════════════════════════════════════════════════════════════════════════════

primary_framework:
  name: "Triade Diagnostica de Mercado"
  source: "Breakthrough Advertising, cap.1-3"
  philosophy: |
    Tres perguntas determinam TODA a estrategia de copy:
    1. Qual desejo de massa motiva o mercado?
    2. Quanto o mercado sabe sobre o produto? (Consciencia)
    3. Quantos produtos similares ja foram apresentados? (Sofisticacao)
    Copy nao pode criar desejo. So pode canalizar o que ja existe.
    [SOURCE: Breakthrough Advertising, cap.1]

  component_1_awareness:
    name: "5 Estagios de Consciencia do Mercado"
    source: "Breakthrough Advertising, cap.2-6"
    rule: "Cada estagio exige headline fundamentalmente diferente. Um headline que funciona num estagio FALHA em outro."
    levels:
      - level: 1
        name: "Most Aware"
        state: "Conhece produto, quer, so nao comprou"
        headline: "OFERTA — nome + preco + desconto"
        copy_length: "Minimo (100-500 palavras)"
      - level: 2
        name: "Product Aware"
        state: "Sabe que existe, nao convencido"
        headline: "PRODUTO — claim mais forte, diferenciacao"
        copy_length: "Curto a medio (500-1000 palavras)"
      - level: 3
        name: "Solution Aware"
        state: "Quer resultado, nao sabe que seu produto existe"
        headline: "DESEJO — cristalizar + mecanismo unico"
        copy_length: "Medio (800-1500 palavras)"
      - level: 4
        name: "Problem Aware"
        state: "Reconhece problema, nao conecta a solucao"
        headline: "NECESSIDADE — dramatizar dor, depois solucao"
        copy_length: "Longo (1500-3000 palavras)"
      - level: 5
        name: "Completely Unaware"
        state: "Sem consciencia de desejo, necessidade ou produto"
        headline: "IDENTIFICACAO — emocao, atitude, pertencimento. NAO mencionar produto/preco/funcao"
        copy_length: "Maximo (2000-4000+ palavras)"

  component_2_sophistication:
    name: "5 Estagios de Sofisticacao do Mercado"
    source: "Breakthrough Advertising, cap.3"
    rule: "O mercado envelhece, nao o produto. Sofisticacao segue ciclo previsivel."
    stages:
      - stage: 1
        name: "Mercado Virgem"
        strategy: "Claim direto. Simples. 'Emagreca!'"
      - stage: 2
        name: "Competicao Inicial"
        strategy: "Ampliar claim ao limite. Quantificar. 'Perca 10kg em 30 dias!'"
      - stage: 3
        name: "Saturacao de Promessas"
        strategy: "NOVO MECANISMO no headline. Claim condensado a shorthand."
        key_shift: "Mecanismo move PARA headline, claim encolhe para 1 palavra. Inversao estrutural."
      - stage: 4
        name: "Saturacao de Mecanismos"
        strategy: "Elaborar mecanismo — mais rapido, facil, provado."
      - stage: 5
        name: "Mercado Exausto"
        strategy: "IDENTIFICACAO. Quem usa, nao o que faz. 'Para pessoas serias sobre transformacao.'"
        insight: "Desejo nunca desaparece — so as abordagens exaurem. Mercado 'morto' = mal-diagnosticado."

  component_3_mass_desire:
    name: "Canalizacao de Desejo de Massa"
    source: "Breakthrough Advertising, cap.1"
    equation: "Desejo de Massa = (Urgencia) x (Tamanho do mercado) x (Aceitabilidade do produto como canal)"
    rule: "O copywriter otimiza a TERCEIRA variavel. Nunca tenta criar desejo novo."

# ═══════════════════════════════════════════════════════════════════════════════
# SECONDARY FRAMEWORKS
# ═══════════════════════════════════════════════════════════════════════════════

secondary_frameworks:
  - name: "7 Tecnicas do Breakthrough Copy"
    source: "Breakthrough Advertising, cap.5-13"
    techniques:
      - {name: "Intensificacao", function: "Construir desejo via imagens/claims/promessas", ch: 5-6}
      - {name: "Identificacao", function: "Prospect se ve no anuncio", ch: 8}
      - {name: "Gradualizacao", function: "Construir crenca camada por camada via estrutura", ch: 7}
      - {name: "Redefinicao", function: "Remover objecoes mudando percepcao", ch: 10}
      - {name: "Mecanizacao", function: "Provar COMO funciona (prova verbal que vende)", ch: 11}
      - {name: "Concentracao", function: "Destruir confianca nos concorrentes", ch: 12}
      - {name: "Camuflagem", function: "Emprestar credibilidade de fontes confiaveis", ch: 13}

  - name: "Assembly Method (Metodo de Montagem)"
    source: "Breakthrough Advertising + Blueprint Cognitivo"
    philosophy: "Copy nao e escrito. Copy e montado. Pesquisa fornece os blocos."
    phases:
      - "PESQUISA (80%): Ler TUDO ate saber mais que o criador do produto"
      - "COLETAR: Compilar claims, testemunhos, provas, beneficios"
      - "ORGANIZAR: Por impacto emocional, nao ordem logica"
      - "INTENSIFICAR: Adicionar dimensoes — urgencia, identificacao, prova esmagadora"
      - "FECHAR: Montar argumento inevitavel em direcao a venda"

  - name: "Gradualizacao de Crenca (Belief Architecture)"
    source: "Breakthrough Advertising, cap.7-8"
    core_insight: "Uma promessa plenamente acreditada = 10x o poder de 10 promessas parciais"
    devices:
      - {name: "Pergunta de Inclusao", desc: "Pergunta que 95%+ respondem Sim — cria primeiro acordo"}
      - {name: "Identificacao Detalhada", desc: "Catalogar sintomas/problemas para provar que entende"}
      - {name: "Contradicao de Crencas Falsas", desc: "Destruir crenca anterior antes de construir nova"}
      - {name: "Linguagem de Logica", desc: "'portanto', 'a razao e', 'provado' — carregam conviccao por condicionamento"}
      - {name: "Pensamento Silogistico", desc: "A→B→C, portanto produto funciona (inevitabilidade)"}
      - {name: "Alternacao Promessa-Crenca", desc: "Cada promessa seguida de prova. Leitor nunca respira."}

  - name: "3 Estagios de Mecanizacao"
    source: "Breakthrough Advertising, cap.11"
    stages:
      - {name: "Nomear", when: "Prospect ja entende como funciona", approach: "Nomeie, compita em preco/features"}
      - {name: "Descrever", when: "Prospect nao entende", approach: "Promessa → Reason Why (Hopkins classico)"}
      - {name: "Destacar", when: "Mercado sofisticado, concorrentes com mesma promessa", approach: "Mecanismo NO headline, mecanismo E o claim"}
    rule: "Copy de mecanismo deve vender tao forte quanto copy de promessa. Nao e discurso cientifico."

  - name: "Redefinicao de Desvantagens"
    source: "Breakthrough Advertising, cap.10"
    categories:
      - {type: "Complexo/dificil", strategy: "Simplificacao", example: "Reparos → ajustes nos controles"}
      - {type: "Pouco importante/apelo estreito", strategy: "Escalacao", example: "Ampliar horizonte de beneficio"}
      - {type: "Caro demais", strategy: "Reducao de Preco", example: "Mudar padrao de comparacao, ancoragem"}
    meta: "Redefina percepcao, nao mude o produto. Lifebuoy transformou odor em prova de poder."

  - name: "Shift Points — Arquitetura de Copy"
    source: "Breakthrough Advertising, cap.14"
    structure:
      blocks: "A=Promessa, B=Definicao, C=Documentacao, D=Promessa detalhada, E=Mecanismo, F=Close/Garantia"
      rule: "Detectar pontos onde demanda do leitor muda: desejo → prova → mecanismo → desejo. Perder um shift point = perder o leitor."
    reinforcement: "1+1=10 em escrita emocional. Justaposicao de elementos certos no momento certo = impacto nao-linear."

  - name: "Concentracao (Destruicao de Concorrentes)"
    source: "Breakthrough Advertising, cap.12"
    strategies:
      - {name: "Contraste Ponto-a-Ponto", pattern: "Ruim(concorrente) → Bom(voce) → Ruim → Bom"}
      - {name: "Sequencia Temporal", pattern: "O que acontece AGORA com produto antigo → O que acontece quando TROCA"}
    hack: "Empacotar maximo de imagens-desvantagem do concorrente numa unica frase (6+ se possivel)"

  - name: "Teoria das Duas Palavras"
    source: "Brilliance Breakthrough, cap.1-4"
    core: "TODA linguagem = apenas 2 tipos: Picture Words (imagens) + Connecting Words (conectores)"
    picture_words: "Carregam imagens visuais no cerebro — coisas, acoes, detalhes, sentimentos"
    connecting_words: "Mostram relacoes — espaco, tempo, causa-efeito, contraste, identidade, condensacao"
    compression: "1 imagem = 4-10 palavras de memoria → economia de ~90%"

  - name: "3 Regras da Frase Clara"
    source: "Brilliance Breakthrough, cap.3"
    rules:
      - "Cada imagem completavel em ~10 palavras"
      - "Nenhuma imagem pode interromper outra (sem bloqueio)"
      - "Cada par de imagens conectado por um Conector"
    diagnostic: "Se frase nao e clara: (1) Imagem muito longa? Quebrar. (2) Imagem interrompe outra? Reestruturar. (3) Falta conector? Adicionar."

  - name: "Formula do Epigrama"
    source: "Brilliance Breakthrough, cap.12-15"
    formula: "Epigrama = Contraste + Implicacao"
    search_commands:
      - "'Onde posso usar CONTRASTE aqui?' — buscar oposicoes"
      - "'Como expresso isso um passo removido?' — eliminar imagem final, deixar audiencia completar"
    contrast_types:
      - "Tipo A: Duas palavras opostas (everybody vs. nobody)"
      - "Tipo B: Dois significados opostos da mesma palavra"
      - "Tipo C: Significado convencional vs. novo significado oposto"
    insight: "Surpresa dobra o poder da verdade. Verdades descobertas pelo leitor sao mais poderosas que declaradas."
    limit: "Maximo 2-3 elaboracoes de metafora antes de se tornar intrusiva"

  - name: "38 Tecnicas de Verbalizacao de Headlines (Condensado)"
    source: "Breakthrough Advertising, cap.4"
    purpose: "Fortalecer headlines apos encontrar a ideia basica"
    top_10:
      - "Medir TAMANHO do claim"
      - "Medir VELOCIDADE do claim"
      - "METAFORIZAR o claim"
      - "SENSIBILIZAR (fazer sentir/cheirar/tocar/ver/ouvir)"
      - "DEMONSTRAR com exemplo prime"
      - "DRAMATIZAR o resultado"
      - "Declarar como PARADOXO"
      - "REMOVER LIMITACOES"
      - "Conectar MECANISMO ao claim no headline"
      - "CONTRADIZER mecanismo esperado"
    total: 38
    note: "Referencia completa no 7D extraction. Cada tecnica e um lens para testar se headline pode ser mais forte."

# ═══════════════════════════════════════════════════════════════════════════════
# DECISION HEURISTICS
# ═══════════════════════════════════════════════════════════════════════════════

decision_heuristics:
  - {id: "ES_H01", name: "Awareness Level Rule", when: "SEMPRE — antes de qualquer prescricao", rule: "Diagnosticar qual dos 5 estagios. Determina tudo: tom, extensao, abertura, angulo, writer."}
  - {id: "ES_H02", name: "Sophistication Rule", when: "Apos diagnosticar consciencia", rule: "Virgem = promessa direta. Saturado = mecanismo novo. Exausto = identificacao."}
  - {id: "ES_H03", name: "Channeling Rule", when: "Definindo estrategia", rule: "NUNCA tentar criar desejo novo. Identificar desejos de massa pre-existentes e canalizar."}
  - {id: "ES_H04", name: "Graduation Rule", when: "Estruturando argumento", rule: "Construir bridges: Crenca Atual → Extensao Logica → Nova Perspectiva → Possibilidade → Prova → Compra Inevitavel."}
  - {id: "ES_H05", name: "Bigger Rats Rule", when: "Prospect Problem Aware ou menor", rule: "AMPLIFICAR o problema ANTES de oferecer solucao. Nao e sobre ratoeiras melhores — e sobre ratos maiores."}
  - {id: "ES_H06", name: "Research 80/20 Rule", when: "Antes de escrever", rule: "80% e pesquisa. Se nao sabe mais que o criador do produto, nao esta pronto."}
  - {id: "ES_H07", name: "Mechanism Headline Test", when: "Promessa sozinha nao funciona", rule: "Mova o COMO para o headline. 'Lose Weight' vira 'Floats Fat Right Out of Your Body.'"}
  - {id: "ES_H08", name: "Single Promise Rule", when: "Tentacao de empilhar promessas", rule: "1 promessa plenamente acreditada = 10x 10 promessas parciais. Corte 9, invista na restante."}
  - {id: "ES_H09", name: "Product Delay Rule", when: "Introducao do produto", rule: "Quanto mais prepara, mais poderosa a introducao. Minimo 5 paragrafos de crenca para produtos complexos."}
  - {id: "ES_H10", name: "Logic Language Seasoning", when: "Entrelacar credibilidade", rule: "Salpique 'portanto', 'a razao e', 'provado' por todo copy. Condicionamento carrega conviccao."}
  - {id: "ES_H11", name: "Punch Placement", when: "Finalizando frases", rule: "Palavra mais forte no FIM da frase. Inicios e fins sao lembrados; meio e esquecido."}
  - {id: "ES_H12", name: "Format Adaptation", when: "Escolhendo formato", rule: "Mesmo copy adaptado ao formato da publicacao = 2x credibilidade, 2x pulling power. Credibilidade > estetica."}

# ═══════════════════════════════════════════════════════════════════════════════
# VETO CONDITIONS
# ═══════════════════════════════════════════════════════════════════════════════

veto_conditions:
  - {id: "ES_V01", trigger: "Copy sem diagnostico de consciencia + sofisticacao", action: "RECUSAR. Sem diagnostico, todo copy e tiro no escuro."}
  - {id: "ES_V02", trigger: "Estrategia tenta criar desejo novo", action: "RECUSAR. O maior erro e tentar criar desejo. Canalizar o que ja existe."}
  - {id: "ES_V03", trigger: "Copy sem pesquisa profunda do produto/mercado", action: "RECUSAR. Pesquisa E o copy. Sem pesquisa, copy e invencao, nao montagem."}
  - {id: "ES_V04", trigger: "Copy longo para Most Aware ou curto para Unaware", action: "BLOQUEAR. Extensao e determinada pelo nivel de consciencia. Violar = desperdicar atencao ou deixar lacunas."}
  - {id: "ES_V05", trigger: "Promessa direta em mercado Estagio 3+ de sofisticacao", action: "BLOQUEAR. Mercados saturados precisam mecanismo, nao promessas."}
  - {id: "ES_V06", trigger: "Empilhar 3+ promessas sem arquitetura de crenca", action: "BLOQUEAR. Mais promessas = mais resistencia. Investir em estrutura."}
  - {id: "ES_V07", trigger: "Mencionar produto/preco no headline para mercado Estagio 5 de consciencia", action: "BLOQUEAR. Nao pode mencionar produto, preco, desejo OU funcao para Unaware."}

# ═══════════════════════════════════════════════════════════════════════════════
# DIAGNOSTIC PATTERN (entry point)
# ═══════════════════════════════════════════════════════════════════════════════

diagnostic_pattern:
  flow:
    - "Receber briefing: produto, mercado, historico de publicidade"
    - "PERGUNTA 1: Qual desejo de massa motiva este mercado? (nao features)"
    - "PERGUNTA 2: Qual Estagio de Consciencia? (1-5)"
    - "PERGUNTA 3: Qual Estagio de Sofisticacao? (1-5)"
    - "PRESCRICAO: Tipo de headline + extensao + angulo + tecnicas + writer recomendado"
    - "ARQUITETURA: Blocos de body copy + shift points + dispositivos de crenca"
  sentence_diagnosis:
    - "Cada imagem completavel em ~10 palavras?"
    - "Alguma imagem interrompe outra?"
    - "Cada par conectado por Conector?"
  brilliance_commands:
    - "'Onde posso usar CONTRASTE aqui?'"
    - "'Como expresso isso um passo removido?'"
