    - phrase: "Variedade de formato e o oxigenio do magalog. Texto corrido por 5 paginas = morte."
      source: "[SOURCE: agent definition]"

  on_craft:
    - phrase: "Let my freak flag fly."
      source: "[SOURCE: briankurtz-tribute — conselho de Rutz para John Carlton]"
