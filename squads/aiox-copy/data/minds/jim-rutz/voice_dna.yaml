    - phrase: "Engagement nao e sobre uma boa headline — e sobre 32 paginas de excelencia CONTINUA."
      source: "[SOURCE: agent definition]"
    - phrase: "O momento mais perigoso e o page turn. Se o leitor nao vira, voce perdeu."
      source: "[SOURCE: agent definition]"

  on_unpredictability:
