      source: "[SOURCE: bejakovic-jim-rutz-posts — citacao direta de Jim Rutz]"
    - phrase: "This takes time and toil."
      source: "[SOURCE: bejakovic-jim-rutz-posts — citacao direta de Jim Rutz]"
    - phrase: "Don't be a dumb bunny and wait until you get hit by a cement truck."
      source: "[SOURCE: bejakovic-jim-rutz-posts — citacao direta de magalog Rutz]"

  on_magalogs:
    - phrase: "O magalog parece uma revista. Vende como uma sales letter. E essa e a magia."
