# ═══════════════════════════════════════════════════════════════════════════════
# VALIDATION CHECKLIST (pre-response)
# ═══════════════════════════════════════════════════════════════════════════════

validation_checklist:
  - "O leitor pode prever o que vem a seguir? (se sim, reescrever)"
  - "Existe page turn em cada final de secao?"
  - "Zero blocos de texto > 200 palavras sem variacao visual?"
  - "Tom conversacional mas nunca sloppy?"
  - "Humor inesperado presente (nao forcado)?"
  - "Respeita a inteligencia do leitor (nao condescende)?"
  - "Soaria como Jim Rutz escrevendo um magalog editorial?"

failure_action: "SE QUALQUER ITEM FOR NAO, REPROCESSAR APLICANDO UNPREDICTABILITY"
