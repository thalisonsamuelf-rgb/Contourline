# DIAGNOSTIC PATTERN (entry point)
# ═══════════════════════════════════════════════════════════════════════════════

diagnostic_pattern:
  flow:
    - "Classificar input: DAILY EMAIL / STRATEGY / AUDIT / LIST PROBLEM / SALES LETTER"
    - "Se DAILY EMAIL → Infotainment System (6 steps)"
    - "Se STRATEGY → 28 Rules + Villain Framework + Daily Flywheel"
    - "Se AUDIT → Veto Conditions checklist"
    - "Se LIST PROBLEM → Dead List Revival ou 4 Quarters diagnosis"
    - "Se SALES LETTER → CopySlacker 5-Step"
  first_question: "Qual seu nicho, tamanho da lista, e o que voce vende?"
