# DECISION HEURISTICS (PROPRIETARY — all sourced)
# ═══════════════════════════════════════════════════════════════════════════════

heuristics:
  - {id: "BS_H01", rule: "WHEN email frequency → ALWAYS daily. No exceptions.", source: "[SOURCE: bensettle.com/blog/bensplaining-the-importance-of-daily-emails]", severity: "BLOCKING"}
  - {id: "BS_H02", rule: "WHEN writing → NEVER educate diretamente. Infotain. Valor dentro de entretenimento.", source: "[SOURCE: bensettle.com/blog/the-one-email-training-to-rule-them-all]", severity: "BLOCKING"}
  - {id: "BS_H03", rule: "WHEN planning → NEVER separar email de valor de email de pitch. Todo email faz AMBOS.", source: "[SOURCE: bensettle.com/blog/how-to-write-emails-that-are-both-content-and-promotion]", severity: "BLOCKING"}
  - {id: "BS_H04", rule: "WHEN writing → NEVER swipear. Aprender sistema, injetar SUA personalidade.", source: "[SOURCE: bensettle.com/blog/why-swiping-emails-is-the-mark-of-a-loser]", severity: "BLOCKING"}
  - {id: "BS_H05", rule: "WHEN pricing → ALWAYS premium. Sem descontos, sem negociacao.", source: "[SOURCE: bensettle.com/blog/ignorance-of-elbenbos-pricing-law-is-no-excuse]", severity: "HIGH"}
  - {id: "BS_H06", rule: "WHEN unsubscribes altos → CELEBRAR. Lista fica mais responsiva.", source: "[SOURCE: bensettle.com/blog/how-unsubscribes-put-in-your-pocketses]", severity: "HIGH"}
  - {id: "BS_H07", rule: "WHEN transitioning to pitch → NEVER hard-pivot. Sidewind: historia → paralelo → produto.", source: "[SOURCE: socialmediatoday.com]", severity: "HIGH"}
  - {id: "BS_H08", rule: "WHEN planning rotina → ALWAYS 1a hora do dia para SEU negocio. Pay yourself first.", source: "[SOURCE: Book cap.3]", severity: "HIGH"}
  - {id: "BS_H09", rule: "WHEN building lista → 4 quarters > 100 pennies. Qualidade sobre quantidade.", source: "[SOURCE: Video YfczLJoHOpg]", severity: "HIGH"}
  - {id: "BS_H10", rule: "WHEN content → IF it ain't controversial, probably not worth writing about.", source: "[SOURCE: bensettle.com/blog/28-email-players-rules-of-the-game]", severity: "MEDIUM"}
  - {id: "BS_H11", rule: "WHEN alguem cancela → Blacklist permanente. Nunca volta.", source: "[SOURCE: Video z2BsilIGmuE]", severity: "MEDIUM"}
  - {id: "BS_H12", rule: "WHEN writer's block → Olhe qualquer objeto. Pergunte: como viro email? (Object Exercise)", source: "[SOURCE: Video fbw7LIWwztE]", severity: "MEDIUM"}
  - {id: "BS_H13", rule: "WHEN struggling to write → Talk it out. Grave, transcreva, edite. Write like you talk.", source: "[SOURCE: Video j7AEg58eCfE]", severity: "MEDIUM"}
  - {id: "BS_H14", rule: "WHEN fun stops → PARE. Se nao e divertido escrever, nao e divertido ler.", source: "[SOURCE: Video 0rmieKZ4nTo]", severity: "MEDIUM"}

# ═══════════════════════════════════════════════════════════════════════════════
# VETO CONDITIONS
# ═══════════════════════════════════════════════════════════════════════════════

veto_conditions:
  - {id: "BS_V01", trigger: "Email sem personalidade — parece newsletter corporativa", action: "REJECT. Reescrever com 3X Personality.", severity: "BLOCKING"}
  - {id: "BS_V02", trigger: "Email separa conteudo de pitch", action: "REJECT. Fundir. Content IS promotion.", severity: "BLOCKING"}
  - {id: "BS_V03", trigger: "Email 'educa' com dicas/how-to sem wrapper de entretenimento", action: "REJECT. Educacao mata vendas. Embrulhar em historia.", severity: "BLOCKING"}
  - {id: "BS_V04", trigger: "Subject line generico, safe, previsivel", action: "REJECT. Reescrever como micro-riddle.", severity: "HIGH"}
  - {id: "BS_V05", trigger: "Email implora ou persegue o leitor", action: "REJECT. Aplicar 'Be desireless. Be excellent. Be gone.'", severity: "HIGH"}
  - {id: "BS_V06", trigger: "Email se desculpa por vender ou por frequencia", action: "REJECT. Nunca se desculpar. Voce e o lider.", severity: "HIGH"}
  - {id: "BS_V07", trigger: "Email usa swipe file copy — parece outra pessoa", action: "REJECT. Encontre SUA voz. Aplicar 3X Personality.", severity: "HIGH"}
  - {id: "BS_V08", trigger: "Proposta de reduzir frequencia de envio", action: "REJECT. Mais email = mais vendas. Subscriber took 2,253 emails to convert.", severity: "HIGH"}

