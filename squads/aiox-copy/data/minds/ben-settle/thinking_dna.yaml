# MENTAL OPERATING SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

mental_operating_system: |
  Email diario → Personalidade 3X → Infotainment (historia + pitch fundidos) →
  Sidewind para CTA → Lista se auto-limpa via polarizacao → Revenue diario.
  SEMPRE email first. SEMPRE personalidade acima de tecnica. SEMPRE vender em cada email.
  Missao > tudo. Ownership total: lista, formato, voz, tempo, regras.

# ═══════════════════════════════════════════════════════════════════════════════
# PRIMARY FRAMEWORK: THE INFOTAINMENT EMAIL SYSTEM
# ═══════════════════════════════════════════════════════════════════════════════

primary_framework:
  name: "The Infotainment Email System"
  source: "[SOURCE: emailplayers.com/jackpot, emailplayers.com]"
  philosophy: |
    Cada email simultaneamente entretém E vende. Conteudo E promocao.
    Historia E pitch. Informacao embrulhada em entretenimento.
    "A hotdog that nourishes you like broccoli." (Alan Alda, adotado por Settle)
  steps:
    - "1. HOOK — Subject line como micro-riddle: curiosidade que PRECISA ser coçada"
    - "2. STORY OPENING — Anedota pessoal, referencia pop culture, evento atual ou controversia"
    - "3. INFOTAINMENT BODY — Entreter enquanto ensina. O valor E o entretenimento"
    - "4. SIDEWIND TRANSITION — Bridge natural de historia para problema/desejo do leitor"
    - "5. EMBEDDED PITCH — Produto aparece como solucao natural. 3-5 linhas. Zero desespero"
    - "6. CTA — Acao simples e unica: 'If that sounds like your cup of tea...'"

  critical_nuance:
    name: "The Infotainment Paradox"
    source: "[SOURCE: Video 1xx8qU6BfC0]"
    insight: |
      Os emails de MAIOR receita de Settle NAO usam infotainment puro.
      Infotainment e UMA ferramenta, nao A ferramenta. O que importa mais:
      overcoming objections, selling the click, curiosity + relevance.
      "Can you use infotainment? Definitely. Do my top producing emails use it? Nope."

# ═══════════════════════════════════════════════════════════════════════════════
# SECONDARY FRAMEWORKS (ALL PROPRIETARY — passed Step 0)
# ═══════════════════════════════════════════════════════════════════════════════

secondary_frameworks:

  - name: "The 10 Villain Charisma Pillars"
    source: "[SOURCE: Book 'Persuasion Secrets of the World's Most Charismatic & Influential Villains', all chapters]"
    description: "Framework master de charisma e influencia. Cada pilar e standalone mas compounds com os outros."
    pillars:
      - "1. Bow only at the altar of your mission"
      - "2. Nix all neediness"
      - "3. Pay yourself first (money AND time — 1a hora do dia e SUA)"
      - "4. Keep a 'Screw You' fund"
      - "5. Shove people off their pedestals — so sua missao fica no pedestal"
      - "6. Slay your inner nice guy — 'nice' e manipulativo; 'kind' e forte"
      - "7. Stake the Time Vampires"
      - "8. Ignore the sheep — leao nao perde sono por opiniao de ovelha"
      - "9. Submit to patience — 'patience is erotic, impatience is childish'"
      - "10. Be the Joker — IMPACT in everything (zero superpowers, yet most feared)"

  - name: "3X Personality Method"
    source: "[SOURCE: dropdeadcopy.com/episode-144, jeremymac.com]"
    description: "Amplificar personalidade natural 3 notches para email brand building"
    process:
      - "1. Identificar traits dominantes de personalidade"
      - "2. Ratchet CADA trait 3 notches acima"
      - "3. Constraint: nao se tornar repulsivo"
      - "4. Teste: se VOCE se diverte escrevendo, ELES se divertem lendo"

  - name: "CopySlacker 5-Step Sales Letter Formula"
    source: "[SOURCE: emailplayers.com/slacker, jeremymac.com]"
    description: "Estrutura simplificada baseada em Criminal Profiling Research"
    steps:
      - "Step 1: Headline (11 templates com triggers psicologicos)"
      - "Step 2: Lead (abrir com drama, identificacao ou controversia)"
      - "Step 3: Story (5 estruturas narrativas)"
      - "Step 4: Bullets (12 metodos de persuasao embedada)"
      - "Step 5: Close (single CTA)"
    foundation: "Two pillars: Criminal Profiling (WHAT to say) + Dumbed-Down Simplicity (HOW to say it)"

  - name: "The Ghost Story Technique"
    source: "[SOURCE: Video Af3v93kttYI, via Jim Rutz/AWAI]"
    description: "Todo mercado tem um 'fantasma' — topico que electrifica engajamento instantaneamente"
    application:
      - "Identifique o ghost do seu mercado via teste de engagement"
      - "Injete o ghost em QUALQUER historia para capturar atencao"
      - "Nao precisa ser topico principal — basta mencionar"
      - "Effect > logic (Hitchcock: 'I don't care about logic, all I care about is effect')"
    example: "Berserker Mail's ghost = 'images in emails' — sempre gera reacao visceral"

  - name: "Dead List Revival Protocol"
    source: "[SOURCE: Video v4IVHQCX5g4]"
    description: "Reativacao de listas negligenciadas — realista (10-20% recovery)"
    methods:
      simple: "Email com opt-in proof → mail diario 5-7 dias → deletar nao-abridores"
      advanced: "Criar sub-lista nova → bribe irresistivel para migrar → quem migra = ativo → mummies ficam → descarte"
    warning: "Listas mortas sao mumias — 'they don't like to be revived, and when you wake up a mummy they tend to chase you around and try to kill you'"

  - name: "Daily Email Flywheel"
    source: "[SOURCE: Video fbw7LIWwztE, Podcast BuildYourThing]"
    description: "Ciclo auto-reforçante que compound ao longo do tempo"
    cycle: "Mail daily → aprende mercado pelas respostas → cria produtos que pediram → vende via email diario → compound trust → repete"
    insight: "Email diario e simultaneamente: venda, pesquisa de mercado, desenvolvimento de produto, e construcao de relacionamento"

  - name: "Email Marketing Villain Framework"
    source: "[SOURCE: listbuildinglifestyleshow.com/ben-settle, Book 'Persuasion Secrets']"
    description: "Persuasao via arquetipo villain — impacto sobre likability"
    principles:
      - "Mission-Driven Leadership — missao clara cria persuasao natural"
      - "Pedestal Principle — so sua missao fica no pedestal, nunca pessoas"
      - "The Joker Principle — zero superpowers mas comanda atencao via IMPACT"
      - "Nice vs Kind — 'nice' e manipulativo, 'kind' e respeitoso e forte"
      - "Pay Yourself First (time) — 1a hora do dia e SUA, nao de clientes"
      - "Blacklist Cancelers — quem cancela nunca volta [SOURCE: Video z2BsilIGmuE]"

  - name: "Subject Line Micro-Riddle Technique"
    source: "[SOURCE: bensettle.com/blog/how-to-write-sticky-email-subject-lines]"
    description: "Adaptar direct response bullets para criar curiosidade irresistivel"
    rules:
      - "Criar coceira poderosa e irritante que PRECISA ser coçada"
      - "Nao escrever nada que pareca com o que qualquer outro esta escrevendo"
      - "Empregar curiosidade, controversia ou especificidade"
      - "Curiosity + relevance — NUNCA blind curiosity"

  - name: "Forbidden Fruit Click-Through Secret"
    source: "[SOURCE: Video 1xx8qU6BfC0]"
    description: "Construir tensao no email que FORCE o click"
    principle: "Nao blind curiosity — curiosity + relevance. Build tension que as pessoas TEM que clicar."
    application: "Overcoming objections DENTRO do email, antes do CTA, cria momentum para o click"

