# Copy Blending Rules (future feature)
blending_rules:
  max_agents_per_project: 3
  blending_order: "Primary writes → Secondary reviews → Blend merge"
  conflict_resolution: "Copy Chief decides which version wins per section"
  mandatory_sequence:
    - "Always run Tier 0 diagnostic first"
    - "Strategists (Todd Brown, Hormozi, Kennedy) before Executors"
    - "Sugarman QA gate always last"
  prohibited_blends:
    - "Halbert + Carlton (charm vs aggression conflict)"
    - "Ogilvy + Makepeace (sophisticated vs visceral conflict)"
    - "Settle + Chaperon on same list (frequency confusion)"

