sop_ml:
  metadata:
    schema_version: "1.0.0"
    sop_id: "SOP-CI-001"
    title: "Pipeline Cohort Intelligence — Transcript to Dashboard"
    version: "1.2.0"
    status: draft
    created_date: "2026-03-18"
    last_updated: "2026-03-18"
    next_review: "2026-09-18"
    owner:
      role: "Cohort Operations Lead"
      name: "Tech Lead"
    tags:
      - cohort
      - pipeline
      - transcript
      - dashboard
      - insights
      - vercel
      - react
      - typescript
      - quality-gates
    compliance:
      - standard_id: "ISO-9001"
        clauses: ["7.5", "8.1", "8.5.1", "8.7"]
      - standard_id: "SIX-SIGMA"
        clauses: ["Control Plan", "Standardized Work", "Response Plan"]
      - standard_id: "GAWANDE-CHECKLIST"
        clauses: ["READ-DO", "Pause Points", "Simple Language"]
    source:
      type: converted
      source_ref: "sop-cohort-intelligence-pipeline.md"
      extraction_confidence: 0.95

  purpose:
    objective: "Transformar gravações de calls de cohort em dashboards interativos deployados na Vercel, seguindo um pipeline de 6 fases com quality gates bloqueantes e completude >= 95%."
    scope:
      in_scope:
        - "Pipeline completo: transcript bruto → dashboard Vercel live"
        - "6 fases sequenciais com quality gates bloqueantes"
        - "Processamento de transcripts de qualquer fonte (Fathom, Zoom, manual)"
        - "Extração de insights por participante (16 tipos)"
        - "Análise técnica profunda por tópico"
        - "Geração de data files TypeScript"
        - "Build de dashboard React no ps-hub"
        - "Deploy na Vercel"
      out_of_scope:
        - "Gravação das calls (responsabilidade do facilitador)"
        - "Manutenção do Design System LUXE"
        - "Criação de novos tipos de insight além dos 15 definidos"
        - "Alterações na arquitetura do ps-hub"
    target_audience:
      - type: hybrid
        role: "Pipeline Operator"
        required_skills:
          - "Claude Code com squad cohort-intelligence"
          - "Terminal bash básico"
          - "Vercel CLI"

  definitions:
    - term: "Cohort"
      definition: "Grupo de participantes em programa de mentoria/aceleração"
    - term: "Slug"
      definition: "Identificador curto do cohort (ex: psa2, imersao-1)"
    - term: "ps-hub"
      definition: "Aplicação React unificada que hospeda todos os dashboards de cohort como rotas"
    - term: "LUXE"
      definition: "Design System visual usado nos dashboards (dark theme, animações Framer Motion)"
    - term: "Quality Gate"
      acronym: "QG"
      definition: "Checkpoint bloqueante automatizado — falha = pipeline PARA"
    - term: "Racional Técnico"
      definition: "Análise técnica profunda que conecta insights a princípios de engenharia"
    - term: "Insight Type"
      definition: "Classificação do insight entre 16 tipos: PERGUNTA, RESPOSTA, INSIGHT, SUGESTAO, PROCESSO, DICA, CONTEXTO, PROBLEMA, IDEIA, ARQUITETURA, DESCOBERTA, MECANISMO, USO_REAL, BENCHMARK, CONFIG, OBSERVACAO"
    - term: "Tier"
      definition: "Nível de complexidade da fase (0=simples, 1=intermediário, 2=complexo)"
    - term: "PSA2"
      definition: "Gold standard — primeiro cohort processado que validou todo o pipeline"
    - term: "Pipeline State"
      definition: "Arquivo JSON que rastreia progresso de cada fase"

  raci:
    - activity: "Processar Transcript (Fase 1)"
      responsible: "transcript-processor (agent)"
      accountable: "Pipeline Operator"
      informed: ["Cohort Chief"]
    - activity: "Extrair Insights (Fase 2)"
      responsible: "insight-extractor (agent)"
      accountable: "Pipeline Operator"
      informed: ["Cohort Chief"]
    - activity: "Gerar Racional Técnico (Fase 3)"
      responsible: "technical-analyst (agent)"
      accountable: "Pipeline Operator"
      informed: ["Cohort Chief"]
    - activity: "Gerar Data Files (Fase 4)"
      responsible: "data-generator (agent)"
      accountable: "Pipeline Operator"
      informed: ["Cohort Chief"]
    - activity: "Build Dashboard (Fase 5)"
      responsible: "dashboard-builder (agent)"
      accountable: "Pipeline Operator"
      informed: ["Cohort Chief"]
    - activity: "Deploy (Fase 6)"
      responsible: "cohort-chief (orchestrator)"
      accountable: "Pipeline Operator"
      informed: ["Cohort Chief", "Stakeholders"]
    - activity: "Gravar call e fornecer transcript"
      responsible: "Facilitador"
      accountable: "Facilitador"
      informed: ["Pipeline Operator", "Tech Lead", "Squad Owner"]
    - activity: "Validação Final (QG-FINAL)"
      responsible: "Pipeline Operator"
      accountable: "Tech Lead"
      informed: ["Facilitador", "Squad Owner"]
    - activity: "Aprovar SOP para uso"
      responsible: "Tech Lead"
      accountable: "Tech Lead"
      informed: ["Pipeline Operator", "Facilitador"]
    - activity: "Revisar SOP (periódico)"
      responsible: "Tech Lead"
      accountable: "Tech Lead"
      consulted: ["Pipeline Operator", "Squad Owner"]
    - activity: "Escalar falha L2+"
      responsible: "Pipeline Operator"
      accountable: "Tech Lead"
      consulted: ["Squad Owner"]
    - activity: "Escalar falha L3 (infraestrutura)"
      responsible: "Pipeline Operator"
      accountable: "Squad Owner"
      consulted: ["Tech Lead"]
    - activity: "Onboarding de novo operador"
      responsible: "Squad Owner"
      accountable: "Squad Owner"
      consulted: ["Pipeline Operator"]

  prerequisites:
    tools:
      - name: "Node.js"
        version: "18+"
        purpose: "Runtime JavaScript"
        install_command: "node --version"
      - name: "pnpm"
        version: "latest"
        purpose: "Package manager"
        install_command: "pnpm --version"
      - name: "TypeScript"
        version: "5+"
        purpose: "Type safety"
        install_command: "tsc --version"
      - name: "Vercel CLI"
        version: "latest"
        purpose: "Deploy platform"
        install_command: "vercel whoami"
      - name: "Claude Code"
        purpose: "AI agent execution"
    access:
      - system: "Repositório pro4"
        level: "clone com branch atualizada"
      - system: "Vercel"
        level: "deploy (autenticado)"
    conditions:
      - condition: "ps-hub builda sem erros"
        verification: "cd apps/ps-hub && pnpm run build"
      - condition: "Transcript disponível"
        verification: "ls transcript-bruto.txt"
    operator_competencies:
      - skill: "TypeScript / JavaScript"
        level: "Intermediário"
        verification: "Consegue corrigir erros de tsc --noEmit sem assistência"
      - skill: "React (JSX/TSX)"
        level: "Básico"
        verification: "Consegue identificar qual componente renderiza qual dado"
      - skill: "Claude Code"
        level: "Operacional"
        verification: "Já executou pelo menos 1 pipeline completo com supervisão"
      - skill: "Git"
        level: "Básico"
        verification: "Consegue criar branch e commitar sem auxílio"
      - skill: "Terminal / CLI"
        level: "Intermediário"
        verification: "Consegue diagnosticar falhas de build a partir do log"
      - skill: "Vercel"
        level: "Básico"
        verification: "Já fez pelo menos 1 deploy com vercel --prod"
    certification:
      requirement: "Operadores novos DEVEM executar o pipeline completo 1 vez no cohort PSA2 (gold standard) com supervisão de um operador certificado antes de operar de forma autônoma."
      gold_standard_cohort: "PSA2"
    preflight_checklist:
      - check: "Node.js 18+ instalado"
        command: "node --version"
      - check: "pnpm instalado"
        command: "pnpm --version"
      - check: "Vercel CLI autenticado"
        command: "vercel whoami"
      - check: "TypeScript 5+ disponível"
        command: "tsc --version"
      - check: "ps-hub builda sem erros"
        command: "cd apps/ps-hub && pnpm run build"
      - check: "Transcript disponível"
        command: "ls transcript-bruto.txt"

  training_and_distribution:
    distribution_list:
      - role: "Operadores do pipeline"
        access: "Leitura + Execução"
        notification: "A cada nova versão do SOP"
      - role: "Facilitadores de cohort"
        access: "Leitura (Seções 1-5 e Trigger)"
        notification: "Quando nova call é gravada"
      - role: "Tech Lead"
        access: "Leitura + Aprovação"
        notification: "A cada revisão do SOP"
      - role: "Squad Owner (cohort-intelligence)"
        access: "Leitura + Governança"
        notification: "A cada mudança de infraestrutura"
    onboarding:
      steps:
        - "Ler este SOP completo (tempo estimado: 30 min)"
        - "Executar o pipeline PSA2 com supervisão (gold standard)"
        - "Passar no checklist de verificação com operador certificado"
        - "Registrar conclusão no log de treinamento"

  procedure:
    phases:
      - phase_id: "P1"
        name: "Processar Transcript"
        description: "Limpar e estruturar transcript bruto"
        estimated_duration: "PT15M"
        steps:
          - step_id: "S1.1"
            action: "Validar que o transcript existe e tem conteúdo"
            actor: "Pipeline Operator"
            command: "wc -w transcript-bruto.txt"
            verification:
              method: command
              check: "wc -w transcript-bruto.txt"
              expected: "> 500 palavras"
            on_failure:
              action: abort
              escalate_to: "Facilitador do cohort"

          - step_id: "S1.2"
            action: "Executar task process-transcript no Claude Code"
            actor: "transcript-processor (agent)"
            input:
              type: file
              source: "transcript-bruto.txt"
            output:
              type: file
              description: "Transcript limpo e estruturado"
              location: "calls/transcripts/{cohort}-clean.md"

          - step_id: "S1.3"
            action: "Verificar output gerado"
            actor: "Pipeline Operator"
            command: "ls -la calls/transcripts/{cohort}-clean.md"
            verification:
              method: command
              check: "[ -f 'calls/transcripts/{cohort}-clean.md' ]"
              expected: "Arquivo existe"
            on_failure:
              action: retry
              max_retries: 3
              rollback_to: "S1.2"

      - phase_id: "P2"
        name: "Extrair Insights"
        description: "Extrair e classificar insights por participante"
        estimated_duration: "PT30M"
        steps:
          - step_id: "S2.1"
            action: "Confirmar que QG-001 passou"
            actor: "Pipeline Operator"
            command: "./pipeline-quality-gates.sh qg-001 {cohort}"
            verification:
              method: command
              check: "./pipeline-quality-gates.sh qg-001 {cohort}"
              expected: "ALL PASS"
            on_failure:
              action: abort

          - step_id: "S2.2"
            action: "Executar task extract-insights no Claude Code"
            actor: "insight-extractor (agent)"
            input:
              type: previous_step_output
              source: "S1.2"
            output:
              type: file
              description: "Insights extraídos por participante"
              location: "calls/summaries/{cohort}-insights-extraction.md"

      - phase_id: "P3"
        name: "Gerar Racional Técnico"
        description: "Análise técnica profunda por tópico"
        estimated_duration: "PT40M"
        steps:
          - step_id: "S3.1"
            action: "Confirmar que QG-002 passou"
            actor: "Pipeline Operator"
            command: "./pipeline-quality-gates.sh qg-002 {cohort}"
            verification:
              method: command
              check: "./pipeline-quality-gates.sh qg-002 {cohort}"
              expected: "ALL PASS"
            on_failure:
              action: abort

          - step_id: "S3.2"
            action: "Executar task generate-racional no Claude Code"
            actor: "technical-analyst (agent)"
            input:
              type: previous_step_output
              source: "S2.2"
            output:
              type: file
              description: "Racional técnico com síntese"
              location: "calls/summaries/{cohort}-racional-tecnico.md"

      - phase_id: "P4"
        name: "Gerar Data Files TypeScript"
        description: "Converter MDs em 7 arquivos TypeScript tipados"
        estimated_duration: "PT60M"
        steps:
          - step_id: "S4.1"
            action: "Confirmar que QG-003 passou"
            actor: "Pipeline Operator"
            command: "./pipeline-quality-gates.sh qg-003 {cohort}"
            verification:
              method: command
              check: "./pipeline-quality-gates.sh qg-003 {cohort}"
              expected: "ALL PASS"
            on_failure:
              action: abort

          - step_id: "S4.2"
            action: "Executar task generate-data-files no Claude Code"
            actor: "data-generator (agent)"
            input:
              type: previous_step_output
              source: "S2.2, S3.2"
            output:
              type: file
              description: "7 arquivos TypeScript"
              location: "apps/ps-hub/cohorts/{slug}/data/"

          - step_id: "S4.3"
            action: "Verificar compilação TypeScript"
            actor: "Pipeline Operator"
            command: "cd apps/ps-hub && npx tsc --noEmit"
            verification:
              method: command
              check: "cd apps/ps-hub && npx tsc --noEmit"
              expected: "Exit code 0"
            on_failure:
              action: retry
              max_retries: 3
              rollback_to: "S4.2"

      - phase_id: "P5"
        name: "Build Dashboard"
        description: "Criar componentes React e integrar ao ps-hub"
        estimated_duration: "PT60M"
        steps:
          - step_id: "S5.1"
            action: "Confirmar que QG-004 passou"
            actor: "Pipeline Operator"
            command: "./pipeline-quality-gates.sh qg-004 {cohort} {slug}"
            verification:
              method: command
              check: "./pipeline-quality-gates.sh qg-004 {cohort} {slug}"
              expected: "ALL PASS"
            on_failure:
              action: abort

          - step_id: "S5.2"
            action: "Executar task build-dashboard no Claude Code"
            actor: "dashboard-builder (agent)"
            input:
              type: previous_step_output
              source: "S4.2"
            output:
              type: file
              description: "Dashboard React como rota no ps-hub"
              location: "apps/ps-hub/cohorts/{slug}/"

          - step_id: "S5.3"
            action: "Verificar build do ps-hub"
            actor: "Pipeline Operator"
            command: "cd apps/ps-hub && pnpm run build"
            verification:
              method: command
              check: "[ -f 'apps/ps-hub/dist/index.html' ]"
              expected: "dist/index.html existe"
            on_failure:
              action: retry
              max_retries: 3
              rollback_to: "S5.2"

      - phase_id: "P6"
        name: "Deploy"
        description: "Deploy para Vercel produção"
        estimated_duration: "PT10M"
        steps:
          - step_id: "S6.1"
            action: "Confirmar que QG-005 passou"
            actor: "Pipeline Operator"
            command: "./pipeline-quality-gates.sh qg-005 {cohort} {slug}"
            verification:
              method: command
              check: "./pipeline-quality-gates.sh qg-005 {cohort} {slug}"
              expected: "ALL PASS"
            on_failure:
              action: abort

          - step_id: "S6.2"
            action: "Verificar autenticação Vercel"
            actor: "Pipeline Operator"
            command: "vercel whoami"
            verification:
              method: command
              check: "vercel whoami"
              expected: "Retorna username"
            on_failure:
              action: alternate_path
              alternate_step: "S6.2b"
            notes: "Se falhar, executar 'vercel login'"

          - step_id: "S6.3"
            action: "Deploy para produção"
            actor: "Pipeline Operator"
            command: "cd apps/ps-hub && vercel --prod --yes"
            output:
              type: state_change
              description: "Dashboard live na Vercel"
            on_failure:
              action: retry
              max_retries: 2
              escalate_to: "Tech Lead"
            warnings:
              - level: caution
                message: "Verificar que rotas existentes não foram afetadas após deploy"

          - step_id: "S6.4"
            action: "Executar health checks pós-deploy"
            actor: "Pipeline Operator"
            command: "curl -s -o /dev/null -w '%{http_code}' '{deployed_url}/{slug}'"
            verification:
              method: command
              check: "curl -s -o /dev/null -w '%{http_code}' '{deployed_url}/{slug}'"
              expected: "200"
            on_failure:
              action: rollback
              rollback_to: "S6.3"

  exception_handling:
    exceptions:
      - exception_id: "EX001"
        trigger: "Transcript com < 500 palavras"
        severity: critical
        related_gate: "QG-001"
        symptoms:
          - "wc -w retorna < 500"
        resolution:
          - "STOP: Transcript insuficiente"
          - "Solicitar nova gravação ao facilitador"
        escalation:
          to: "Facilitador do cohort"
          sla: "Próxima sessão"
        prevention: "Verificar duração mínima da call antes de iniciar pipeline"

      - exception_id: "EX002"
        trigger: "Apenas 1 speaker no transcript"
        severity: critical
        related_gate: "QG-001"
        symptoms:
          - "grep -c '^### ' retorna 1"
        resolution:
          - "STOP: Análise de cohort requer múltiplos participantes"
          - "Verificar se o transcript foi processado corretamente"
        prevention: "Garantir que calls tenham pelo menos 2 participantes"

      - exception_id: "EX003"
        trigger: "TypeScript não compila"
        severity: high
        related_gate: "QG-004"
        symptoms:
          - "npx tsc --noEmit retorna exit code != 0"
        resolution:
          - "Verificar interfaces vs PSA2 reference"
          - "Corrigir erros de tipo nos data files"
          - "Re-executar generate-data-files"
        escalation:
          to: "Tech Lead"
          sla: "4 horas úteis"

      - exception_id: "EX004"
        trigger: "Completude < 95%"
        severity: high
        related_gate: "QG-FINAL"
        symptoms:
          - "Contagem source vs app mostra gap > 5%"
        resolution:
          - "Identificar insights faltantes comparando extraction MD com participants.ts"
          - "Corrigir data files manualmente ou re-executar"
        prevention: "Filosofia 'Sem preguiça' — enforcement programático"

    failure_impact_by_gate:
      - gate: "QG-001"
        rework_time: "PT15M"
        impact: "Bloqueia tudo — nenhuma fase subsequente inicia"
        cost: "Baixo: reprocessamento rápido"
      - gate: "QG-002"
        rework_time: "PT30M"
        impact: "Bloqueia Fases 3-6 — insights incompletos propagam erros downstream"
        cost: "Médio: retrabalho de extração + validação manual"
      - gate: "QG-003"
        rework_time: "PT40M"
        impact: "Bloqueia Fases 4-6 — racional raso gera data files sem profundidade técnica"
        cost: "Médio: extended thinking consome mais tokens"
      - gate: "QG-004"
        rework_time: "PT60M"
        impact: "Bloqueia Fases 5-6 — erros de tipo requerem debugging manual"
        cost: "Alto: debugging TypeScript + regeneração parcial"
      - gate: "QG-005"
        rework_time: "PT60M"
        impact: "Bloqueia deploy — componentes quebrados requerem correção React"
        cost: "Alto: debugging React + rebuild completo"
      - gate: "QG-006"
        rework_time: "PT15M"
        impact: "Bloqueia entrega — stakeholders não recebem o dashboard"
        cost: "Médio: geralmente config Vercel, resolução rápida"
      - gate: "QG-FINAL"
        rework_time: "PT120M"
        impact: "Requer auditoria de completude item-a-item entre source e app"
        cost: "Muito Alto: comparação manual insight-por-insight"
    cascade_cost_note: "Uma falha no QG-005 que origina de um problema no QG-002 gera retrabalho em cascata de 2-4 horas. Detectar cedo é 5-10x mais barato que detectar tarde."

    rca_protocol:
      name: "5-Why Rápido"
      trigger: "Mesmo quality gate falha 3+ vezes no mesmo cohort, ou 2+ vezes em cohorts diferentes"
      method: "5-Why"
      template:
        - "Falha observada: [descrever o sintoma]"
        - "Por que 1: [causa imediata]"
        - "Por que 2: [causa da causa]"
        - "Por que 3: [causa mais profunda]"
        - "Por que 4: [causa sistêmica]"
        - "Por que 5: [causa raiz]"
        - "Ação corretiva: [ação que endereça a causa raiz, não o sintoma]"
      registration: "Documentar a RCA no pipeline state ou como comentário no commit de correção"

    escalation_matrix:
      - level: "L1"
        name: "Operador"
        condition: "Quality gate falha (tentativas 1-2)"
        contact: "Auto-resolução com troubleshooting"
        sla: "Imediato"
      - level: "L2"
        name: "Tech Lead"
        condition: "3 falhas consecutivas no mesmo gate"
        contact: "Tech Lead do projeto"
        sla: "4 horas úteis"
      - level: "L3"
        name: "Squad Owner"
        condition: "Pipeline bloqueado por issue de infraestrutura"
        contact: "Owner do squad cohort-intelligence"
        sla: "1 dia útil"
      - level: "L4"
        name: "Facilitador"
        condition: "Transcript de qualidade insuficiente"
        contact: "Facilitador do cohort"
        sla: "Próxima sessão"
    escalation_rule: "Cada nível DEVE ser tentado antes de escalar ao próximo. Documente o problema e as tentativas de resolução antes de escalar."

  insight_taxonomy:
    - type: "PERGUNTA"
      luxe_color: "text-blue-400"
      description: "Questão levantada"
    - type: "RESPOSTA"
      luxe_color: "text-green-400"
      description: "Resposta fornecida"
    - type: "INSIGHT"
      luxe_color: "text-purple-400"
      description: "Observação ou realização"
    - type: "SUGESTAO"
      luxe_color: "text-yellow-400"
      description: "Recomendação acionável"
    - type: "PROBLEMA"
      luxe_color: "text-red-400"
      description: "Issue ou blocker"
    - type: "OBSERVACAO"
      luxe_color: "text-gray-400"
      description: "Nota geral"
    - type: "PROCESSO"
      description: "Processo descrito"
    - type: "DICA"
      description: "Tip prático"
    - type: "CONTEXTO"
      description: "Informação contextual"
    - type: "IDEIA"
      description: "Ideia nova"
    - type: "ARQUITETURA"
      description: "Decisão arquitetural"
    - type: "DESCOBERTA"
      description: "Descoberta empírica"
    - type: "MECANISMO"
      description: "Mecanismo explicado"
    - type: "USO_REAL"
      description: "Caso de uso real"
    - type: "BENCHMARK"
      description: "Dado comparativo"
    - type: "CONFIG"
      description: "Configuração específica"

  quality_criteria:
    kpis:
      - kpi_id: "KPI-001"
        name: "Completude de Insights"
        target: ">= 95%"
        unit: "percentage"
        measurement_method: "Contagem de insights no source vs app"
        frequency: per_execution
      - kpi_id: "KPI-002"
        name: "Pipeline Duration"
        target: "<= 4 horas"
        unit: "hours"
        measurement_method: "Timestamp início - timestamp fim"
        frequency: per_execution
      - kpi_id: "KPI-003"
        name: "Quality Gate Pass Rate"
        target: ">= 80% first-attempt"
        unit: "percentage"
        measurement_method: "Gates passados na primeira tentativa / total de gates"
        frequency: per_execution
    acceptance_criteria:
      - criteria: "Todos os 7 quality gates PASS"
        measurable: true
        threshold: "7/7 PASS"
      - criteria: "Dashboard acessível via HTTP 200"
        measurable: true
        threshold: "HTTP 200 com > 1000 bytes"
      - criteria: "Completude >= 95%"
        measurable: true
        threshold: "95%"
      - criteria: "Rotas existentes não afetadas"
        measurable: true
