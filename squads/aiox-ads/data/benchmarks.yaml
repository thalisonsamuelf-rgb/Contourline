# Thresholds for Kill/Scale decisions
decision_thresholds:
  kill:
    cpa_multiplier: 3.0  # CPA > 3x target = pause
    roas_floor: 0.5       # ROAS < 0.5 = pause
    ctr_floor: 0.005      # CTR < 0.5% = pause ad
  watch:
    cpa_multiplier: 1.5   # CPA > 1.5x target = reduce budget
    frequency_ceiling: 3.0 # Frequency > 3.0 = refresh
  scale:
    roas_stable_days: 7   # Minimum days above target
    max_budget_increase: 0.20  # +20% max per adjustment
    min_conversions: 50   # Minimum conversions for confidence
