language: pt-BR

reviews:
  profile: balanced
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "workspace/**"
      instructions: |
        Focus on code quality, performance, and security.
        Check for proper error handling and input validation.
        Verify business logic correctness.

    - path: "squads/**"
      instructions: |
        Review squad configuration and agent definitions.
        Ensure consistency with AIOX framework patterns.

    - path: "**/*.test.*"
      instructions: |
        Ensure test coverage and edge cases.
        Verify mock implementations are correct.
        Check for flaky test patterns.

    - path: ".github/**"
      instructions: |
        Validate workflow syntax and action versions.
        Check for security best practices in CI/CD.
        Verify secret usage patterns.

  path_filters:
    - "!**/.aiox-core/**"
    - "!**/node_modules/**"
    - "!**/*.lock"
    - "!**/pro-installed-manifest.yaml"
    - "!**/pro-version.json"

chat:
  auto_reply: true
