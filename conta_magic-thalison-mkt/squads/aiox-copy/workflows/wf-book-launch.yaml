  semana_menos_2: "Phase 2: Pre-Launch (PLC2, PLC3)"
  semana_menos_1: "Phase 2: Pre-Launch (Final prep, PLC3)"
  semana_0: "Phase 3: LAUNCH WEEK"
  semana_1_plus: "Phase 4: Post-Launch & Evergreen"
