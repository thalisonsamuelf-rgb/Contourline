workflow:
  id: wf-book-launch
  name: Book Launch System
  version: "2.0"
  description: |
    Sistema completo de lançamento de livro combinando:
    - Russell Brunson: Book Funnel (Free+Shipping) com Value Ladder
    - Jeff Walker: Product Launch Formula com PLCs e Mental Triggers

    VALIDAÇÃO:
    - Russell Brunson: $100M+ com DotCom Secrets, Expert Secrets, Traffic Secrets
    - Jeff Walker: $1B+ em vendas de alunos usando PLF

    FILOSOFIA:
    O livro NÃO é o produto final. O livro é a PORTA DE ENTRADA para toda a Value Ladder.
    O objetivo não é lucrar no livro - é adquirir clientes que sobem a escada.
  reference_note: Brunson-specific upsell, follow-up, template and checklist assets remain planned and are not implemented in the current squad runtime.
  type: reference-playbook
  status: reference_only_non_canonical
  sequence:
    - step: phase-0-foundation
      id: phase-0-foundation
      phase: 1
      phase_name: Foundation & Strategy
      agent: russell-brunson
      action: execute_foundation-strategy
      next: phase-1-funnel-build
    - step: phase-1-funnel-build
      id: phase-1-funnel-build
      phase: 2
      phase_name: Book Funnel Construction
      agent: russell-brunson
      action: execute_book-funnel-construction
      next: phase-2-prelaunch
    - step: phase-2-prelaunch
      id: phase-2-prelaunch
      phase: 3
      phase_name: Pre-Launch Content (PLF)
      agent: jeff-walker
      action: execute_pre-launch-content-plf
      next: phase-3-launch
    - step: phase-3-launch
      id: phase-3-launch
      phase: 4
      phase_name: Open Cart Launch
      agent: russell-brunson
      action: execute_open-cart-launch
      next: phase-4-post-launch
    - step: phase-4-post-launch
      id: phase-4-post-launch
      phase: 5
      phase_name: Post-Launch & Evergreen
      agent: russell-brunson
      action: execute_post-launch-evergreen
    - workflow_end:
        id: complete
        action: workflow_complete
