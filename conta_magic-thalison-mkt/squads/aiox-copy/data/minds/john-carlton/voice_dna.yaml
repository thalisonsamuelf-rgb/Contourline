  on_process:
    - {phrase: "Be the Sales Detective. Investigue antes de escrever.", source: "[SOURCE: Kickass Copywriting, cap.IV]"}
    - {phrase: "It's a mess to guess!", source: "[SOURCE: Kickass Copywriting, cap.II]"}
