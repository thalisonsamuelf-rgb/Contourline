workflow:
  id: wf-plan-squad
  name: Deep Squad Planning
  version: "1.0.0"
  purpose: >
    Create a deep, execution-ready PRD for a squad before running create-squad.
    This workflow exists for large or high-risk squads that need full planning
    visibility before implementation starts.
  description: |
    Pro-only planning workflow for squads that require a full product-level PRD
    before creation. Produces a deep planning document in
    docs/projects/{domain}/prd.md and a runtime planning summary.
  type: planning
  orchestrator: "@squad-chief"
  specialists:
    - "@pedro-valerio"
    - "@thiago_finch"
  mode: guided
  command: "*plan-squad {domain} [--purpose \"...\"] [--target-user \"...\"] [--reference {path}] [--output {path}] [--business {slug}] [--product {slug}] [--app {id}]"
  governance_protocol: squads/squad-creator/protocols/ai-first-governance.md
  distribution_constraint: pro_only
  inputs:
    required:
      - name: domain
        type: string
        description: Domain or squad problem space to plan
        example: editais
    optional:
      - name: purpose
        type: string
        description: High-level purpose of the squad
      - name: target_user
        type: string
        description: Primary user or operator of the squad
      - name: reference
        type: path
        description: Optional benchmark document used to calibrate depth
      - name: output
        type: path
        default: docs/projects/{domain}/prd.md
        description: Explicit PRD output path
      - name: business
        type: string
        description: Optional business slug for environment contract resolution
      - name: product
        type: string
        description: Optional product slug for environment contract resolution
      - name: app
        type: string
        description: Optional app id for environment contract resolution
  veto_conditions:
    - id: PS_VC_001
      trigger: Problem framing absent and no defensible evidence to infer it
      action: BLOCK - ask for problem framing before generating a deep PRD.
    - id: PS_VC_002
      trigger: Workflow/capability inventory skipped
      action: BLOCK - a deep PRD cannot be assembled without scope mapping.
    - id: PS_VC_003
      trigger: Reference document copied literally instead of adapted by pattern
      action: BLOCK - preserve depth, not domain-specific cargo culting.
    - id: PS_VC_004
      trigger: PRD assembled without roadmap, governance, or open questions
      action: BLOCK - document is not execution-ready.
  outputs:
    - docs/projects/{domain}/prd.md
    - .aiox/squad-runtime/plan-squad/{domain}/planning-summary.yaml
  sequence:
    - step: phase-0
      id: phase-0
      phase: 1
      phase_name: PREFLIGHT
      agent: squad-chief
      action: resolve_planning_contract
      outputs:
        - planning_contract
        - environment_contract
      next: phase-1
    - step: phase-1
      id: phase-1
      phase: 2
      phase_name: DEPTH CALIBRATION
      agent: squad-chief
      action: calibrate_reference_depth
      outputs:
        - depth_rules
        - reference_delta
      next: phase-2
    - step: phase-2
      id: phase-2
      phase: 3
      phase_name: DOMAIN MAPPING
      agent: squad-chief
      action: map_capabilities_and_workflows
      outputs:
        - capability_map
        - workflow_inventory
        - risk_inputs
      next: phase-3
    - step: phase-3
      id: phase-3
      phase: 4
      phase_name: ARCHITECTURE
      agent: squad-chief
      action: design_agent_architecture_and_governance
      outputs:
        - agent_architecture
        - knowledge_model
        - governance_contract
      next: phase-4
    - step: phase-4
      id: phase-4
      phase: 5
      phase_name: ROADMAP
      agent: pedro-valerio
      action: define_epics_stories_and_quality_gates
      outputs:
        - roadmap
        - quality_gate_matrix
      next: phase-5
    - step: phase-5
      id: phase-5
      phase: 6
      phase_name: PRD ASSEMBLY
      agent: squad-chief
      action: assemble_prd_from_template
      outputs:
        - docs/projects/{domain}/prd.md
        - .aiox/squad-runtime/plan-squad/{domain}/planning-summary.yaml
      next: phase-6
    - step: phase-6
      id: phase-6
      phase: 7
      phase_name: HANDOFF
      agent: squad-chief
      action: prepare_execution_handoff
      outputs:
        - execution_handoff
      next: complete
    - workflow_end:
        id: complete
        action: workflow_complete
  checkpoints:
    - id: CP_SCOPE
      phase: preflight
      decision: PROBLEM_AND_SCOPE_CLEAR
      blocking: true
    - id: CP_DEPTH
      phase: depth-calibration
      decision: DEPTH_CALIBRATED_WITHOUT_DOMAIN_LEAK
      blocking: true
    - id: CP_ARCH
      phase: architecture
      decision: ARCHITECTURE_AND_GOVERNANCE_COVERED
      blocking: true
    - id: CP_PRD
      phase: prd-assembly
      decision: PRD_DEEP_ENOUGH_FOR_EXECUTION
      blocking: true
    - id: CP_HANDOFF
      phase: handoff
      decision: READY_FOR_PRE_EXISTING_BRIEF_FLOW
      blocking: true
  handoff_prompts:
    - from: squad-chief
      to: pedro-valerio
      when: roadmap phase starts
      prompt: Share `planning_contract`, `workflow_inventory`, and `governance_contract` so roadmap and quality gates stay aligned with the PRD scope.
    - from: pedro-valerio
      to: squad-chief
      when: PRD assembly resumes
      prompt: Return `roadmap` and `quality_gate_matrix` with explicit vetoes, gaps, and dependencies so final assembly stays execution-ready.
  handoff:
    downstream_mode: pre_existing_brief
    next_command: "*create-squad {domain}"
    required_context:
      - docs/projects/{domain}/prd.md
      - .aiox/squad-runtime/plan-squad/{domain}/planning-summary.yaml
