workflow:
  id: wf-workspace-integration-hardening
  name: Workspace Integration Hardening
  version: 1.0.0
  purpose: Orquestrar auditoria + remediação de integração de um squad com o workspace usando contrato template-first
  description: Brownfield hardening workflow for workspace contract audit, remediation, and revalidation.
  orchestrator: "@squad-chief"
  type: brownfield
  sequence:
    - phase: baseline
      agent: various
      task: validate-squad
      action: capture_baseline_validation
      notes: Captura score base e bloqueios estruturais iniciais
    - phase: workspace-audit
      agent: various
      task: workspace-integration-hardening
      action: audit_workspace_integration
      notes: Executar em modo --audit --strict para mapear gaps de contrato e template
      outputs:
        - .aiox/squad-runtime/squad-upgrade/{squad_name}/workspace-hardening-audit.yaml
    - phase: workspace-remediation
      agent: various
      task: workspace-integration-hardening
      action: remediate_workspace_integration
      notes: Executar em modo --apply --strict para corrigir contrato, outputs canônicos e templates
      outputs:
        - .aiox/squad-runtime/squad-upgrade/{squad_name}/workspace-hardening-remediation.yaml
    - phase: workspace-revalidation
      agent: various
      task: workspace-integration-hardening
      action: revalidate_workspace_integration
      notes: Executar em modo --audit --strict após correções
      outputs:
        - .aiox/squad-runtime/squad-upgrade/{squad_name}/workspace-hardening-final.yaml
    - phase: quality
      agent: various
      task: validate-squad
      action: validate_post_hardening_quality
      notes: Validação final de qualidade após hardening
    - import: modules/module-quality-gates.yaml
      agent: various
      action: import_module
  checkpoints:
    - id: CP_BASELINE
      phase: baseline
      decision: CONTINUE_OR_ABORT
    - id: CP_AUDIT
      phase: workspace-audit
      decision: GAPS_MAPPED
    - id: CP_REMEDIATION
      phase: workspace-remediation
      decision: REMEDIATION_APPLIED
    - id: CP_WORKSPACE
      phase: workspace-revalidation
      decision: WORKSPACE_CONTRACT_VALID
    - id: CP_FINAL
      phase: quality-final-artifacts
      decision: PASS_OR_REVISE
  outputs:
    - .aiox/squad-runtime/squad-upgrade/{squad_name}/workspace-hardening-audit.yaml
    - .aiox/squad-runtime/squad-upgrade/{squad_name}/workspace-hardening-remediation.yaml
    - .aiox/squad-runtime/squad-upgrade/{squad_name}/workspace-hardening-final.yaml
    - .aiox/squad-runtime/squad-upgrade/{squad_name}/workspace-hardening-summary.md
