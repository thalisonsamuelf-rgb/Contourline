# Decision Rules for Campaign Monitor
# 47 Frameworks from 5 Experts mapped to actionable decision rules
# Version: 1.0.0

version: "1.0"
domain: "media-buyer"
total_rules: 47

# ============================================================================
# EXPERT SOURCES
# ============================================================================
experts:
  jeremy-haynes:
    name: "Jeremy Haynes"
    weight: 0.95
    specialization: "Kill/Scale Rules, DSL Revolution, Campaign Structure"
    frameworks_count: 28

  brian-moncada:
    name: "Brian Moncada"
    weight: 0.90
    specialization: "Andromeda Method, Metrics Analysis, Scaling"
    frameworks_count: 10

  alex-hormozi:
    name: "Alex Hormozi"
    weight: 0.92
    specialization: "Unit Economics, LTV/CAC, Offer Strategy"
    frameworks_count: 5

  brandon-carter:
    name: "Brandon Carter"
    weight: 0.88
    specialization: "Hook Testing, Creative Variables"
