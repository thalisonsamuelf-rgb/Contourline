# STEP 9: TOTAL VALUE STACK
# ============================================================================
# Sum all components. This is the number you present BEFORE revealing the price.
total_value_stack:
  components_list: |
    FILL — List all components with values:
    1. [Component Name] .................. [Value]
    2. [Component Name] .................. [Value]
    3. [Component Name] .................. [Value]
    4. [Component Name] .................. [Value]
    5. [Component Name] .................. [Value]
    6. [Component Name] .................. [Value]
    7. [Component Name] .................. [Value]
  total_stacked_value: "FILL — Sum of all component values"
  offer_price: "FILL — What you actually charge"
  value_to_price_ratio: "FILL — e.g., 27:1"
  ratio_check: |
    FILL — Is the ratio at least 10:1?
    If < 10:1: Add more components or increase value justifications.
    If > 30:1: Verify value claims are defensible. Inflated values erode trust.
    If 10:1 to 30:1: Sweet spot. The client sees massive value gap.
  # The presentation script
  stack_reveal_script: |
    FILL — Write the actual script for presenting the value stack:

    "Here is everything you get when you [join/buy/enroll]:

    First, [Component 1] — [what it does]. Alone, this is worth [Value 1].

    But you also get [Component 2] — [what it does]. That is another [Value 2].

    [Continue for each component...]

    Total value: [Total Stacked Value].

    Your investment today: [Offer Price].

    That is [X]% off what all of this is worth individually."
