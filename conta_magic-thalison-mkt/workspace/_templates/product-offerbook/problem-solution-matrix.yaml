# TEMPLATE INSTRUCTIONS
# 1. Start with the Dream Outcome from value-equation.yaml — everything serves that
# 2. Map problems CHRONOLOGICALLY: before, during, after
# 3. Be EXHAUSTIVE in problem identification — missing a problem means missing a value stack item
# 4. Generate solutions WITHOUT judging — divergent thinking first
# 5. THEN judge with the Trim & Stack matrix (value vs cost)
# 6. Check Value Equation coverage — no variable should be uncovered
# 7. Name each component as if it were a standalone product
# 8. Assign defensible values using one of the 4 methods
# 9. Sequence from lowest to highest value for maximum impact
# 10. Write the stack reveal script — this goes directly into sales copy
#
# CROSS-REFERENCES:
# - value-equation.yaml: Dream Outcome and composite scores
# - guarantee-design.yaml: The guarantee sits AFTER the value stack in presentation
# - offerbook.yaml: The complete offer architecture
# - objections.yaml: Problems here often map to objections there
