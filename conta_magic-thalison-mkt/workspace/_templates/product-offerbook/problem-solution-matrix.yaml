# STEP 7: VALUE ASSIGNMENT
# ============================================================================
# Assign a dollar value to each named component.
# The value must be DEFENSIBLE — based on one of these methods:
# 1. What would it cost to buy this separately? (market price)
# 2. What result does it produce? (ROI-based value)
# 3. How much time does it save? (time-based value)
# 4. What would a consultant charge for this? (service-based value)
#
