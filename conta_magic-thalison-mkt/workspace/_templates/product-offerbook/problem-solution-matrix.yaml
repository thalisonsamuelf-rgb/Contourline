# PROBLEM-SOLUTION-MATRIX.YAML - Value Stack Engineering (Hormozi Method)
# Purpose: Systematically map every client problem, generate solutions, trim low-value items, stack high-value items
# Guardian: Offer Engineer / Product Lead
# Timing: FILL after diagnosis.yaml, icp.yaml, and value-equation.yaml are complete
# Framework: Alex Hormozi, $100M Offers — Grand Slam Offer Algorithm (Phase 2: Reverse Engineering Value)
# Dependency: value-equation.yaml (Dream Outcome must be defined first)

metadata:
  version: "1.0"
  product_name: "FILL_THIS"
  status: "INCOMPLETE"
  last_updated: "FILL_THIS"
  owner: "Offer Engineer"
  framework: "Hormozi Problem-Solution Matrix + Value Stacking"
  notes: |
    This file is the CORE of offer construction.
    It answers: "What are ALL the problems the client faces, and what solutions
    address each one with maximum perceived value and minimum delivery cost?"

    PROCESS:
    1. Define the Dream Outcome (from value-equation.yaml)
    2. Map ALL problems chronologically (before, during, after)
    3. Generate a solution for each problem
    4. Score each solution: Perceived Value vs Delivery Cost
    5. TRIM: Remove low-value / high-cost solutions
    6. STACK: Keep high-value / low-cost solutions
    7. Name each solution component
    8. Assign dollar value to each component
    9. Sequence from lowest to highest value
    10. Totalize the stack

    RULE: "An offer divided into named components is worth more than presented as a whole."
    RULE: The goal is not more features. The goal is solving more problems at low delivery cost.
# ============================================================================
# STEP 1: DREAM OUTCOME ANCHOR
# ============================================================================
# Everything in this matrix serves ONE purpose: getting the client to the Dream Outcome.
# Pull this directly from value-equation.yaml.
dream_outcome_anchor:
  one_sentence: "FILL — Copy from value-equation.yaml. The single sentence describing the transformation."
  avatar: "FILL — Who specifically is this for? The more specific, the more problems you can identify."
  current_state: "FILL — Where is the client RIGHT NOW? What is their daily reality?"
  desired_state: "FILL — Where do they want to BE? What does success look like?"
# ============================================================================
