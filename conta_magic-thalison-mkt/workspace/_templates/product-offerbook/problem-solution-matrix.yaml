  perceived_likelihood_solutions: "FILL — Which stacked solutions improve Perceived Likelihood?"
  time_delay_solutions: "FILL — Which stacked solutions reduce Time Delay?"
  effort_sacrifice_solutions: "FILL — Which stacked solutions reduce Effort & Sacrifice?"
  coverage_gaps: |
    FILL — Is any variable NOT addressed by the stacked solutions?
    If yes, go back to Step 3 and generate a solution specifically for that variable.
    The weakest variable in the Value Equation should have the MOST solutions addressing it.

    Gaps identified: FILL (None / List the gaps)
# ============================================================================
# STEP 6: NAMING (MAGIC Framework)
# ============================================================================
# Each solution component gets a compelling, benefit-driven name.
# A named component is perceived as more valuable than an unnamed one.
# "Sales Scripts" = generic. "The Instant Confidence Closing System" = valuable.
#
# MAGIC Naming Elements (use any combination):
# M — Mechanism (what makes it work)
# A — Avatar (who it is for)
# G — Graphic element (memorable word or image)
# I — Idea (the benefit)
# C — Convergence (time constraint)
# O — Outcome (the result)
#
# NAMING RULES:
# - Must sound like it could be sold as a standalone product
# - Must communicate the benefit, not the format
# - Must be specific enough to repel non-ideal clients
# - Numbers add credibility ("7-Step", "30-Day", "The 3 Pillars")
named_components:
  component_1:
    original_solution: "FILL — Link to solution ID from Step 3"
    name: "FILL — The compelling, named component (e.g., 'The 7-Minute Content Arsenal')"
    tagline: "FILL — One sentence explaining what it does for the client"
    magic_elements_used: "FILL — Which MAGIC elements? (e.g., M + I + C)"
  component_2:
