# ============================================================================
# STEP 4: TRIM & STACK (Value vs Cost Matrix)
# ============================================================================
# For EACH solution, evaluate TWO dimensions:
# 1. PERCEIVED VALUE TO CLIENT: How much does the client value this? (High / Medium / Low)
# 2. DELIVERY COST TO BUSINESS: How much does it cost you to deliver? (High / Medium / Low)
#
# DECISION MATRIX:
# High Value + Low Cost  = STACK (keep, these are your best items)
# High Value + High Cost = EVALUATE (keep if margin allows, or find cheaper delivery)
# Low Value  + Low Cost  = INCLUDE IF EASY (padding, but not core)
# Low Value  + High Cost = TRIM (remove immediately)
#
# The IDEAL offer is packed with High Value / Low Cost items.
# Digital products, templates, checklists, recorded content, community access = low cost, high value.
trim_and_stack:
  solution_b1:
    perceived_value: "FILL — High / Medium / Low"
    delivery_cost: "FILL — High / Medium / Low"
