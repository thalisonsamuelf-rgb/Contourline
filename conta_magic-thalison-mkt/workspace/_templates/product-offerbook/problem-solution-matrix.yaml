# ============================================================================
# STEP 8: SEQUENCING (Presentation Order)
# ============================================================================
# Present components from LOWEST to HIGHEST value.
# This creates an escalating sense of value that peaks right before the price reveal.
#
# STRUCTURE:
# 1. Core offer (the main thing they are buying)
# 2. Bonuses (presented one at a time, ascending value)
# 3. Guarantee (presented AFTER all value is stacked)
# 4. Price reveal (presented AFTER total value is established)
#
# The client should be thinking "this is already worth it" BEFORE you finish stacking.
presentation_sequence:
  position_1_core:
    component_name: "FILL — The core offer (main deliverable)"
    assigned_value: "FILL"
    presentation_note: "FILL — How to introduce this (e.g., 'Here is what you get when you join...')"
