# ============================================================================
# TEMPLATE NOTES FOR USERS
# ============================================================================
template_notes: |
  This file is CRITICAL for conversion.
  Testimonials convert better than any other form of proof.

  KEY PRINCIPLES:
  1. Specific beats generic ("3x revenue in 90 days" > "great results")
  2. Story beats stats (transformation arc > just numbers)
  3. Emotional beats logical (how they FELT > what they earned)
  4. Real beats perfect ("I was skeptical" > "I always believed")
  5. Video beats text (2-3x conversion rate)

  DO:
  ✅ Show transformation (before → after)
  ✅ Include skepticism (shows you're real)
  ✅ Be specific (numbers, timelines, details)
  ✅ Show emotion (how they FELT changes)
  ✅ Vary testimonials (by awareness level, result, archetype)
  ✅ Rotate regularly (don't use same 3 forever)
  ✅ Get video (even on phone = better than text)

  DON'T:
  ❌ Generic praise ("This course is amazing!")
  ❌ Unverifiable claims ("Made millions!")
  ❌ Marketing speak (testimonials should sound like people, not ads)
  ❌ Same testimonials everywhere (match to audience level)
  ❌ Old testimonials (fresh testimonials convert better)

  MOST POWERFUL TESTIMONIALS:
  - Show the struggle (not just the result)
  - Include skepticism (they almost didn't buy)
  - Specific numbers (not vague)
  - Emotional arc (how they felt before/after)
  - Video format (1.5-3 min is perfect)

  Update weekly: New testimonials = new social proof = continued conversion lift.
