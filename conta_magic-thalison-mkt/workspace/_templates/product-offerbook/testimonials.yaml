---
# TESTIMONIALS.YAML - Robust testimonials with story arcs
# Purpose: Structure testimonials for maximum conversion power
# Guardian: CMO / Customer Success / Head of Copy
# Timing: FILL NOW with initial testimonials + UPDATE CONSTANTLY (new testimonials = new social proof)

metadata:
  version: "1.0"
  product_name: "YOUR_PRODUCT_NAME_HERE"
  status: "INCOMPLETE"
  last_updated: "FILL_THIS"
  owner: "CMO or Customer Success"
  notes: |
    This file is about DEEP testimonials - not just "great course!"
    Each testimonial should:
    - Show transformation (before → after)
    - Be specific (numbers, timelines)
    - Include emotional journey
    - Be authentic (not marketing speak)
    - Be usable in multiple formats (landing page, ads, email, etc)
# ============================================================================
# SECTION 1: TESTIMONIAL STRATEGY
# ============================================================================
testimonial_strategy:
  # How to collect and use testimonials
  collection_method: |
    Example: "After students get results (90+ days), we ask:
    'What was the biggest transformation? Can we feature your story?'
    We record video + transcript + specific metrics."

    Your method:
    [HOW DO YOU COLLECT TESTIMONIALS?]
  verification_process: |
    Example: "Every testimonial is verified:
    - Check LinkedIn profile exists
    - Verify student actually took course
    - Confirm numbers (revenue, time saved)
    - Get permission to use publicly"

    Your process:
    [HOW DO YOU VERIFY AUTHENTICITY?]
  usage_across_channels:
    landing_page: "Best testimonial per awareness level + metrics"
    email_campaigns: "Short form (1-2 sentences) + link to video"
    ads: "Quote + name + result + video thumbnail"
    social_proof: "Video or rotating quotes"
    sales_calls: "Have 3-5 relevant testimonials ready to reference"
  testimonial_types_needed:
    - "By awareness level (Level 1 prospects resonate with Level 1 testimonials)"
    - "By archetype (small business, agency, solo entrepreneur, etc)"
    - "By result type (revenue, time, confidence, systems, etc)"
    - "By transformation timeline (30-day, 90-day, 6-month)"
# ============================================================================
# SECTION 2: TESTIMONIAL STRUCTURE (The Framework)
# ============================================================================
testimonial_structure:
  # Every strong testimonial needs these elements
  element_1_the_person:
    description: "Who is this person?"
    includes:
      - name: "First + Last"
      - title: "Their job/role"
      - company: "What business they run"
      - linkedin: "Profile link (for verification)"
    purpose: "Credibility - shows this is a real person"
  element_2_the_before:
    description: "What was their situation BEFORE the product?"
    specificity: "Not vague, not generic"
    bad_example: "I was struggling with my business"
    good_example: "I was working 70 hours a week, making $80K/year, and felt like I was missing something"
    purpose: "Prospect sees themselves in the 'before'"
  element_3_the_struggle:
    description: "What was the emotional pain?"
    specificity: "Get to the FEELING, not just the situation"
    bad_example: "I needed help with marketing"
    good_example: "I felt like an imposter. I had great ideas but couldn't execute. Started every day overwhelmed."
    purpose: "Emotional connection - prospect feels SEEN"
  element_4_the_skepticism:
    description: "What were they worried about?"
    specificity: "The real objection they had"
    bad_example: "I wasn't sure it would work"
    good_example: "I'd done 5 other courses that promised results but delivered theory. I was skeptical another course would be different."
    purpose: "Removes objection - 'me too' effect"
  element_5_what_changed:
    description: "What was different about THIS product?"
    specificity: "Specific framework, specific insight, specific change"
    bad_example: "The course was really good"
    good_example: "The [Framework Name] gave me the system I was missing. For the first time, I wasn't guessing."
    purpose: "Shows unique mechanism value"
  element_6_the_transformation:
    description: "What changed in their business/life?"
    specificity: "Measurable + timeline + emotional state"
    bad_example: "I got better results"
    good_example: "In 90 days, revenue went from $80K to $240K. More important: I went from 70-hour weeks to 35 hours. I felt in control for the first time."
    purpose: "Proof of transformation"
  element_7_the_ripple:
    description: "What else changed because of the transformation?"
    specificity: "Secondary benefits"
    bad_example: "Everything got better"
    good_example: "Family time increased. I could finally help my kids with homework. My spouse said she got the real me back. Business growth was nice, but that was the real win."
    purpose: "Deep trust - shows holistic impact"
  element_8_the_recommendation:
    description: "Would they recommend it? To who?"
    specificity: "Specific type of person, specific reason"
    bad_example: "I recommend this to everyone"
    good_example: "If you're a service provider doing $100K-$500K annual revenue and working 60+ hours, this is THE course. Don't waste time on something else."
    purpose: "Shows it's not for everyone (makes it more credible)"
# ============================================================================
# SECTION 3: TESTIMONIALS BY AWARENESS LEVEL
# ============================================================================
testimonials_by_awareness_level:
  # Different testimonials resonate with different awareness levels
  level_1_unaware:
    # These people don't know they have a problem
    # Need testimonials that REVEAL the problem
    description: "Testimonials showing 'I didn't know this was possible'"
    testimonial_1:
      person:
        name: "[EXAMPLE: Carlos Silva]"
        title: "[EXAMPLE: Digital Agency Owner]"
        company: "[EXAMPLE: Creative Agency, 5 employees]"
        before_revenue: "$150K/year"
        after_revenue: "$450K/year"
        timeline: "12 months"
      story: |
        BEFORE: "I thought 70-hour weeks were normal for business owners.
        Everyone I knew worked like that. I assumed it was 'just how it is.'"

        STRUGGLE: "Burned out constantly. Missed family events.
        Health was suffering. But I thought that was the price of ambition."

        SKEPTICISM: "I'd never heard of business SYSTEMS.
        Thought the answer was just 'work harder' or 'hire more people.'"

        WHAT_CHANGED: "The course showed me that systems let you work
        LESS and earn MORE. Completely flipped my worldview."

        TRANSFORMATION: "Within 12 months, revenue 3x'd AND I'm working
        35 hours/week instead of 70. Not lucky - systematic."

        RIPPLE: "My marriage improved. I'm present with my kids.
        But honestly, the business growth shocked me too."

        RECOMMENDATION: "If you're running a business and constantly
        overwhelmed, you need to see this. This isn't normal."
      use_in: "Early-stage awareness campaigns, blog content, testimonial page"
  level_2_problem_aware:
    # These people know they have a problem
    # Need testimonials showing 'I found the solution'
    description: "Testimonials showing 'I was looking for answers and found them here'"
    testimonial_1:
      person:
        name: "[EXAMPLE: Marina Costa]"
        title: "[EXAMPLE: Coach, 1:1 model]"
        company: "[EXAMPLE: Executive Coach]"
        before_revenue: "$120K/year"
        after_revenue: "$300K/year"
        timeline: "6 months"
      story: |
        BEFORE: "I was making decent money but it was ALL 1:1 time.
        If I took a vacation, I made zero. I knew I needed to scale but had no idea how."

        STRUGGLE: "I searched everywhere. Read books, took courses.
        Everyone said 'group coaching' but that felt impersonal.
        I wanted to grow without sacrificing quality."

        SKEPTICISM: "The course promised a 'systems approach' to scaling.
        I'd heard that before. Skeptical it would actually work."

        WHAT_CHANGED: "The [Offer/Product Name] showed me EXACTLY
        how to go from 1:1 to hybrid model. Not theory - actual steps."

        TRANSFORMATION: "6 months later, earning $300K with 40% less time.
        Created group program that scaled my 1:1 practice."

        RIPPLE: "Students in my group program got better results than 1:1.
        Turns out group dynamic created accountability. Win-win."

        RECOMMENDATION: "If you're a coach/consultant getting killed
        by 1:1 model, this is the answer."
      use_in: "Mid-funnel content, email sequences, targeted ads"
  level_3_solution_aware:
    # These people know solutions exist
    # Need testimonials showing 'your solution is DIFFERENT'
    description: "Testimonials showing 'tried other solutions, this one actually works'"
    testimonial_1:
      person:
        name: "[EXAMPLE: Roberto Ferreira]"
        title: "[EXAMPLE: CEO, SaaS Company]"
        company: "[EXAMPLE: B2B SaaS, $2M ARR]"
        before_revenue: "$1.5M/year"
        after_revenue: "$3.5M/year"
        timeline: "9 months"
      story: |
        BEFORE: "Running $1.5M SaaS company. Profitable but plateaued.
        Knew I needed to scale but couldn't figure out the next level."

        STRUGGLE: "I'd done 3 other scaling programs. All promised results.
        All were 80% theory, 20% application. I was frustrated."

        SKEPTICISM: "When I found [Product Name], I was skeptical.
        Every scaling program claims to have the answer.
        Most are just packaging the same stuff differently."

        WHAT_CHANGED: "This was DIFFERENT. Day one, it was clear:
        systems-first, not theory-first. They show you the exact frameworks
        used in real $10M+ SaaS companies."

        TRANSFORMATION: "9 months in, hit $3.5M ARR. More important:
        I have systems in place that don't depend on me. This will scale to $10M without me working more."

        RIPPLE: "Brought the frameworks into my entire team.
        Execution got 10x faster. Quality improved."

        RECOMMENDATION: "If you've done other programs and been disappointed,
        this is the one. Execution-first, not motivation-first."
      use_in: "Sales page, high-ticket ads, case studies"
  level_4_product_aware:
    # They know your product exists
    # Need testimonials showing 'this is worth the investment'
    description: "Testimonials showing 'best investment I made'"
    testimonial_1:
      person:
        name: "[EXAMPLE: Fernanda Alves]"
        title: "[EXAMPLE: Entrepreneur, Digital Products]"
        company: "[EXAMPLE: Digital Product Business]"
        before_revenue: "$500K/year"
        after_revenue: "$1.5M/year"
        timeline: "6 months"
      story: |
        BEFORE: "Making $500K/year with digital products but felt stuck.
        Knew [Product Name] existed. Wasn't sure if $X was worth it."

        STRUGGLE: "Price tag was high. I had to decide: invest or keep
        doing what I'm doing. Fear of wasting money."

        SKEPTICISM: "I checked reviews. Looked at testimonials.
        Asked myself: Is this really worth 3x the cost of other courses?"

        WHAT_CHANGED: "I bit the bullet and joined. First week: the
        [Framework] alone paid for the course. Within month, revenue systems were 10x better."

        TRANSFORMATION: "6 months later, $1.5M ARR. Cost of course?
        Made it back in first 2 weeks. ROI is insane."

        RIPPLE: "Built an asset instead of just a business.
        Can now sell digital products on autopilot."

        RECOMMENDATION: "If you're debating whether the investment is worth it:
        it is. Not even close. Best money I've spent on my business."
      use_in: "Final objection handling, email sequences, comparison pages"
  level_5_most_aware:
    # Ready to buy, just need final push
    # Need testimonials showing 'you won't regret this'
    description: "Testimonials showing 'I'm so glad I did this'"
    testimonial_1:
      person:
        name: "[EXAMPLE: Paulo Mendes]"
        title: "[EXAMPLE: Founder, Consulting Firm]"
        company: "[EXAMPLE: Strategy Consulting]"
        before_revenue: "$800K/year"
        after_revenue: "$2M/year"
        timeline: "12 months"
      story: |
        BEFORE: "I was ready to invest in scaling my consulting firm.
        Looked at 3 options. [Product Name] felt right."

        STRUGGLE: "Decision paralysis. High ticket price. Wanted guarantees."

        SKEPTICISM: "None. I was just hesitant to pull trigger."

        WHAT_CHANGED: "Joined. Immediately regretted NOT doing it sooner.
        Should have done this years ago."

        TRANSFORMATION: "$2M in year one. But real transformation:
        Built a scalable business instead of a self-employed job."

        RIPPLE: "Now I can take 8 weeks off and business runs.
        That never happened before. Built actual freedom."

        RECOMMENDATION: "Stop debating. Join. You know you need this.
        Just do it."
      use_in: "Final-step sales pages, thank-you pages, email closes"
# ============================================================================
