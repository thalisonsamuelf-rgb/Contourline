# ============================================================================
# SECTION 5: VIDEO TESTIMONIAL SCRIPT
# ============================================================================
video_testimonial_format:
  # How to structure a video testimonial for maximum impact
  purpose: |
    Video testimonials convert 2-3x better than text.
    Script provides structure to keep testimonial on track.
    Should feel conversational, not scripted.
  duration: "2-3 minutes total (ideal for landing pages)"
  structure:
    intro_10_seconds:
      prompt: "Who are you and what do you do?"
      example: "Hey, I'm Sarah. I run an e-commerce business doing about $200K/year."
      guidelines: "Name, role, business. Keep it simple."
    before_20_seconds:
      prompt: "What was your situation BEFORE this product? Be specific about the pain."
      example: "I was working 60+ hours a week. Revenue plateaued. Knew I was missing something but didn't know what. Felt like I was just reacting, not leading."
      guidelines: "Paint the before picture. Let prospect see themselves."
    skepticism_15_seconds:
      prompt: "What was your concern about trying this? What almost stopped you?"
      example: "Honestly, I'd done courses before. Didn't want to waste money on another program that teaches theory without application."
      guidelines: "Address real objections. This is powerful."
    aha_moment_20_seconds:
      prompt: "What was the 'aha' moment? When did you realize this was different?"
      example: "First week, they showed me the [Framework]. I realized I'd been guessing about everything. This gave me actual system. Changed everything."
      guidelines: "Specific framework, specific insight. Not vague praise."
    transformation_30_seconds:
      prompt: "What's different now? Give numbers + timeline + emotional state."
      example: "6 months later, revenue 3x'd. But the real win: I'm working 30 hours instead of 60. I feel in control. I actually enjoy my business again."
      guidelines: "Numbers + timeline + how it FEELS. Both matter."
    recommendation_15_seconds:
      prompt: "Would you recommend this to others? Who and why?"
      example: "If you're a service provider or digital product creator making $100K-$500K and stuck, YES. This is the missing piece. Don't wait."
      guidelines: "Specific recommendation. Not 'everyone should do this.'"
  filming_tips: |
    - Natural lighting (don't use phone flashlight)
    - Look at camera
    - Speak normally (not like you're reading)
    - Background should be professional but not sterile
    - Audio matters more than video quality
    - One take is fine if natural
# ============================================================================
# SECTION 6: WRITTEN TESTIMONIAL FORMATS
# ============================================================================
written_testimonial_formats:
  # Different lengths for different uses
  format_1_short_form:
    use_in: "Ads, email subject lines, social media"
    max_length: "1-2 sentences"
    structure: "Result + emotional state"
    example: |
      "Revenue went from $80K to $240K in 90 days. But more important:
      I went from burned out to actually enjoying my business."
      — João Silva, Digital Agency Owner
  format_2_medium_form:
    use_in: "Landing page, email body, testimonial section"
    max_length: "3-4 paragraphs"
    structure: "Before + problem + skepticism + transformation + recommendation"
    example: |
      "I was stuck at $500K/year with my digital product business.
      Knew I needed systems but all the courses felt generic.

      The [Framework] gave me the exact system I was missing.
      Within 6 months, hit $1.5M. More important: I built a real business
      instead of just trading time for money.

      If you're making $100K-$1M and wondering how to scale,
      this is the answer. Best investment I've made."
      — Marina Costa, Digital Product Entrepreneur
  format_3_long_form:
    use_in: "Case study page, detailed testimonial, email sequence"
    max_length: "full story with before/after breakdown"
    structure: "Full 8-element structure (see Section 2)"
    example: "[Full testimonial from Section 2]"
  format_4_highlight_quote:
    use_in: "Sales page callout boxes, ads"
    max_length: "One powerful sentence"
    structure: "Most powerful single statement from full testimonial"
    example: |
      ❝ This gave me the system I was missing.
      For the first time, I wasn't guessing. ❞
