# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
usage_instructions: |
  1. FILL THIS FILE with proven copy from your campaigns
  2. For each section:
     - Start with TEMPLATES (how to structure)
     - Then add PROVEN EXAMPLES (what actually worked)
  3. When copywriter needs headline:
     - They read templates first
     - They see proven examples
     - They write new version using pattern
  4. After campaign runs:
     - Which headline won?
     - Add it to "proven_examples"
  5. This file becomes your SWIPE FILE
updating_process: |
  WEEKLY:
    - What copy outperformed this week?
    - Add to proven_examples
    - Note: Subject line, open rate, context

  MONTHLY:
    - Review all proven examples
    - Do patterns emerge?
    - Are certain templates underperforming?
tracking_what_works: |
  For each proven example, track:
  - Where it was used (email, ads, landing page)
  - Metric it drove (open rate, click rate, conversion)
  - Audience it worked for (archetype, awareness level)
  - Context (what offer, what season)
