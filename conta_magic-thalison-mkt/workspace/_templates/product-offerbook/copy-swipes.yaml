  template_1: |
    "Why [problem perception] is ACTUALLY [deeper truth]
    — and what [percentage]% of [audience] don't realize"
  template_2: |
    "[X people] are [wrong behavior] when trying to [goal].
    Here's why."
  template_3: |
    "The [problem] epidemic nobody's talking about
    (And why it's about to change everything)"
  proven_examples:
