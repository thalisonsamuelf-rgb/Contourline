# ============================================================================
# LEAD PARAGRAPHS (What comes after headline)
# ============================================================================
lead_paragraphs:
  problem_validation: |
    FILL THIS - Opening that validates their problem
    Example: "You know that feeling when you've consumed 200 hours of content
    but can't seem to execute? That suffocating feeling of knowing but not doing?"
  big_contrast: |
    FILL THIS - Shows contrast between worlds
    Example: "While you're still trying to figure out your next move,
    someone is building their second business with the system you're missing."
  surprising_insight: |
    FILL THIS - Unexpected fact or pattern
    Example: "Here's what the top 2% of entrepreneurs know that others don't:
    Information is abundant. System is rare."
  story_opening: |
    FILL THIS - Opens with story hook
    Example: "Three years ago, João was exactly where you are now.
    Burned out from 5 projects, no direction, consuming constantly.
    Then everything changed..."
  direct_promise: |
    FILL THIS - Goes straight to promise
    Example: "Your experience + our system + IA = You finally become
    who you always knew you could be."
  status: "INCOMPLETE"
