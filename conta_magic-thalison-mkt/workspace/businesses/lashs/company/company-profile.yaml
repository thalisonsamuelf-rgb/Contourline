    definition: "Atender com prazer e genuino interesse no sucesso do cliente"
    how_you_live_it: "Programa de Excelencia no Atendimento, CX Excellence"
    contradiction_check: "Tratar atendimento como obrigacao e nao como missao"
  value_5:
