# ============================================================================
# SECTION 1: COMPANY FOUNDATION
# ============================================================================
company_essence:
  legal_name: "Contourline Equipamentos Medicos e Diagnosticos LTDA"
  trade_name: "Contourline"
  year_founded: 2011
  headquarters: "Sete Lagoas, MG, Brasil"
  one_liner: |
    A Contourline e a Fabrica de Autoestima que revela em todas as pessoas
    a sua melhor versao, atraves de equipamentos medicos e esteticos de
    alta tecnologia com P&D proprio e parcerias premium globais.
  origin_story_short: |
    Com mais de 15 anos de experiencia no fornecimento de equipamentos
    medicos e esteticos de alta tecnologia, a Contourline nasceu em
    Sete Lagoas (MG) com a missao de democratizar o acesso a tecnologia
    de ponta para medicina estetica no Brasil. Fabrica e comercializa
    equipamentos proprios e representa marcas globais como Body Health,
    Lumenis e Indiba.
# ============================================================================
# SECTION 2: MISSION, VISION, VALUES
# ============================================================================
mission:
  statement: |
    Ser uma Fabrica de Autoestima, revelando em todas as pessoas a sua
    melhor versao. Ajudar colaboradores, clientes e seus pacientes a
    descobrirem suas melhores versoes.
  who_benefits:
    - "Colaboradores da Contourline"
    - "Medicos e clinicas (clientes diretos)"
    - "Pacientes finais (beneficiarios indiretos)"
  transformation: |
    De profissionais e pacientes inseguros com sua aparencia e saude
    para pessoas que descobriram sua melhor versao atraves de
    tecnologia medica de ponta.
vision:
  statement: |
    Ser a melhor empresa do segmento de equipamentos de estetica medica
    no mercado brasileiro ate 2027, com forte reconhecimento no mercado
    e avaliacao que reflita sucesso, inovacao e capacidade de entregar
    resultados excepcionais. Meta: R$ 500M de valuation ate 2027.
  proof_of_traction:
    - "4 mil clientes em todo o Brasil"
    - "Projecao de faturamento acima de R$ 200 milhoes em 2026"
    - "Sede propria de 2 mil m2 com P&D"
    - "Estudos cientificos publicados"
    - "15 anos de operacao"
values:
  value_1:
    name: "Lealdade"
    definition: "Compromisso genuino com clientes, parceiros e equipe"
    how_you_live_it: "Relacoes de longo prazo com clientes e parceiros estrategicos"
    contradiction_check: "Priorizar ganho de curto prazo sobre relacao de confianca"
  value_2:
    name: "Excelencia"
    definition: "Busca constante pelo mais alto padrao em tudo que fazemos"
    how_you_live_it: "Investimento em P&D, certificacoes cientificas, parceria Fundacao Dom Cabral"
    contradiction_check: "Entregar produto ou servico sem validacao cientifica"
  value_3:
    name: "Postura de Dono"
    definition: "Cada colaborador age como se a empresa fosse sua"
    how_you_live_it: "Autonomia com responsabilidade, gestao por indicadores"
    contradiction_check: "Delegar sem acompanhar resultados"
  value_4:
