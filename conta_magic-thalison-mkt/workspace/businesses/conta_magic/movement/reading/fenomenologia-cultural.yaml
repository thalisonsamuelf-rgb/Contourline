worldview:
  before:
  - Equipamento de estetica e generico — compra qualquer um que funcione
  - Certificacao Anvisa e burocracia desnecessaria
  - Profissional de estetica nao precisa de tecnologia de ponta
  - Fornecedor de equipamento e so vendedor
  - IA e ferramenta isolada — cada pessoa usa como quer
  after:
  - Equipamento certificado e diferencial competitivo e seguranca
  - Certificacao Anvisa protege profissional e paciente
  - Tecnologia de ponta e o que separa o profissional do amador
  - Fornecedor e parceiro estrategico com background tech
  - IA coordenada transforma a operacao inteira da empresa
