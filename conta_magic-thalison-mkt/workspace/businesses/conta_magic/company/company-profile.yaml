mission:
  statement: Ser uma Fábrica de Autoestima, revelando em todas as pessoas a sua melhor versão. Existimos para promover em
    nossos colaboradores, clientes e seus pacientes a sua melhor versão promovendo a saúde, bem estar e longevidade. A autoestima
    é a chave para a realização pessoal e, ao trabalharmos para que cada pessoa se sinta melhor consigo mesma, estamos promovendo
    um ambiente mais saudável, feliz e produtivo. O impacto de nosso trabalho vai além do que entregamos, ele está no sentimento
    que cultivamos em cada pessoa que entra em contato com a Contourline.
  who_benefits:
  - Profissionais de medicina estetica
  - Clinicas de estetica avancada
  transformation: Fornecer equipamentos medicos de ponta com certificacao Anvisa para profissionais que buscam excelencia
    em medicina estetica
