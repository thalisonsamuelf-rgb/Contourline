---
# ADOPTION-SIGNALS.YAML - Product Adoption Signal Map & Intervention Layer
# Purpose: Transform qualitative and quantitative product signals into a shared operating layer
# Guardian: Product Lead / COO / Customer Success Lead
# Timing: Fill after onboarding-flow.yaml starts receiving real usage evidence
# Framework: Activation Signals + Adoption Milestones + Product Friction Diagnosis
# Dependency: onboarding-flow.yaml, churn-prevention.yaml, analytics.yaml, icp.yaml

metadata:
  version: "1.0"
  product_name: "FILL_THIS"
  status: "TEMPLATE"
  last_updated: "FILL_THIS"
  owner: "Product Lead / COO"
  framework: "Activation Signals + Adoption Milestones + Product Friction Diagnosis"
  notes: |
    Product optimization should not start with feature requests.
    It should start with behavioral evidence.

    This template exists to capture the signals that matter:
    who activates, where they get stuck, what language they use,
    what milestones predict retention, and what frictions predict churn.

    RULE: Do not promote anecdotes into product decisions without evidence.
    Every important signal should be tied to a source, frequency, and recommended action.

# ============================================================================
# STEP 1: ADOPTION MODEL
# ============================================================================

adoption_model:
  primary_outcome: "FILL — What product behavior proves real adoption?"
  activation_definition: "FILL — What specific event or milestone counts as activation?"
  adoption_stages:
    stage_1:
      name: "FILL — e.g. New / Unactivated"
      definition: "FILL — What defines this stage?"
    stage_2:
      name: "FILL — e.g. Activated"
      definition: "FILL — What defines this stage?"
    stage_3:
      name: "FILL — e.g. Installed / Habitual"
      definition: "FILL — What defines this stage?"
    stage_4:
      name: "FILL — e.g. Advocate / Power User"
      definition: "FILL — What defines this stage?"

# ============================================================================
# STEP 2: SEGMENTATION SIGNALS
# ============================================================================

segmentation_signals:
  maturity_bands:
    band_1:
      label: "FILL — e.g. Iniciante Confuso"
      observed_signals:
        - "FILL"
      core_need: "FILL"
      product_implication: "FILL"
    band_2:
      label: "FILL — e.g. Operador em Instalação"
      observed_signals:
        - "FILL"
      core_need: "FILL"
      product_implication: "FILL"
    band_3:
      label: "FILL — e.g. Avançado Obcecado"
      observed_signals:
        - "FILL"
      core_need: "FILL"
      product_implication: "FILL"
  role_mix:
    - "FILL — What user roles or backgrounds appear repeatedly?"

# ============================================================================
# STEP 3: ACTIVATION SIGNALS
# ============================================================================

activation_signals:
  leading_signals:
    signal_1:
      name: "FILL — Early positive signal"
      description: "FILL — What behavior indicates activation is likely?"
      source_type: "FILL — product analytics / support / interviews / community"
      intervention_if_missing: "FILL"
    signal_2:
      name: "FILL — Second leading signal"
      description: "FILL"
      source_type: "FILL"
      intervention_if_missing: "FILL"
  activation_milestones:
    milestone_1:
      name: "FILL — First value milestone"
      evidence: "FILL — What counts as proof?"
      target_time: "FILL — e.g. <24h / <7 days"
    milestone_2:
      name: "FILL — First repeatable usage milestone"
      evidence: "FILL"
      target_time: "FILL"
    milestone_3:
      name: "FILL — Installed usage milestone"
      evidence: "FILL"
      target_time: "FILL"

# ============================================================================
