    type: "FILL — onboarding / technical / conceptual / motivational"
    symptom: "FILL — What does the user say or do?"
    probable_root_cause: "FILL"
    most_affected_segment: "FILL"
    suggested_product_response: "FILL — What should product change?"
  friction_2:
