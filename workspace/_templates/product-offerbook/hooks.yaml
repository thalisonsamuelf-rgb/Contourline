      impressions: "FILL"
      ctr: "FILL — %"
      result: "FILL — WINNER / KILL / NEEDS DATA"
      date_tested: "FILL"
    - hook: "FILL — exact hook text"
      type: "FILL"
      platform: "FILL"
      awareness_level: "FILL"
      value_equation: "FILL"
      impressions: "FILL"
      ctr: "FILL"
      result: "FILL"
      date_tested: "FILL"
  # Winners archive (your proven bank)
  proven_winners:
    - hook: "FILL — your best performing hook"
      type: "FILL"
      platform: "FILL"
      ctr: "FILL — %"
      why_it_won: "FILL — hypothesis"
# ============================================================================
# SECTION 9: CROSS-REFERENCES
# ============================================================================
# Hooks do not exist in isolation. They feed from and feed into other
# offerbook files. This map shows the connections.
cross_references:
  icp_to_hooks:
    file: "icp.yaml"
    what_it_provides: "Exact pain language, fear language, desire phrases, demographic details"
    how_it_feeds_hooks: |
      The words your avatar uses to describe their pain are the words that go
      into your hooks. Do not use YOUR language. Use THEIR language.
      Extract: pain phrases, exact quotes from interviews, emotional triggers.
    action: "Pull the top 5 pain phrases from icp.yaml and turn each into a hook."
  diagnosis_to_hooks:
    file: "diagnosis.yaml"
    what_it_provides: "Awareness level (1-5) and sophistication stage (1-5)"
    how_it_feeds_hooks: |
      The awareness level determines which hook types to use (see Section 5 matrix).
      A Level 1 audience needs Narratives and Questions.
      A Level 5 audience needs Commands and Statements.
      Using the wrong type for the awareness level = zero resonance.
    action: "Check your awareness level in diagnosis.yaml. Then filter your hooks through the matrix."
  value_equation_to_hooks:
    file: "value-equation.yaml"
    what_it_provides: "4 variable scores (Dream Outcome, Likelihood, Time, Effort) + weakest variable"
    how_it_feeds_hooks: |
      Your weakest Value Equation variable should have the MOST hooks targeting it.
      If Time Delay scores 4/10, create extra hooks that emphasize speed.
      If Perceived Likelihood scores 3/10, create extra hooks that embed proof.
    action: "Identify your weakest variable. Create 3 additional hooks targeting it."
  proof_to_hooks:
    file: "proof.yaml"
    what_it_provides: "Case studies, testimonials, statistics, credibility markers"
    how_it_feeds_hooks: |
      Proof points become hooks directly. A case study with specific numbers
      IS a hook: "R$7.832/month in 47 days. Real client. Real results."
      The best hooks have proof EMBEDDED, not just implied.
    action: "Take your top 3 proof points and turn each into a Statement hook."
  objections_to_hooks:
    file: "objections.yaml"
    what_it_provides: "Top objections, fear language, resistance patterns"
    how_it_feeds_hooks: |
      Objections become Conditional and Question hooks.
      "If you think you cannot afford it, read this" (Conditional).
      "What if the reason your ads do not work has nothing to do with your ads?" (Question).
      Addressing the objection IN the hook pre-qualifies the click.
    action: "Take the top 3 objections and create one hook each that addresses the objection in the hook itself."
  scarcity_urgency_to_hooks:
    file: "scarcity-urgency.yaml"
    what_it_provides: "Genuine deadlines, capacity limits, countdown sequences"
    how_it_feeds_hooks: |
      Scarcity and urgency language feeds Command and Statement hooks
      for Level 4-5 audiences. "Last 12 spots" is a hook.
      "Price increases Friday" is a hook. But ONLY if genuine.
    action: "Take your primary scarcity element and create a Command hook and a Statement hook from it."
  email_sequences_to_hooks:
    file: "email-sequences.yaml"
    what_it_provides: "Subject line context, sequence timing, email purpose by phase"
    how_it_feeds_hooks: |
      Every email subject line IS a hook. The rules from Section 3 (email subject lines)
      apply directly. The launch sequence in email-sequences.yaml needs 7+ subject lines
      — each is a hook creation exercise.
    action: "Map one hook to each email in your launch sequence. Use the 70-20-10 distribution."
