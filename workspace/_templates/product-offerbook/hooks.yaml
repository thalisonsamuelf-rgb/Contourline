      type: "Statement"
      platform: "Facebook/Instagram Ads"
      awareness_level: 3
      value_equation: "Time Delay"
      performance: "Untested — starter"
    - hook: "If you are making between R$20K and R$100K per month and feel stuck, this is for you."
      type: "Conditional"
      platform: "Facebook/Instagram Ads"
      awareness_level: 3
      value_equation: "Dream Outcome"
      performance: "Untested — starter"
    - hook: "Stop scrolling. This changes how you run your business."
      type: "Command"
      platform: "TikTok/Reels"
      awareness_level: 4
      value_equation: "Dream Outcome"
      performance: "Untested — starter"
    - hook: "3 things every business owner does wrong before hitting R$1M."
      type: "List"
      platform: "YouTube"
      awareness_level: 2
      value_equation: "Effort & Sacrifice"
