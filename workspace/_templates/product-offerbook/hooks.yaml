    - hook: "My client went from R$8K to R$83K per month in 90 days. Here is exactly what we changed."
      type: "Narrative"
      platform: "Instagram"
      awareness_level: 3
      value_equation: "Perceived Likelihood"
      performance: "Untested — starter"
    - hook: "Donos de clinica faturando menos de R$50K/mes — tenho algo pra voces."
      type: "Label"
      platform: "Facebook/Instagram Ads"
      awareness_level: 3
      value_equation: "Dream Outcome"
