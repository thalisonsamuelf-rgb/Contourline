# TEMPLATE INSTRUCTIONS
# 1. This file is STEP ZERO — fill it before any other offerbook file
# 2. Score each indicator honestly — overrating your market wastes months of effort
# 3. Use the scoring rubric — do not just pick a number. Match your market to the description.
# 4. Collect EVIDENCE for each indicator — gut feelings are not validation
# 5. Apply the decision matrix ruthlessly — if RED, pivot. Do not rationalize.
# 6. Identify the starving crowd — this is your launch target, not the whole market
# 7. If comparing markets, use the comparison matrix for objective selection
# 8. Pass the pre-offer checklist before proceeding to any other file
#
# CROSS-REFERENCES:
# - diagnosis.yaml: Market sophistication and awareness levels (fill AFTER this file passes)
# - icp.yaml: Ideal Client Profile (the starving crowd becomes the core ICP)
# - value-equation.yaml: The offer diagnostic assumes a validated market
# - offerbook.yaml: The offer architecture assumes market-offer fit
# - This file gates ALL other files. If it fails, nothing else matters.
