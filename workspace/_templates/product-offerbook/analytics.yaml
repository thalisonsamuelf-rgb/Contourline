# ============================================================================
# USAGE INSTRUCTIONS
# ============================================================================
usage_instructions: |
  This analytics file is the SOURCE OF TRUTH for all statistical claims.

  CRITICAL RULES:
  1. Every stat in marketing MUST come from this file
  2. Tag all claims with [SOURCE: analytics.yaml]
  3. Never extrapolate beyond available data
  4. When uncertain, use qualifier: "approximately" or "roughly"

  Example CORRECT claim:
  ✅ "80% report time stolen by repetitive tasks"

  Example WRONG claim:
  ❌ "90% feel completely overwhelmed all the time"
  (Extrapolating beyond data = credibility killer)

  WHEN TO UPDATE:
  - Quarterly review of all metrics
  - After major product changes
  - When launching to new market segment
  - Before major marketing campaign

  HOW TO USE IN COPY:
  From offerbook.yaml:
  1. Find supporting data here
  2. Quote the exact percentage
  3. Add [SOURCE: analytics.yaml]
  4. Example in copy: "80% of customers report X [SOURCE: analytics.yaml]"
