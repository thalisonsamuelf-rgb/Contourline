---
# OFFER-NAMING.YAML - Offer Naming Using the MAGIC Framework
# Purpose: Name is a conversion multiplier — the right name increases response rate before the prospect reads a single word of copy
# Guardian: Offer Engineer / CMO
# Timing: FILL after offerbook.yaml, value-equation.yaml, and icp.yaml are complete
# Framework: MAGIC Naming (derived from Hormozi MAGICO, adapted for focused execution)
# Dependency: offerbook.yaml (product positioning), value-equation.yaml (Dream Outcome), icp.yaml (Avatar)

metadata:
  version: "1.0"
  product_name: "FILL_THIS"
  status: "INCOMPLETE"
  last_updated: "FILL_THIS"
  owner: "Offer Engineer"
  framework: "MAGIC Naming Framework"
  notes: |
    The name is the FIRST hook of your offer. Before anyone reads your copy,
    watches your VSL, or hears your pitch — they see the name.

    A Grand Slam name does 3 jobs simultaneously:
    1. Identifies the avatar (they instantly know "this is for me")
    2. Promises the outcome (the transformation is in the name)
    3. Implies the mechanism (how it works is hinted at)

    BAD NAMES (and why):
    - Generic: "Business Growth Program" — could be anyone, for anyone
    - Clever-but-unclear: "The Phoenix Method" — sounds cool, says nothing
    - Me-focused: "John's Coaching" — nobody cares about John yet
    - Acronym: "The SOAR System" — forced, forgettable, taken 100x

    GOOD NAMES (and why):
    - "The 90-Day Client Acquisition System" — timeframe + avatar implied + outcome
    - "Profit First" — counterintuitive + outcome + 2 words
    - "30 Clients in 30 Days" — specific number + specific result + specific timeframe
# ============================================================================
# THE MAGIC FRAMEWORK — 5 Criteria Every Offer Name Must Pass
# ============================================================================
# Score each letter 1-10. Composite score determines if the name is ready.
# GREEN (40+): Ship it. YELLOW (30-39): Refine. RED (<30): Start over.
magic_framework:
  # --------------------------------------------------------------------------
  # M — MAGNETIC
  # --------------------------------------------------------------------------
  # Does the name stop the scroll? Does it create curiosity or desire?
  M_magnetic:
    definition: "The name grabs attention in a crowded feed, inbox, or conversation."
    test: "If I saw this name in a feed full of noise, would I stop scrolling?"
    techniques:
      - "Specific number: '90-Day', 'The 5-Step', '$100M' — numbers break patterns"
      - "Counterintuitive element: 'Profit First' (pay yourself before expenses?), 'The Anti-Hustle Blueprint'"
      - "Pattern interrupt: unexpected word pairing that creates a double-take"
      - "Contrast or tension: 'Effortless Authority', 'Lazy Genius Method'"
    examples:
      en:
        - "'The 4-Hour Work Week' — number + counterintuitive (4 hours?!)"
        - "'Profit First' — counterintuitive (profit before revenue?)"
        - "'$100M Offers' — aspirational number that stops the scroll"
      pt_br:
        - "'Sistema 90 Dias' — prazo concreto que gera curiosidade"
        - "'Maquina de Clientes' — metafora mecanica + resultado"
        - "'Lucro Primeiro' — inversao que forca reflexao"
    scoring_guide: |
      1-3: Generic, invisible in a feed. No reason to stop.
      4-6: Mildly interesting but does not demand attention.
      7-8: Creates genuine curiosity. Prospect pauses.
      9-10: Impossible to ignore. Creates immediate desire to know more.
  # --------------------------------------------------------------------------
  # A — AVATAR-SPECIFIC
  # --------------------------------------------------------------------------
  # Does the target audience instantly know "this is for me"?
  A_avatar_specific:
    definition: "The name signals who it is for. Non-ideal clients self-select out."
    test: "Does my avatar see themselves in this name within 2 seconds?"
    techniques:
      - "Include avatar identifier: 'Coaches', 'SaaS Founders', 'Dentistas'"
      - "Use their language: words they already use to describe themselves"
      - "Reference their situation: 'Side Hustle to Full-Time', 'Corporate Escape'"
      - "Niche specificity: the narrower the avatar reference, the higher the perceived value"
    examples:
      en:
        - "'The Coach's Client Machine' — avatar = coaches, result = clients"
        - "'The SaaS Growth Playbook' — avatar = SaaS founders"
        - "'Gym Launch' — avatar = gym owners (2 words, crystal clear)"
      pt_br:
        - "'Automacao para Dentistas' — avatar no nome, zero ambiguidade"
        - "'YOUR_PRODUCT' — avatar implícito (profissional + IA)"
        - "'Sistema do Advogado Digital' — profissao + transformacao"
    scoring_guide: |
      1-3: Could be for anyone. No avatar signal.
      4-6: Broad category implied but not explicit.
      7-8: Avatar clearly identified. They see themselves.
      9-10: Hyper-specific. Only the right person clicks. Everyone else scrolls.
  # --------------------------------------------------------------------------
  # G — GOAL-ORIENTED
  # --------------------------------------------------------------------------
  # Does the name promise a specific outcome?
  G_goal_oriented:
    definition: "The name communicates the result, not the process."
    test: "What result does this name promise? If the answer is vague, the name is weak."
    techniques:
      - "Outcome in the name: 'Client Acquisition', 'Revenue Engine', 'Liberdade Financeira'"
      - "Transformation implied: before-state to after-state in 2-5 words"
      - "Specific metric: '$100K MRR', '30 Clients', '10h/Semana Liberadas'"
      - "Status shift: the name implies a new identity ('Authority', 'Legend', 'Leader')"
    examples:
      en:
        - "'$100M Offers' — goal = $100M revenue"
        - "'The 4-Hour Body' — goal = body transformation + 4 hours"
        - "'30 Clients in 30 Days' — goal = 30 clients, timeframe = 30 days"
      pt_br:
        - "'10k em 90 Dias' — meta clara, prazo concreto"
        - "'Maquina de Vendas Automatica' — resultado = vendas sem esforco manual"
        - "'Primeiro Cliente em 7 Dias' — marco especifico + urgencia"
    scoring_guide: |
      1-3: No result implied. The name describes a process or a vague concept.
      4-6: General benefit implied but not specific.
      7-8: Clear result. Prospect knows what they will achieve.
      9-10: Measurable, time-bound, aspirational. Undeniable outcome.
  # --------------------------------------------------------------------------
  # I — IDENTIFIABLE
  # --------------------------------------------------------------------------
  # Can someone remember and repeat this name to a friend?
  I_identifiable:
    definition: "The name is short, sticky, and repeatable. Word-of-mouth test."
    test: "If my client told a friend about this, could they remember the name 10 minutes later?"
    techniques:
      - "Short: 2-5 words ideal. Beyond 6 words, memorability drops sharply."
      - "Rhythm or alliteration: 'Profit First', 'Gym Launch', 'Content Machine'"
      - "No jargon: if it needs explanation, it fails this criterion"
      - "Easy to spell: avoid made-up words, unusual spellings, forced acronyms"
    anti_patterns:
      - "Acronyms nobody knows: 'The S.C.A.L.E. Method' — forced, generic, forgettable"
      - "Made-up words: 'Synergix Pro' — sounds like software, not a transformation"
      - "Names that need a tagline: if the name does not stand alone, it is not a name"
      - "Long compound names: 'The Ultimate High-Ticket Client Acquisition Accelerator Program' — nobody repeats this"
    examples:
      en:
        - "'Gym Launch' — 2 words, crystal clear, easy to repeat"
        - "'Profit First' — 2 words, counterintuitive, sticky"
        - "'The $100M Playbook' — 3 words + number, memorable"
      pt_br:
        - "'YOUR_PRODUCT' — 2 words, aspirational, repeatable"
        - "'Lucro Certo' — 2 words, rhymes in PT-BR, sticky"
        - "'Sistema 90D' — short, numeric, easy to reference"
    scoring_guide: |
      1-3: Long, complex, requires explanation. Impossible to remember.
      4-6: Reasonable length but no rhythm or stickiness.
      7-8: Short, clear, someone could text it to a friend easily.
      9-10: Iconic. Two words. Instant recognition. Could become a brand.
  # --------------------------------------------------------------------------
  # C — COMPELLING
  # --------------------------------------------------------------------------
  # Does the name create urgency, FOMO, or a sense of exclusivity?
  C_compelling:
    definition: "The name implies that NOT engaging means missing out."
    test: "Does this name make someone want to act NOW rather than 'someday'?"
    techniques:
      - "Imply limited access: 'The Inner Circle', 'Founders Club', 'Turma Fechada'"
      - "Suggest insider knowledge: 'The Launch Code', 'The Playbook', 'O Sistema'"
      - "Hint at competitive advantage: 'The Unfair Advantage', 'The Edge'"
      - "Create aspiration: 'Legendary', 'Grand Slam', 'Elite'"
    examples:
      en:
        - "'The Inner Circle' — exclusivity, you are either in or out"
        - "'The Launch Code' — insider knowledge, secret system"
        - "'$100M Offers' — aspirational, implies you are playing at a higher level"
      pt_br:
        - "'Circulo Interno' — exclusividade, tribo fechada"
        - "'O Codigo' — insider knowledge, sistema secreto"
        - "'Lendário' — aspiracional, identidade transformada"
    scoring_guide: |
      1-3: No urgency, no exclusivity. Could buy anytime and feel nothing.
      4-6: Mild aspiration but no FOMO.
      7-8: Creates a real desire to be "in." Missing out feels costly.
      9-10: The name itself generates urgency. People talk about it before they buy.
# ============================================================================
# MAGIC SCORING EXERCISE
# ============================================================================
# Score your current offer name (or each candidate) against the 5 criteria.
# Be brutally honest. Inflated scores lead to weak names that cost conversions.
magic_scoring:
  name_candidate: "FILL — Your current or proposed offer name"
  scores:
    M_magnetic: "FILL X/10 — FILL reason"
    A_avatar_specific: "FILL X/10 — FILL reason"
    G_goal_oriented: "FILL X/10 — FILL reason"
    I_identifiable: "FILL X/10 — FILL reason"
    C_compelling: "FILL X/10 — FILL reason"
  composite: "FILL X/50"
  verdict: |
    FILL — Based on composite score:
    GREEN (40-50): Name is strong. Test in market immediately.
    YELLOW (30-39): Name has potential. Refine the weakest letter.
    RED (0-29): Name is holding back the offer. Rebuild using the generation exercise below.
# ============================================================================
# NAME GENERATION EXERCISE (5 Steps)
# ============================================================================
# Do not skip steps. The ingredients determine the output quality.
