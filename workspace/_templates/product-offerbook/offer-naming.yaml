# 4. Extract ingredients from value-equation.yaml (Dream Outcome), icp.yaml (Avatar), offerbook.yaml (Mechanism)
# 5. Score all 10 candidates honestly — inflated scores cost you conversions
# 6. Top 3 go to real market testing (10 people or A/B ad test)
# 7. Winner gets integrated into all customer-facing offerbook files
