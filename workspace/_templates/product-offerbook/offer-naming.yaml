  # STEP 1: Extract raw ingredients from existing offerbook files
  step_1_ingredients:
    dream_outcome: "FILL — From value-equation.yaml: what is the final transformation?"
    avatar: "FILL — From icp.yaml: who specifically is this for?"
    unique_mechanism: "FILL — From offerbook.yaml: what makes this system different?"
    timeframe: "FILL — How long until the primary result? (30 days, 90 days, 6 months)"
    key_metric: "FILL — What number defines success? (clients, revenue, hours saved)"
    counterintuitive_element: "FILL — What belief does this offer challenge?"
    status_shift: "FILL — What does the client BECOME? (Authority, Leader, Free, Legendary)"
  # STEP 2: Generate 10 candidates using naming formulas
