# ============================================================================
# NAMING ANTI-PATTERNS
# ============================================================================
# These patterns kill conversion. Check your final name against every one.
anti_patterns:
  items:
    - pattern: "Generic program names"
      examples: "'Business Mastery', 'Success Academy', 'Growth Lab'"
      why_it_fails: "Could be any competitor. Zero differentiation. Avatar does not self-select."
    - pattern: "Clever wordplay nobody gets"
      examples: "'The Nexus Effect', 'Paradigm Shift Pro'"
      why_it_fails: "Requires explanation. If the name needs a tagline to make sense, the name failed."
    - pattern: "Names focused on YOU, not the AVATAR"
      examples: "'Alan's Method', 'The Smith System'"
      why_it_fails: "Nobody cares about you yet. They care about themselves. Earn name recognition first."
    - pattern: "Forced acronyms"
      examples: "'The S.C.A.L.E. Method', 'The R.I.S.E. Framework', 'Sistema S.O.A.R.'"
      why_it_fails: "All taken. All generic. Nobody remembers what the letters stand for."
    - pattern: "Names that sound like every competitor"
      examples: "'AI Mastery Course', 'Digital Marketing Program'"
      why_it_fails: "Commodity positioning. Impossible to charge premium."
    - pattern: "Overly long names"
      examples: "'The Ultimate High-Ticket Client Acquisition Accelerator System'"
      why_it_fails: "Nobody repeats this. Word-of-mouth dies. Fails the I in MAGIC."
  final_check: |
    FILL — Does your final name pass ALL anti-pattern checks?
    [ ] Not generic (would NOT apply to any competitor)
    [ ] Not clever-but-unclear (stands alone without explanation)
    [ ] Not me-focused (avatar is the hero, not the creator)
    [ ] Not a forced acronym
    [ ] Not identical to competitors
    [ ] Not too long (under 6 words)
# ============================================================================
# NAME TESTING PROTOCOL
# ============================================================================
# The market decides. Not you. Not your team. Not your spouse.
# Two testing methods, in order of reliability.
testing_protocol:
  method_1_qualitative:
    description: "Ask 10 people in your target market"
    process: |
      1. Find 10 people who match your ICP (not friends, not family)
      2. Show them ONLY the 3 finalist names (no context, no explanation)
      3. Ask: "Which of these would you click on?"
      4. Record the choice AND the reason
      5. If 7+ pick the same name, you have a winner
      6. If split, the names are too similar — go back to generation
    what_to_track: "FILL — choices and reasons for each of the 10 people"
  method_2_quantitative:
    description: "A/B test as ad headline — cheapest market validation"
    process: |
      1. Create 3 identical ads, changing ONLY the headline (the offer name)
      2. Run each to 1000+ impressions in your target audience
      3. Track click-through rate (CTR) per variant
      4. Winner = highest CTR after statistical significance
      5. Budget: R$ 50-100 per variant is enough for directional data
    metrics:
      variant_1_name: "FILL"
      variant_1_impressions: "FILL"
      variant_1_clicks: "FILL"
      variant_1_ctr: "FILL %"
      variant_2_name: "FILL"
      variant_2_impressions: "FILL"
      variant_2_clicks: "FILL"
      variant_2_ctr: "FILL %"
      variant_3_name: "FILL"
      variant_3_impressions: "FILL"
      variant_3_clicks: "FILL"
      variant_3_ctr: "FILL %"
    winner: "FILL — Name with highest CTR"
# ============================================================================
# INTEGRATION — Where the Name Goes After Selection
# ============================================================================
# The name propagates to every customer-facing file. Update all of these.
integration:
  files_to_update:
    - file: "offerbook.yaml"
      field: "metadata.product_name + posicionamento.nome_produto_breakdown"
      action: "FILL — Update product name and breakdown"
    - file: "sales-page.yaml"
      field: "headline + sub-headline"
      action: "FILL — Name becomes the primary headline or headline anchor"
    - file: "headlines.yaml"
      field: "primary headlines bank"
      action: "FILL — Generate headline variations incorporating the name"
    - file: "ad-brief.yaml"
      field: "offer_name + headline variations"
      action: "FILL — Update ad creative with winning name"
    - file: "email-sequences.yaml"
      field: "subject lines + body references"
      action: "FILL — Incorporate name into launch and nurture sequences"
  consistency_check: |
    FILL — After updating all files, verify:
    [ ] Name appears consistently across all customer-facing materials
    [ ] No old name references remain in any file
    [ ] Tagline (if any) is used consistently alongside the name
    [ ] Name works in all channels (email subject, ad headline, social post, word of mouth)
