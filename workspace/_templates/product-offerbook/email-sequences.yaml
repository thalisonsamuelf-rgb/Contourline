---
# EMAIL-SEQUENCES.YAML - Email funnels and automation sequences
# Purpose: Map email campaigns that drive conversions
# Guardian: Email Marketer / CMO / Copywriter
# Timing: FILL BEFORE LAUNCHING - Map all email sequences

metadata:
  version: "2.0"
  product_name: "YOUR_PRODUCT_NAME_HERE"
  status: "INCOMPLETE"
  last_updated: "FILL_THIS"
  owner: "Email Marketer or CMO"
  notes: |
    This file maps ALL email sequences for the product.
    Different sequences serve different purposes:
    - Nurture (build awareness + trust)
    - Presale (build desire)
    - Sales (convert)
    - Retention (keep customers happy)
    - Upsell (sell more)

    v2.0 UPGRADE: All subject lines now use Hormozi Hook Formulas.
    Every email has 3 subject line alternatives tagged by hook type,
    preview text, and A/B test fields. Reference: hooks.yaml for
    the full 8-type taxonomy and platform-specific email rules.
# ============================================================================
# SUBJECT LINE RULES (Hormozi Hook Engineering — Email Platform)
# ============================================================================
subject_line_rules:
  character_limit: "40-60 characters (truncates on mobile at 35-40)"
  number_rule: "80% of subject lines must contain a specific number"
  personalization: "Use [Name] in 30% of subject lines"
  banned_patterns:
    - "Generic questions without specificity ('Want to grow?')"
    - "ALL CAPS (spam trigger)"
    - "Multiple exclamation marks (!!!)"
    - "Emoji in subject line (reduces deliverability in many ESPs)"
    - "Re: or Fwd: fakes (trust destroyer)"
    - "Spam words: 'FREE', 'ACT NOW', 'LIMITED TIME', 'GUARANTEED'"
    - "Starting with brand name"
  proven_patterns:
    - "Counterintuitive statement: 'Why I stopped [common practice]'"
    - "Specific number: '3 things I'd change about your [asset]'"
    - "Pattern interrupt: 'Bad news about your [topic]'"
    - "Open loop: '[Name], I noticed something about...'"
    - "Parenthetical intrigue: 'Your offer (and what's wrong with it)'"
    - "Direct value: 'The exact [framework] I used to [result]'"
    - "Confession: 'I made a mistake with your [asset]'"
    - "Binary choice: '2 types of [avatar]. Which one are you?'"
  testing_requirement: "A/B test subject lines on every email. Track open rates. Rewrite any email with open rate < 20%."
  preview_text_rules:
    length: "40-90 characters"
    purpose: "Extends the curiosity gap or adds specificity — never repeats the subject line"
    best_practice: "Preview text should answer the implicit question the subject line creates, partially"
# ============================================================================
# SECTION 1: EMAIL STRATEGY OVERVIEW
# ============================================================================
email_strategy:
  # What is the overall email strategy?
  overall_goal: |
    Example: "Build email list -> Nurture with value -> Convert with offer -> Retain with support"

    Your goal:
    [YOUR EMAIL STRATEGY GOAL]
  list_segments:
    # Different emails for different groups
    segment_1: "Cold leads (recently opted in, no purchase)"
    segment_2: "Warm leads (engaged, considering purchase)"
    segment_3: "Customers (bought product)"
    segment_4: "VIP (multiple purchases or high-value)"
  email_frequency: |
    Cold: 2-3x per week
    Warm: 3-5x per week
    Customers: 1-2x per week
    VIP: 1x per week (or on-demand)

    Your frequency: [YOUR FREQUENCY]
  platform: |
    Tool you're using: [ConvertKit, ActiveCampaign, Klaviyo, etc]
  automation_vs_broadcast:
    # Automated sequences vs manual broadcasts
    automation: "Triggered by action (opt-in, purchase, etc)"
    broadcast: "Sent manually to segment at specific time"
