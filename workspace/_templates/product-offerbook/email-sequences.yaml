# ============================================================================
# TEMPLATE NOTES FOR USERS
# ============================================================================
template_notes: |
  This file maps WHEN and WHY each email goes out.
  It's a sequence blueprint, not final copy.

  v2.0 SUBJECT LINE UPGRADE:
  Every email now includes 3 subject line alternatives using Hormozi Hook Formulas.
  Each alternative is tagged with:
  - hook_type: Which of the 8 types (Question, Statement, Conditional, Command, Label, List, Narrative, Exclamation)
  - hook_formula: Which formula from the 121 database or 20 Master Templates
  - preview_text: Inbox preview that extends the curiosity gap
  - subject_line_test: A/B test fields to track open rates

  HOW TO USE SUBJECT LINES:
  1. Pick 2 of the 3 alternatives for your A/B test
  2. Set up the test in your ESP (equal split, 24h test window)
  3. Track open rates in the subject_line_test fields
  4. Winner becomes the control. Loser gets replaced with a new variation.
  5. Rewrite any email with open rate < 20%.

  PLACEHOLDER GUIDE:
  [Name] = First name personalization token from your ESP
  [avatar] = Replace with your specific avatar (e.g., "gym owners", "coaches", "SaaS founders")
  [date] = Replace with your actual date
  [day] = Replace with your actual day of week
  [result] = Replace with your specific promised result
  [topic] = Replace with your specific topic
  [revenue] = Replace with relevant revenue number
  R$X = Replace with your actual pricing

  DO:
  - Map all sequences before writing
  - Write subject lines that match awareness level
  - A/B test every subject line
  - Include CTAs that match email purpose
  - Test on mobile (most opens are mobile)
  - Automate sequences (don't send manually if avoidable)
  - Track open rates obsessively

  DON'T:
  - Skip sequences (each serves a purpose)
  - Write without mapping first
  - Use generic subject lines without numbers
  - Forget CTAs
  - Send all emails at same time
  - Use ALL CAPS in subject lines
  - Use emojis in subject lines
  - Fake Re: or Fwd: prefixes

  KEY PRINCIPLE:
  Every email should move prospect closer to purchase.
  No fluff. No "just checking in."
  Every email = value or conversion push.
  Every subject line = a hook. If the hook fails, the email dies unopened.

  CROSS-REFERENCE:
  See hooks.yaml for the full 8-type hook taxonomy, 70-20-10 framework,
  platform-specific email rules, and the quality checklist.

  Update: After launch, track metrics and optimize.
  Change subject lines if open rate drops below 20%.
  Remove emails that don't drive results.

  This is your SYSTEM for email funnel success.
