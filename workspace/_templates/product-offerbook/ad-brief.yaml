---
# AD-BRIEF.YAML - Media Buyer Extraction Layer
# Purpose: One file = everything a media buyer needs to create ads.
#          Extracts and organizes data from 20 offerbook files into a single actionable brief.
# Guardian: Ads Manager / Media Buyer / CMO
# Timing: FILL using data from completed offerbook files (30-60 min extraction exercise)
# Framework: GOATed Ads Assembly Process (Hook + Meat + CTA)
# Dependencies: icp.yaml, proof.yaml, objections.yaml, diagnosis.yaml, value-equation.yaml,
#               testimonials.yaml, scarcity-urgency.yaml, headlines.yaml, copy-swipes.yaml,
#               guarantee-design.yaml, offerbook.yaml
#
# PROBLEM THIS FILE SOLVES:
# A media buyer receiving 20 offerbook files needs 2-4 hours to FIND the relevant data.
# This file is the EXTRACTION LAYER — it pulls everything a media buyer needs into one place.
# Fill it once, reference it every time you create ads.

metadata:
  version: "1.0"
  product_name: "FILL_THIS"
  status: "INCOMPLETE"
  last_updated: "FILL_THIS"
  owner: "Ads Manager / Media Buyer"
  estimated_fill_time: "30-60 minutes (using other offerbook files)"
  notes: |
    HOW TO USE THIS FILE:
    1. Open this file alongside the source files listed in the source_map below
    2. For each section, go to the referenced source file and EXTRACT the data
    3. Write it in the prospect's EXACT language (not marketing speak)
    4. Once filled, this is your ONLY reference when creating ads
    5. Update when source files change (new proof, new objections, new testimonials)

    RULE: Every field has a source reference. You are EXTRACTING, not inventing.
    If the source file is empty, the ad brief field stays empty. Do not guess.
# ============================================================================
# SOURCE MAP — Where to find each section's data
# ============================================================================
# Before filling anything, read this map. It tells you EXACTLY which file
# provides which section. Open only the files you need.
source_map:
  ad_targeting:
    primary_source: "icp.yaml > demographics, psychographics, archetypes"
    secondary_source: "analytics.yaml > behavioral data (if available)"
    what_to_extract: "Avatar definition, pain language, fear language, desire language, targeting parameters"
  ad_angles:
    primary_source: "icp.yaml > pains, fears, motivations, archetypes"
    secondary_source: "objections.yaml > Tier 1 and Tier 2 objections"
    tertiary_source: "value-equation.yaml > Dream Outcome, weakest variable"
    what_to_extract: "10+ distinct angles mapped to awareness levels and platforms"
  hook_bank:
    primary_source: "headlines.yaml > headlines_by_awareness, headlines_by_channel"
    secondary_source: "copy-swipes.yaml > opening_hooks, headlines by level"
    what_to_extract: "10+ hooks organized by type, awareness level, and platform"
  proof_arsenal:
    primary_source: "proof.yaml > case_studies, statistics, social_proof, founder_proof"
    secondary_source: "testimonials.yaml > testimonials_by_awareness_level, themed_quotes"
    what_to_extract: "Stat-based proof hooks, screenshot-ready proof, video testimonial scripts"
  urgency_elements:
    primary_source: "scarcity-urgency.yaml > scarcity_types, urgency_types, copy_templates"
    what_to_extract: "Genuine scarcity statements, deadline copy, communication timeline"
  guarantee_copy:
    primary_source: "guarantee-design.yaml > guarantee_language, guarantee_variations"
    what_to_extract: "Guarantee name, headline, short copy, ad version"
  awareness_routing:
    primary_source: "diagnosis.yaml > market_awareness_level, combined_diagnosis"
    what_to_extract: "Primary awareness level, copy length guidance, headline approach"
  value_equation_data:
    primary_source: "value-equation.yaml > dream_outcome, perceived_likelihood, time_delay, effort_sacrifice"
    what_to_extract: "Dream Outcome statement, transformation before/after, weakest variable"
  offer_architecture:
    primary_source: "offerbook.yaml > offer components, pricing, bonuses"
    what_to_extract: "What they get, price, value stack, unique mechanism"
  objection_data:
    primary_source: "objections.yaml > Tier 1 objections (top 5)"
    what_to_extract: "Top 5 objections with responses for retargeting ads"
# ============================================================================
# SECTION 1: AD TARGETING SUMMARY
# ============================================================================
# Extract from: icp.yaml > core_icp, demographics, psychographics, archetypes
# Purpose: Give the media buyer a clear picture of WHO they are targeting
ad_targeting:
  primary_avatar:
    one_sentence: "FILL — Extract from: icp.yaml > core_icp > one_sentence_definition"
    avatar_name: "FILL — Extract from: icp.yaml > core_icp > icp_name"
  top_3_pains_verbatim:
    # Use the prospect's EXACT words. Not your marketing version.
    pain_1: "FILL — Extract from: icp.yaml > pains > latent_pains > pain_1"
    pain_2: "FILL — Extract from: icp.yaml > pains > latent_pains > pain_2"
    pain_3: "FILL — Extract from: icp.yaml > pains > latent_pains > pain_3"
  top_3_fears_verbatim:
    fear_1: "FILL — Extract from: icp.yaml > fears > explicit_fears_declared > fear_1 > name + manifestation"
    fear_2: "FILL — Extract from: icp.yaml > fears > explicit_fears_declared > fear_2 > name + manifestation"
    fear_3: "FILL — Extract from: icp.yaml > fears > explicit_fears_declared > fear_3 > name + manifestation"
  top_3_desires_verbatim:
    desire_1: "FILL — Extract from: icp.yaml > what_really_seeking > deep_level"
    desire_2: "FILL — Extract from: icp.yaml > values_hierarchy > value_1"
    desire_3: "FILL — Extract from: icp.yaml > archetypes > archetype_1 > what_really_seeks > deep"
  demographic_targeting:
    age_range: "FILL — Extract from: icp.yaml > demographics > age > primary_range"
    gender: "FILL — Extract from: icp.yaml > demographics (if specified)"
    location: "FILL — Extract from: icp.yaml > demographics > geographic_distribution"
    income_level: "FILL — Extract from: icp.yaml > archetypes (income range across archetypes)"
    job_titles: "FILL — Extract from: icp.yaml > demographics > professional_experience > field"
    education: "FILL — Extract from: icp.yaml > demographics > education"
  interest_based_targeting:
    what_they_follow: "FILL — Infer from: icp.yaml > psychographics > consumption_pattern + behavioral_patterns"
    what_they_read: "FILL — Infer from: icp.yaml > psychographics > core_beliefs + mindset"
    what_they_buy: "FILL — Extract from: icp.yaml > behavioral_patterns > consumption_pattern > courses_purchased_per_year"
    influencers_they_follow: "FILL — Research based on ICP archetype (not in offerbook — media buyer research)"
    platforms_they_use: "FILL — Research based on ICP demographics"
  behavioral_signals:
    what_they_search: "FILL — Infer from: icp.yaml > psychographics > mindset > dominant_thought + secondary_thought"
    where_they_congregate: "FILL — Infer from: icp.yaml > community_need + archetypes"
    purchase_triggers: "FILL — Extract from: icp.yaml > motivations > action_triggers"
    purchase_blockers: "FILL — Extract from: icp.yaml > motivations > paralysis_triggers"
# ============================================================================
# SECTION 2: AD ANGLES MATRIX
# ============================================================================
# Extract from: icp.yaml + objections.yaml + value-equation.yaml
# Purpose: 10+ distinct angles mapped to types, awareness levels, and platforms
# Each angle is a DIRECTION for an ad, not a complete ad.
ad_angles:
  angle_1:
    type: "Pain"
    angle_name: "FILL — e.g., 'The Scattered Energy Problem'"
    source_data_point: "FILL — Extract from: icp.yaml > pains > latent_pains > pain_1"
    hook_direction: "FILL — 1-sentence hook concept. e.g., 'You have 5 projects and none making real money'"
    awareness_level_fit: "Problem Aware (Level 2)"
    platform_fit: "Facebook, Instagram Feed, YouTube"
  angle_2:
    type: "Fear"
    angle_name: "FILL — e.g., 'The Irrelevance Clock'"
    source_data_point: "FILL — Extract from: icp.yaml > fears > explicit_fears_declared > fear_3"
    hook_direction: "FILL — e.g., 'While you are planning, someone younger is executing'"
    awareness_level_fit: "Problem Aware (Level 2), Unaware (Level 1)"
    platform_fit: "Facebook, YouTube, TikTok"
  angle_3:
    type: "Aspiration"
    angle_name: "FILL — e.g., 'The Freedom Builder'"
    source_data_point: "FILL — Extract from: icp.yaml > what_really_seeking > deep_level"
    hook_direction: "FILL — e.g., 'What if your 20 years of experience became your unfair advantage?'"
    awareness_level_fit: "Solution Aware (Level 3)"
    platform_fit: "Facebook, Instagram, YouTube"
  angle_4:
    type: "Proof"
    angle_name: "FILL — e.g., 'The Results Parade'"
    source_data_point: "FILL — Extract from: proof.yaml > statistics > results + social_proof"
    hook_direction: "FILL — e.g., 'FILL_THIS positive ROI in 90 days. Here is how.'"
    awareness_level_fit: "Product Aware (Level 4), Solution Aware (Level 3)"
    platform_fit: "Facebook, Instagram, YouTube"
  angle_5:
    type: "Curiosity"
    angle_name: "FILL — e.g., 'The Hidden Pattern'"
    source_data_point: "FILL — Extract from: icp.yaml > behavioral_patterns > cycling_pattern"
    hook_direction: "FILL — e.g., 'The reason you start new projects every 2-3 months (and how to stop)'"
    awareness_level_fit: "Unaware (Level 1), Problem Aware (Level 2)"
    platform_fit: "TikTok, Instagram Reels, YouTube"
  angle_6:
    type: "Mechanism"
    angle_name: "FILL — e.g., 'The System vs Course Distinction'"
    source_data_point: "FILL — Extract from: value-equation.yaml > unique mechanism or offerbook.yaml > unique_mechanism"
    hook_direction: "FILL — e.g., 'Courses sell information. Systems sell execution. Here is the difference.'"
    awareness_level_fit: "Solution Aware (Level 3)"
    platform_fit: "YouTube, Facebook, Native"
  angle_7:
    type: "Objection-Killer"
    angle_name: "FILL — e.g., 'The Course Skeptic'"
    source_data_point: "FILL — Extract from: objections.yaml > objection_1 (most frequent)"
    hook_direction: "FILL — e.g., 'Already bought 5 courses that failed? This is not a course.'"
    awareness_level_fit: "Product Aware (Level 4), Solution Aware (Level 3)"
    platform_fit: "Facebook, YouTube (retargeting)"
  angle_8:
    type: "Contrast"
    angle_name: "FILL — e.g., 'Before/After Transformation'"
    source_data_point: "FILL — Extract from: proof.yaml > before_after > archetype_1"
    hook_direction: "FILL — e.g., 'R$ 8k/month scattered across 5 projects to R$ 15k/month with 1 focused offer'"
    awareness_level_fit: "Problem Aware (Level 2), Solution Aware (Level 3)"
    platform_fit: "Instagram, TikTok, Facebook"
  angle_9:
    type: "Story"
    angle_name: "FILL — e.g., 'The Founder Journey'"
    source_data_point: "FILL — Extract from: proof.yaml > founder_proof or testimonials.yaml > level_3"
    hook_direction: "FILL — e.g., 'FILL_THIS in revenue since 2014. Here is the one system that made it work.'"
    awareness_level_fit: "Solution Aware (Level 3), Product Aware (Level 4)"
    platform_fit: "YouTube, Facebook, Instagram"
  angle_10:
    type: "Authority"
    angle_name: "FILL — e.g., 'The Track Record'"
    source_data_point: "FILL — Extract from: proof.yaml > founder_credibility_proof + social_proof"
    hook_direction: "FILL — e.g., '20,000+ students. FILL_THIS countries. FILL_THIS retention. The data speaks.'"
    awareness_level_fit: "Most Aware (Level 5), Product Aware (Level 4)"
    platform_fit: "Facebook, YouTube, Native"
    # Add more angles as needed. 10 is the minimum, not the maximum.
    # Each angle should map to a DIFFERENT pain, fear, desire, proof point, or objection.
    # Diversity of angles = diversity of audiences reached.
# ============================================================================
# SECTION 3: HOOK BANK FOR ADS
# ============================================================================
# Extract from: headlines.yaml + copy-swipes.yaml
# Purpose: 10+ hooks organized for ad use, tagged by type and awareness level
# Distribution: 7 proven (Core), 2 adapted (Adjacent), 1 experimental (Moonshot)
#
# RULE: 70-20-10 distribution. 7 hooks from proven patterns, 2 adapted from
# other niches, 1 completely experimental. This balances reliability with discovery.
hook_bank:
  distribution_check:
    core_proven: 7
    adjacent_adapted: 2
    moonshot_experimental: 1
    total: 10
  # CORE HOOKS (70% — Proven patterns applied to your product)
  hook_1:
    text: "FILL — Extract pattern from: headlines.yaml > level_2 or level_3 formulas, apply to your product"
    type: "Question"
    awareness_level: "Problem Aware (Level 2)"
    value_equation_variable: "Dream Outcome"
    platform: "Facebook, Instagram"
    category: "Core"
    source_reference: "headlines.yaml > level_2_problem_aware > formula_1"
  hook_2:
    text: "FILL — Extract pattern from: headlines.yaml > level_3 formulas"
    type: "Statement"
    awareness_level: "Solution Aware (Level 3)"
    value_equation_variable: "Perceived Likelihood"
    platform: "Facebook, YouTube"
    category: "Core"
    source_reference: "headlines.yaml > level_3_solution_aware > formula_1"
  hook_3:
    text: "FILL — Extract pattern from: copy-swipes.yaml > opening_hooks > data_hook"
    type: "Statistic"
    awareness_level: "Solution Aware (Level 3)"
    value_equation_variable: "Perceived Likelihood"
    platform: "Facebook, Instagram, TikTok"
    category: "Core"
    source_reference: "copy-swipes.yaml > opening_hooks > data_hook"
  hook_4:
    text: "FILL — Build from: proof.yaml > statistics + case_studies (use specific numbers)"
    type: "Proof"
    awareness_level: "Product Aware (Level 4)"
    value_equation_variable: "Perceived Likelihood"
    platform: "Facebook, YouTube, Native"
    category: "Core"
    source_reference: "proof.yaml > statistics > results"
  hook_5:
    text: "FILL — Build from: icp.yaml > pains > hidden_pains_not_verbalized"
    type: "Label"
    awareness_level: "Problem Aware (Level 2)"
    value_equation_variable: "Dream Outcome"
    platform: "Facebook, Instagram"
    category: "Core"
    source_reference: "icp.yaml > pains > hidden_pains_not_verbalized"
  hook_6:
    text: "FILL — Build from: objections.yaml > objection_1 (flip the objection into a hook)"
    type: "Conditional"
    awareness_level: "Product Aware (Level 4)"
    value_equation_variable: "Effort & Sacrifice"
    platform: "Facebook, YouTube"
    category: "Core"
    source_reference: "objections.yaml > objection_1"
  hook_7:
    text: "FILL — Build from: value-equation.yaml > dream_outcome > one_sentence_promise"
    type: "Command"
    awareness_level: "Solution Aware (Level 3)"
    value_equation_variable: "Dream Outcome"
    platform: "Facebook, Instagram, TikTok"
    category: "Core"
    source_reference: "value-equation.yaml > dream_outcome"
  # ADJACENT HOOKS (20% — Adapted from other niches)
  hook_8:
    text: "FILL — Find a winning hook from another industry and adapt the STRUCTURE (not the words)"
    type: "Narrative"
    awareness_level: "Unaware (Level 1)"
    value_equation_variable: "Dream Outcome"
    platform: "YouTube, Facebook"
    category: "Adjacent"
    source_reference: "External swipe file — adapted structure from [industry]"
    adaptation_notes: "FILL — Original industry, original hook structure, how you adapted"
  hook_9:
    text: "FILL — Find a winning hook from another industry and adapt"
    type: "List"
    awareness_level: "Problem Aware (Level 2)"
    value_equation_variable: "Time Delay"
    platform: "TikTok, Instagram Reels"
    category: "Adjacent"
    source_reference: "External swipe file — adapted from [industry]"
    adaptation_notes: "FILL — Original hook, adapted version, why it fits"
  # MOONSHOT HOOK (10% — Completely experimental)
  hook_10:
    text: "FILL — Something nobody in your niche has tried. Visual pattern interrupt, confession, controversial statement."
    type: "Exclamation / Pattern Interrupt"
    awareness_level: "Unaware (Level 1)"
    value_equation_variable: "N/A (attention-first)"
    platform: "TikTok, Instagram Reels"
    category: "Moonshot"
    source_reference: "Original — no source. Pure experiment."
    experiment_hypothesis: "FILL — What are you testing? Why might this work?"
# ============================================================================
# SECTION 4: AD MEAT TEMPLATES
# ============================================================================
# Purpose: 5 ad body formats with template structure, source mapping,
#          and platform/awareness-level fit.
# The meat fulfills the hook's promise. It must be congruent.
# Rotate meats less often than hooks — fewer people see the body.
ad_meat_templates:
  format_1_problem_agitate_solve:
    name: "Problem-Agitate-Solve (PAS)"
    structure: |
      [0-3s] Hook — state the problem (from hook_bank)
      [3-8s] AGITATE — amplify the pain. Show consequences of NOT solving.
              Make them FEEL the cost of inaction.
      [8-18s] SOLVE — introduce your solution. Name the mechanism.
              Explain WHY it works (not just WHAT it is).
      [18-25s] PROOF — one stat, one testimonial, or one result.
      [25-30s] CTA — clear next step.
    where_to_pull_content:
      problem: "icp.yaml > pains > latent_pains"
      agitation: "icp.yaml > fears > explicit_fears_declared + hidden_pains_not_verbalized"
      solution: "offerbook.yaml > unique_mechanism + value-equation.yaml > dream_outcome"
      proof: "proof.yaml > statistics or testimonials.yaml > short_form"
    example: |
      HOOK: "If you have 5 projects and none making real money, this is for you."
      AGITATE: "Every month you stay scattered is a month of income you never recover.
      Your competitors with 1 focused offer are pulling ahead."
      SOLVE: "The [Mechanism] system consolidates your expertise into 1 scalable offer
      using IA automation. Not another course. A system you execute in real time."
      PROOF: "FILL_THIS of members achieve positive ROI in 90 days."
      CTA: "See if this is right for you. Link below."
    best_platform: "Facebook (primary text + video), YouTube pre-roll"
    best_awareness_level: "Problem Aware (Level 2), Solution Aware (Level 3)"
  format_2_proof_first:
    name: "Proof-First (Lead with Result)"
    structure: |
      [0-3s] Hook — lead with a specific result or testimonial
      [3-10s] CONTEXT — who achieved this result? What was their situation before?
      [10-20s] HOW — explain the mechanism that made it possible
      [20-25s] BRIDGE — connect their result to the prospect's situation
      [25-30s] CTA — clear next step
    where_to_pull_content:
      result: "proof.yaml > case_studies or before_after"
      context: "proof.yaml > case_study_X > before_state"
      mechanism: "offerbook.yaml > unique_mechanism"
      bridge: "icp.yaml > archetypes > archetype matching the case study"
    example: |
      HOOK: "R$ 8k/month to R$ 15k/month in 90 days. With fewer projects, not more."
      CONTEXT: "Maria was a digital entrepreneur with 5 projects. Scattered. Overwhelmed.
      Income plateaued for 2 years."
      HOW: "She joined [Product], implemented the WIP=1 system, and used IA automation
      to replace 10 hours of manual work per week."
      BRIDGE: "If you are in the same situation — multiple projects, no focus — this system
      was built for you."
      CTA: "See the full case study. Link below."
    best_platform: "Facebook, Instagram Feed, YouTube"
    best_awareness_level: "Solution Aware (Level 3), Product Aware (Level 4)"
  format_3_story_arc:
    name: "Story Arc (Before-Struggle-Discovery-Transformation)"
    structure: |
      [0-3s] Hook — intrigue or relatable opening
      [3-8s] BEFORE — paint the before state (prospect sees themselves)
      [8-12s] STRUGGLE — the turning point. What was the breaking moment?
      [12-20s] DISCOVERY — how they found the solution
      [20-25s] TRANSFORMATION — specific results, emotional and financial
      [25-30s] CTA — clear next step
    where_to_pull_content:
      before: "proof.yaml > before_after > archetype_X > before"
      struggle: "icp.yaml > fears > existential_fears + pains > existential_pains"
      discovery: "offerbook.yaml > how they found the product"
      transformation: "proof.yaml > before_after > archetype_X > after"
    example: |
      HOOK: "3 years ago, I was exactly where you are now."
      BEFORE: "Burned out from consulting. 60-hour weeks. Income good but life terrible."
      STRUGGLE: "I hit a wall. Health issues. Family tension. I knew something had to change."
      DISCOVERY: "I found a system that replaced 10h/week of work with IA automation
      and gave me a community of people executing alongside me."
      TRANSFORMATION: "Today I work 30 hours. Income is higher. I actually enjoy the work."
      CTA: "Your story can change too. See how. Link below."
    best_platform: "YouTube (long-form), Facebook (video), Instagram Reels (compressed)"
    best_awareness_level: "Unaware (Level 1), Problem Aware (Level 2)"
  format_4_listicle:
    name: "Listicle (Value-First Education)"
    structure: |
      [0-3s] Hook — "X things I learned about [topic]" or "X mistakes [group] makes"
      [3-20s] VALUE — deliver 3-5 genuinely useful insights
              Each insight = 1 sentence problem + 1 sentence solution
      [20-25s] BRIDGE — "If you want the full system behind these insights..."
      [25-30s] CTA — clear next step
    where_to_pull_content:
      insights: "icp.yaml > psychographics > mindset + behavioral_patterns + pains"
      system: "offerbook.yaml > unique_mechanism or deliverables"
    example: |
      HOOK: "3 things I learned after 12 years building businesses with IA."
      INSIGHT 1: "Information is not the bottleneck. You already know enough.
      The bottleneck is a system that turns knowledge into action."
      INSIGHT 2: "Working alone is the most expensive decision you can make.
      A community of executors is the cheapest accountability system that exists."
      INSIGHT 3: "The people winning with IA are not the smartest. They are the ones
      with a system that automates the boring parts."
      BRIDGE: "These 3 insights come from a system built over 12 years and used by 20,000+ people."
      CTA: "See the full system. Link below."
    best_platform: "TikTok, Instagram Reels, Facebook"
    best_awareness_level: "Problem Aware (Level 2), Solution Aware (Level 3)"
  format_5_mechanism_reveal:
    name: "Mechanism Reveal (Why Common Approach Fails + What Works)"
    structure: |
      [0-3s] Hook — "Why [common approach] does not work" or "The real reason [result] is hard"
      [3-10s] DEBUNK — explain why the common approach fails (be specific)
      [10-18s] REVEAL — introduce your mechanism. Name it. Explain the core insight.
      [18-25s] PROOF — one result that validates the mechanism
      [25-30s] CTA — clear next step
    where_to_pull_content:
      common_approach: "objections.yaml > objection_1 assumptions + diagnosis.yaml > competitive landscape"
      mechanism: "offerbook.yaml > unique_mechanism + value-equation.yaml > unique_mechanism_named"
      proof: "proof.yaml > statistics or case_studies"
    example: |
      HOOK: "Courses do not work. And here is why."
      DEBUNK: "Courses sell information. You already have information. 80% consumption,
      20% execution. The problem is not knowledge. It is system."
      REVEAL: "The [Mechanism] is not a course. It is an execution system with IA automation
      and weekly community accountability. You do not learn. You build."
      PROOF: "FILL_THIS of members get positive ROI in 90 days. Average course completion: 15%. Ours: 85%."
      CTA: "See how the system works. Link below."
    best_platform: "YouTube (education format), Facebook, Native Ads"
    best_awareness_level: "Solution Aware (Level 3)"
# ============================================================================
# SECTION 5: CTA OPTIONS
# ============================================================================
# Purpose: 3 tiers of CTAs matched to traffic temperature
# Extract from: copy-swipes.yaml > call_to_action + scarcity-urgency.yaml > copy_templates
cta_options:
  soft_cta:
    use_when: "Cold traffic (Level 1-2 awareness). First touch. Building trust."
    examples:
      - "Learn more about how this works"
      - "Watch the free training"
      - "Get the free guide"
      - "See if this is right for you"
      - "See how it works — free walkthrough on the next page"
    source_reference: "copy-swipes.yaml > call_to_action > soft_cta"
  medium_cta:
    use_when: "Warm traffic (Level 3-4 awareness). They know you. Building conviction."
    examples:
      - "Book your strategy call"
      - "Start your free trial"
      - "Join the waitlist"
      - "Claim your spot"
      - "See what changed for members"
    source_reference: "copy-swipes.yaml > call_to_action > medium_cta"
  hard_cta:
    use_when: "Hot traffic (Level 5 awareness). Retargeting. Cart abandonment. Ready to buy."
    examples:
      - "FILL — Enroll now + [genuine scarcity element from scarcity-urgency.yaml]"
      - "FILL — Buy today + [genuine urgency element from scarcity-urgency.yaml]"
      - "FILL — Join before [real deadline] — [guarantee from guarantee-design.yaml]"
    source_reference: "scarcity-urgency.yaml > copy_templates + guarantee-design.yaml > guarantee_variations > ad_version"
  cta_rules:
    rule_1: "Cold traffic = soft CTA. Do not ask for the sale on first impression."
    rule_2: "Retargeting = hard CTA. They already know you. Remove the last objection and close."
    rule_3: "Every CTA must tell them WHAT TO DO + WHAT HAPPENS NEXT."
    rule_4: "Show and tell: if possible, show the next page (landing page, checkout) in the ad."
    rule_5: "Genuine urgency only. Extract from scarcity-urgency.yaml. Never fabricate."
# ============================================================================
# SECTION 6: PLATFORM SPECS — Quick Reference
# ============================================================================
# Purpose: Character limits, aspect ratios, format rules per platform
# The media buyer checks this BEFORE creating any ad.
platform_specs:
  facebook:
    primary_text:
      above_fold: "125 characters (everything after is hidden behind 'See More')"
