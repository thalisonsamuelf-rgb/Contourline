# ============================================================================
# SECTION 7: RETARGETING SEQUENCE MAP
# ============================================================================
# Extract from: objections.yaml (top 5 objections) + proof.yaml + guarantee-design.yaml
# Purpose: Map each top objection to a retargeting ad.
# Sequence: which ad shows at which stage of retargeting.
retargeting_sequence:
  sequencing_guidance: |
    Day 1-3 after visit: Social proof ad (build trust)
    Day 3-7: Objection crusher ad (remove #1 barrier)
    Day 7-10: Mechanism explainer ad (show how it works)
    Day 10-14: Urgency ad (deadline or scarcity)
    Day 14+: Guarantee ad (final risk reversal push)

    BUDGET RULE: 10% of total ad budget goes to retargeting.
    Retargeting CPA is typically 30-50% of cold traffic CPA.
    Frequency cap: 1 impression per person per day per ad.
  ad_slot_1:
    name: "Social Proof Ad"
    shows_at: "Day 1-3 after page visit or video view 50%+"
    objective: "Build trust through proof. They saw you. Now prove you are real."
    objection_addressed: "FILL — Extract from: objections.yaml > objection_8 ('Does this really work?')"
    ad_angle: "Proof"
    hook: "FILL — Build from: proof.yaml > social_proof or statistics"
    proof_point: "FILL — Extract from: proof.yaml > the_social_proof_stack"
    cta: "FILL — Soft CTA: 'See what our members are building'"
    source_reference: "proof.yaml > social_proof, testimonials.yaml"
  ad_slot_2:
    name: "Objection Crusher Ad"
    shows_at: "Day 3-7 after page visit"
    objective: "Address the #1 reason they did not convert."
    objection_addressed: "FILL — Extract from: objections.yaml > objection_1 (most frequent)"
    ad_angle: "Objection-Killer"
    hook: "FILL — Flip objection_1 into a hook. e.g., 'Already bought courses that failed? Good. This is not a course.'"
    proof_point: "FILL — Extract from: objections.yaml > objection_1 > proof_point"
    cta: "FILL — Medium CTA: 'See how we are different'"
    source_reference: "objections.yaml > objection_1"
  ad_slot_3:
    name: "Mechanism Explainer Ad"
    shows_at: "Day 7-10 after page visit"
    objective: "Show HOW it works. Reduce perceived effort and complexity."
    objection_addressed: "FILL — Extract from: objections.yaml > objection_4 or objection_5 ('Too complex / not for me')"
    ad_angle: "Mechanism"
    hook: "FILL — Build from: value-equation.yaml > unique_mechanism"
    proof_point: "FILL — Extract from: proof.yaml > case_study matching their archetype"
    cta: "FILL — Medium CTA: 'See the full system walkthrough'"
    source_reference: "value-equation.yaml, offerbook.yaml > unique_mechanism"
  ad_slot_4:
    name: "Urgency Ad"
    shows_at: "Day 10-14 after page visit (or during cart-close window)"
    objective: "Compress decision timeline with genuine urgency."
    objection_addressed: "FILL — Extract from: objections.yaml > objection_10 ('I will wait for later')"
    ad_angle: "Urgency + Consequence"
    hook: "FILL — Build from: scarcity-urgency.yaml > urgency_types > consequence_based"
    proof_point: "FILL — Cost of delay calculation from: scarcity-urgency.yaml or value-equation.yaml"
    cta: "FILL — Hard CTA: 'Enrollment closes [date]. Lock in your spot.'"
    source_reference: "scarcity-urgency.yaml > copy_templates"
  ad_slot_5:
    name: "Guarantee Ad (Final Push)"
    shows_at: "Day 14+ or for cart abandoners"
    objective: "Remove the last barrier: risk. Show the guarantee is real."
    objection_addressed: "FILL — Extract from: objections.yaml > objection_2 ('Too expensive / risky')"
    ad_angle: "Risk Reversal"
    hook: "FILL — Build from: guarantee-design.yaml > guarantee_language > headline"
    proof_point: "FILL — Extract from: guarantee-design.yaml > guarantee_as_proof"
    cta: "FILL — Hard CTA: 'Try for [X] days. Full refund if [condition]. Zero risk.'"
    source_reference: "guarantee-design.yaml > guarantee_variations > ad_version"
