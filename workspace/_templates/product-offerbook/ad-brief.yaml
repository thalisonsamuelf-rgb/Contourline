  - "[ ] 3 CTA tiers filled — soft, medium, hard"
  - "[ ] Platform specs reviewed for target platforms"
  - "[ ] 5 retargeting ads mapped to top objections"
  - "[ ] 3 transformation scripts drafted (one per archetype)"
  - "[ ] Proof arsenal extracted — 10 stat hooks, screenshot list, video script"
  - "[ ] Testing plan defined — hierarchy, budget, kill/scale criteria"
  - "[ ] Creative brief summary filled — printable one-page reference"
  - "[ ] Optimization cadence reviewed — daily, weekly, monthly tasks clear"
