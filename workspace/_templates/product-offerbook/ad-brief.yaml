  objection_response: "FILL — Extract from: objections.yaml > objection_1 > response (condensed to 1 sentence)"
  winning_hook_format: "FILL — After testing, record the hook format that performs best"
  winning_meat_format: "FILL — After testing, record the meat format that converts best"
  winning_platform: "FILL — After testing, record the platform with lowest CPA"
# ============================================================================
# SECTION 12: DAILY / WEEKLY / MONTHLY OPTIMIZATION CADENCE
# ============================================================================
# Purpose: What to check and when. Keeps ads from dying silently.
optimization_cadence:
  daily_5_minutes:
    - "CPA yesterday vs today (trending up or down?)"
    - "Frequency < 5 across all ad sets"
    - "Comments responded to (engagement = lower CPM)"
    - "Budget utilization > 90% (underspending = algorithm starving)"
    - "Any ad with CTR < 0.5% flagged for kill"
  weekly:
    - "Kill ads with CPA > 150% of target"
    - "Duplicate budget of winners (20% increase)"
    - "Test 3 new hooks (from hook_bank or new variations)"
    - "Create lookalike of recent buyers"
    - "Add retargeting layer if not active"
    - "Review retargeting sequence performance"
  monthly:
    - "Review all ads — identify top 10% and bottom 10%"
    - "Identify patterns in winners (hooks, formats, angles, audiences)"
    - "Kill bottom 10% permanently — do not revive"
    - "Document learnings in personal swipe file"
    - "Calculate ROI by hook category (Question vs Statement vs Label etc.)"
    - "Adjust 70-20-10 distribution based on what data teaches"
    - "Refresh creative for any ad with frequency > 10"
    - "Update this ad-brief if source files have changed"
