completion_checklist:
  - "[ ] Source map reviewed — know where to find each section's data"
  - "[ ] Ad targeting summary filled — avatar, pains, fears, desires, demographics"
  - "[ ] 10+ ad angles mapped with type, source, awareness level, and platform"
