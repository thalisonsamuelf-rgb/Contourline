# ============================================================================
# Extract from: proof.yaml + testimonials.yaml
# Purpose: Proof formatted and ready to use as ad hooks, headlines, and creative elements
proof_arsenal:
  stat_based_proof_hooks:
    # Format: "[Number] [metric] in [timeframe]" — ready to use as headline or first line
    stat_hook_1: "FILL — Extract from: proof.yaml > statistics > retention > statistic_1"
    stat_hook_2: "FILL — Extract from: proof.yaml > statistics > results > statistic_1"
    stat_hook_3: "FILL — Extract from: proof.yaml > social_proof > total_members"
    stat_hook_4: "FILL — Extract from: proof.yaml > statistics > speed_of_results > day_30"
    stat_hook_5: "FILL — Extract from: proof.yaml > statistics > speed_of_results > day_90"
    stat_hook_6: "FILL — Extract from: proof.yaml > founder_proof > financial_proof"
    stat_hook_7: "FILL — Extract from: proof.yaml > member_diversity_proof > geographic"
    stat_hook_8: "FILL — Extract from: proof.yaml > the_social_proof_stack > proof_3_satisfaction"
    stat_hook_9: "FILL — Extract from: proof.yaml > guarantee_as_proof > guarantee"
    stat_hook_10: "FILL — Extract from: proof.yaml > founder_credibility_proof > proof_2"
  screenshot_ready_proof:
    # What to screenshot for ad creative (faceless ad format)
    screenshot_1: "FILL — Screenshots of member results (DMs, comments, metrics)"
    screenshot_2: "FILL — Screenshots of community engagement"
    screenshot_3: "FILL — Screenshots of before/after income or metrics"
    screenshot_4: "FILL — Screenshots of member milestone celebrations"
    screenshot_5: "FILL — Screenshot of guarantee page or refund policy"
    source_reference: "proof.yaml > missing_proof_to_gather (prioritize collecting these)"
  video_testimonial_ad_script:
    # Derived from: testimonials.yaml > video_testimonial_format
    duration: "60-90 seconds"
    structure: |
      [0-5s] Who are you? (name, role, business)
      [5-15s] What was your situation BEFORE? (specific pain, numbers)
      [15-25s] What almost stopped you from joining? (real objection)
      [25-35s] What was the moment you realized this was different? (aha moment)
      [35-50s] What changed? (specific numbers + timeline + emotional state)
      [50-60s] Who should do this? (specific recommendation, not generic)
    source_reference: "testimonials.yaml > video_testimonial_format > structure"
    filming_tips: |
      Natural lighting. Look at camera. Speak normally.
      Audio matters more than video quality.
      One take is fine if it is natural.
# ============================================================================
# SECTION 10: TESTING PLAN
# ============================================================================
# Purpose: What to test, in what order, with what budget, and when to kill/scale
# Based on the GOATed Ads testing hierarchy
testing_plan:
  testing_hierarchy: |
    Test in this order (highest impact first):
    1. HOOKS (80% of ad performance) — test 10+ hooks against same meat + CTA
    2. MEAT FORMAT (15% of impact) — test 3-5 meats with winning hook
    3. CTA (5% of impact) — test 1-3 CTAs with winning hook + meat
    4. AUDIENCE (after creative is optimized) — same ad, different segments
    5. PLATFORM (after audience is optimized) — same ad, different platforms
  what_to_test_first: "HOOKS. Always hooks. 80% of ad performance is the first 3 seconds."
  budget_allocation:
    testing_budget_per_variation: "FILL — Minimum: 10x your expected CPA per variation"
    daily_budget_per_ad_set: "FILL — Minimum $50/day per ad set"
    testing_phase_total: "FILL — Budget for initial testing phase (typically 2-4 weeks)"
    split: |
      70% = Proven campaigns (winners from previous tests)
      20% = New tests (hooks, meats, audiences)
      10% = Retargeting (warmest audiences)
  kill_criteria:
    after_48_hours:
      - "CTR > 1% AND CPA within target = SCALE (increase budget 20% per 48h)"
      - "CTR > 1% BUT CPA too high = OPTIMIZE (check landing page, offer)"
      - "CTR < 1% AND CPA too high = KILL (hook is dead, test new one)"
      - "CTR < 0.5% = KILL IMMEDIATELY (do not waste budget)"
    after_7_days:
      - "ROAS > 3x for 7 days straight = SCALE AGGRESSIVELY"
      - "CPA stable for 500+ conversions = SCALE (proven winner)"
      - "Frequency > 3 after 14 days = REFRESH creative"
      - "CTR declining day over day = Creative fatigue, new hooks needed"
  scale_criteria:
    vertical_scale: |
      Increase budget 20% every 48 hours. NEVER more than 20% at once.
      Monitor CPA for 24h after each increase.
      If CPA spikes > 30%, revert and wait 48h.
    horizontal_scale: |
      Same winning creative, new audiences.
      Duplicate ad set with new targeting.
      Test new platforms with proven creative.
    creative_scale: |
      Take winning hook, create 10 new variations.
      Take winning format, test with new hooks.
      Repurpose winning ad for different platforms.
  minimum_test_requirements:
    hooks_per_ad_set: "3 minimum (10 recommended)"
    impressions_per_variation: "1,000 minimum"
    runtime: "48 hours minimum, 7 days maximum"
    statistical_confidence: "FILL_THIS before declaring a winner"
  documentation: |
    Track for EVERY ad variation:
    - Hook text
    - Hook type (Question/Statement/Label/etc.)
    - Platform
    - Awareness level targeted
    - Daily spend
    - Impressions
    - Clicks
    - CTR (%)
    - Conversions
    - CPA ($)
    - ROAS
    - Date range
    - Winner/Loser status
    Build your personal swipe file from winners. Document losers too — they teach what to avoid.
