# VOICE
# ============================================================================

voice:
  personality:
    warmth: { level: 3, desc: "Profissional — setor medico exige credibilidade, nao calor excessivo" }
    directness: { level: 4, desc: "Direto ao ponto — B2B de alto ticket exige clareza, nao rodeios" }
    formality: { level: 4, desc: "Formal para setor de saude, mas acessivel para profissionais" }
    confidence: { level: 5, desc: "Muito confiante — R$115-120M, maior do mercado exclusivo, Anvisa, RADLA" }
    pragmatism: { level: 5, desc: "ROI-first — 'Se reduzir 30% da folha, ja vale'. Egio compra resultado, nao promessa" }
  # source: call vendas — perfil psicologico do founder espelha a voz da marca

  founder_voice_mirror: >-
    A voz da marca reflete o DNA do fundador: analitica, cetica, ROI-driven.
    Egio nao se empolga com hype — precisa de evidencia. A marca nao promete,
    comprova. Nao fala em "revolucionar" — fala em resultado mensuravel.
    "Se reduzir 30% da folha, ja vale" e o template de comunicacao:
    problema especifico, numero concreto, criterio de sucesso claro.
  # source: call vendas — frases diretas do Egio

  always_use:
    - "certificado"
    # source: call vendas — Anvisa e o eixo regulatorio central
    - "Anvisa"
    - "resultado"
    - "tecnologia"
    - "seguranca"
    - "inovacao"
    - "profissional"
    - "equipamentos medicos"
    - "estetica medica"

  avoid_use:
    - "barato"
    # nao e barato — e investimento de alto ticket com ROI
    - "generico"
    # produtos sao premium e certificados — a marca e exclusiva
    - "alternativa"
    # sao a referencia do mercado, nao uma alternativa
    - "facil"
    # compliance Anvisa nao e facil — e a barreira que protege o profissional
    - "simples"
    # a engenharia por tras dos equipamentos nao e simples

  forbidden_words:
    - "Magico"
    - "Revolucionario"
    - "Game-changer"
    - "Disrupcao"
    - "Sorte"
    # INFERIDO — validar com founder na imersao

  signature_phrases:
    - "Em Casa de Ferreiro, o espeto e de pau"
    # source: call vendas — frase real do Egio, espelha autocritica produtiva
    - "Ate quando isso vai ser uma vantagem?"
    # source: call vendas — pensamento estrategico sobre janela competitiva
    - "Se reduzir 30% da folha, ja vale"
    # source: call vendas — template de ROI-thinking
    - "Acoes individuais do time, mas nada coordenado"
    # source: call vendas — diagnostico do problema central
    - "Parece bom demais para ser verdade"
    # source: call vendas — ceticismo saudavel que vira credibilidade quando confirmado
    - "Faz sentido"
    # source: call vendas — frase de closure do Egio, usada 3x
    - "Acredita que estamos passando pela maior mudanca da nossa era"
    # source: formulario — motivacao original para a imersao
    - "Uma das maiores do mercado exclusivo"
    # source: call vendas — declaracao de posicao de mercado

  real_founder_quotes:
    # Citacoes diretas da call de vendas — usar em conteudo/copy com credibilidade
    on_paradox: "Em Casa de Ferreiro, o espeto e de pau — a gente nao consegue atuar em todas as areas."
    on_coordination: "Sao acoes individuais do time, mas nada coordenado. Chego, olho, vejo o que esta acontecendo, nada."
    on_roi: "Hoje devo ter de folha uns 700, 800 pau por mes. Se a gente reduz em 30%, ja vale a mentoria."
    on_timing: "Ate quando isso vai ser uma vantagem? Nos seis meses vai fazer diferenca pra mim?"
    on_skepticism: "Parece bom demais para ser verdade."
    on_technology: "Porque ele se preocupa com a engenharia disso, com o design disso — voce conta da seguranca."
    on_scale: "A gente tem muitas acoes, verba de orcamento de marketing fazendo anuncio alto, mas usa muito pouco IA."
    on_vision: "A ideia e trazer isso para o meu negocio — criar esses fluxos, entender meu negocio, tornar ele mais digital."
    on_ai_current: "Hoje e uma coisa mais manual. Voce vai la, tem que fazer o video, usa o Eleven Labs para fazer o audio junto."
    on_system_thinking: "Algo mais junto, algo que eu consiga entender a empresa trabalhando ali e as pessoas consigam junto com os agentes trabalhar e aumentar a produtividade."
    # source: call vendas (145 linhas) — citacoes literais do Speaker B (Egio)

