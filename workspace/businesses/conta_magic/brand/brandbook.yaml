positioning:
  primary_audience: "Profissionais de medicina estetica — medicos, dentistas, esteticistas com clinica propria"
  audience_filter: >-
    Nao e para quem busca equipamento barato sem certificacao.
    E para profissionais que exigem qualidade, seguranca regulatoria
    (Anvisa) e resultado consistente para seus pacientes.
    Compradores de alto ticket em B2B.
  # source: icp.yaml + perfil — "profissionais de medicina estetica"
  enemy_core: "Equipamentos sem certificacao Anvisa que colocam profissionais e pacientes em risco regulatorio e clinico"
  # source: brand.yaml — THE_real_enemy
  value_claim: "Equipamentos medicos de alta performance com certificacao Anvisa completa — para o profissional que nao pode errar"
  onlyness: "Uma das maiores empresas exclusivas de equipamentos esteticos no Brasil, liderada por CEO com background de programacao, com resultados validados no 40o RADLA Brasil (maior congresso de dermatologia da America Latina)"
  # source: perfil + credentials.yaml + founder-dna.yaml

  message_hierarchy:
    level_1_why: "Profissionais de medicina estetica merecem equipamentos que nao colocam sua licenca em risco"
    level_2_how: "Tecnologia de ponta com certificacao Anvisa completa, suporte tecnico e resultados comprovados cientificamente"
    level_3_what: "Equipamentos medicos certificados para procedimentos esteticos — seguros, eficazes, de resultado"
  # source: strategic-positioning.yaml — message_hierarchy

  b2b_promise: "Equipamentos certificados Anvisa que entregam resultado clinico consistente, protegem a reputacao do profissional e aumentam a rentabilidade da clinica"
  # INFERIDO — validar com founder

# ============================================================================
# ARCHETYPE MIX
# ============================================================================

archetype_mix:
  rationale: >-
    Creator lidera — empresa com DNA de tecnologia que cria equipamentos inovadores,
    CEO com background de programacao que literalmente programa soluções.
    "Faz sentido entender um pouco mais e ta ligado num ecossistema" (call vendas) —
    Egio pensa em sistemas, nao em produtos isolados. Creator e o instinto natural
    de quem ve tecnologia como construcao.
    Ruler garante o padrao — certificacao Anvisa e a barreira que protege o mercado
    e a reputacao da empresa. "Sou certificado pela Anvisa, entao tem muita normativa"
    (call vendas) — o Ruler mantém o campo regulatorio como vantagem competitiva.
    Sage traz o saber tecnico — CEO que apresentou resultados no 40o RADLA, que
    usa Chat PDF para compliance, que acompanha IA diariamente. O background de
    programacao e o Sage aplicado ao negocio. "A que nivel que a gente esta de uma
    tela mesmo" — pensa na evolucao tecnica, nao no produto.

  creator:
    weight: 40
    role: "Arquetipo primario — inovacao, tecnologia e construcao de sistemas"
    core_desire: "Criar equipamentos e sistemas que transformem a medicina estetica"
    behavioral_evidence:
      - "CEO com background de programacao — raro no setor de equipamentos medicos"
      - "Fundou empresa de tecnologia associada (EUFORIA TECNOLOGIA E PUBLICIDADE)"
      - "Videos e animacoes criados com IA para o Instagram @onlinemag"
      - "Instalou o AIOX pessoalmente e testou antes de decidir — Builder por natureza"
      - "'Hoje e uma coisa mais manual... A gente tem que dar esse proximo passo' (call vendas)"
      - "Pensa em 'sistemas', nao em ferramentas — 'algo mais junto, que eu consiga entender a empresa trabalhando ali'"
    # source: call vendas + perfil + founder-dna.yaml
    when_to_activate:
      - "Lancamento de novos equipamentos"
      - "Conteudo sobre inovacao tecnologica em estetica medica"
      - "Videos e animacoes com IA"
      - "Comunicacao sobre diferenciais tecnicos dos produtos"
    voice_guidelines:
      tone: "Inovador, tecnico, visionario — pensa no que vem a seguir"
      phrases:
        - "Tecnologia de ponta"
        - "Inovacao que transforma"
        - "Proximo nivel da medicina estetica"
        - "Desenvolvido para resultado"

  ruler:
    weight: 35
    role: "Arquetipo secundario — padrao, compliance e lideranca de mercado"
    core_desire: "Ser a referencia inegavel de qualidade e seguranca no mercado de equipamentos esteticos"
    behavioral_evidence:
      - "Certificacao Anvisa como barreira competitiva estrutural — 'tem muita normativa' (call vendas)"
      - "Chat PDF para areas juridicas e normativas (compliance proativo)"
      - "Uma das maiores do mercado EXCLUSIVO — nao e generalista, e dominante no nicho"
      - "R$115-120M de faturamento — escala que confere autoridade de mercado"
      - "Apresentou no 40o RADLA Brasil — validacao cientifica perante a comunidade medica"
      - "'Parece bom demais para ser verdade' — ceticismo do Ruler que exige evidencia antes de se mover"
    # source: call vendas + perfil + credentials.yaml
    when_to_activate:
      - "Comunicacao sobre certificacao Anvisa"
      - "Diferenciacao competitiva vs importadores sem certificacao"
      - "Conteudo regulatorio para profissionais"
      - "Resultados em congressos e validacoes cientificas"
    voice_guidelines:
      tone: "Autoritativo, confiavel, seguro — fala de quem lidera o mercado"
      phrases:
        - "Certificado Anvisa"
        - "Padrao de excelencia"
        - "Uma das maiores do mercado exclusivo"
        - "Validado no 40o RADLA Brasil"
        - "Seguranca comprovada"

  sage:
    weight: 25
    role: "Arquetipo terciario — conhecimento tecnico, educacao e expertise aplicada"
    core_desire: "Compartilhar conhecimento tecnico, educar o mercado e usar dados para tomar decisoes melhores"
    behavioral_evidence:
      - "Background de programacao — CEO que entende tecnologia de dentro para fora"
      - "Assiste lives de 4h + 3h sobre AIOX antes de decidir — consome conhecimento profundo"
      - "Feed Instagram e YouTube 100% IA — acompanha diariamente os lancamentos"
      - "'Ate quando isso vai ser uma vantagem?' — pensamento estrategico de longo prazo"
      - "'Porque ele se preocupa com a engenharia disso, com o design disso' (call vendas) — valorizacao de rigor tecnico"
      - "Aluno antigo da Formacao Lendaria (socio vitalicio) — consumidor de conhecimento de alta qualidade"
    # source: call vendas + perfil + founder-dna.yaml
    when_to_activate:
      - "Conteudo educativo sobre procedimentos esteticos e equipamentos"
      - "Treinamento de profissionais nos produtos"
      - "Demonstracoes tecnicas e validacao cientifica"
      - "Conteudo sobre compliance Anvisa para profissionais"
    voice_guidelines:
      tone: "Didatico, especialista, preciso — educa sem condescendencia"
      phrases:
        - "Entenda como funciona"
        - "A ciencia por tras do resultado"
        - "Validado cientificamente"
        - "Tecnologia desenvolvida para profissionais"

