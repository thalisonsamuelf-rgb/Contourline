founder_narrative:
  headline: |
    O CEO com background de programacao que construiu uma empresa de R$120M/ano
    em equipamentos medicos, apresentou no maior congresso de dermatologia da
    America Latina, e agora quer resolver o paradoxo: a empresa de tecnologia
    que finalmente vai automatizar a si mesma.

  narrative_structure:
    hook:
      opening: |
        Uma empresa de tecnologia que fatura R$120M/ano e tem 120 pessoas.
        O CEO sabe programar. Mas internamente? 'Em casa de ferreiro, o espeto
        e de pau.'
      emotional_hook: "O paradoxo do tecnologo que nao automatiza a propria casa"

    problem_they_saw:
      description: |
        Time usando IA de forma isolada. Cada area com suas ferramentas.
        Nenhuma coordenacao. O potencial de 30% de reducao na folha de
        R$700-800K/mes nao realizado.

    their_insight:
      insight: |
        Nao basta ter ferramentas de IA — precisa de orquestracao. Acoes
        individuais do time nao geram resultado exponencial. O sistema
        precisa ser coordenado.

    their_action:
      action: |
        Assistiu 7h de lives do AIOX (4h + 3h). Instalou o sistema pessoalmente.
        Testou antes de investir. Decidiu levar diretor/head para a imersao.
        Cetico que se convenceu pela evidencia.

    the_result:
      result: FILL_THIS # Resultado pos-imersao

    the_promise:
      promise: |
        Transformar a empresa de tecnologia em empresa de tecnologia COM
        tecnologia. IA coordenada. Sistema integrado. O ferreiro que
        finalmente faz o espeto de aco.

