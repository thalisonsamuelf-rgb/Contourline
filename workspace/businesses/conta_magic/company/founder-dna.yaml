    - belief: "Tecnologia precisa de coordenacao, nao de acoes isoladas"
      why_believes_this: "Time ja usa IA mas cada um por conta — sem coordenacao, sem resultado exponencial"
      how_it_shapes_business: "Busca sistema integrado de IA, nao ferramentas avulsas"

    - belief: "Em casa de ferreiro, o espeto nao pode ser de pau"
      why_believes_this: "Como CEO de empresa de tecnologia, sente vergonha de nao automatizar internamente"
      how_it_shapes_business: "Motivacao principal para investir em IA coordenada"

  worldview: |
    Pragmatico-tecnologico. Se funciona na pratica, implementa. Cetico saudavel
    ('parece bom demais para ser verdade') mas aberto quando ve evidencia.
    Pensa em ROI antes de investir. Acredita que a maior mudanca da nossa era
    esta acontecendo agora e quem nao se posicionar vai ficar para tras.

  contrarian_view: |
    Enquanto outros CEOs de equipamentos medicos focam apenas em vendas e regulatorio,
