<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contourline | Portal de Transformacao Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('ctl_theme')||'light')</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* THEME: LIGHT (default) */
:root, [data-theme="light"]{
  --dark:#f8f9fa;
  --mid:#1e2a3a;
  --surface:#ffffff;
  --surface2:#f3f4f6;
  --border:#e5e7eb;
  --border2:#d1d5db;
  --text:#1a1a2e;
  --text2:#4b5563;
  --text3:#9ca3af;
  --accent:#3b82f6;
  --accent2:#2563eb;
  --accent-glow:rgba(59,130,246,0.08);
  --green:#10b981;
  --green-bg:rgba(16,185,129,0.08);
  --red:#ef4444;
  --red-bg:rgba(239,68,68,0.08);
  --amber:#f59e0b;
  --amber-bg:rgba(245,158,11,0.08);
  --blue:#3b82f6;
  --blue-bg:rgba(59,130,246,0.08);
  --purple:#a855f7;
  --purple-bg:rgba(168,85,247,0.08);
  --cyan:#06b6d4;
  --cyan-bg:rgba(6,182,212,0.08);
  --radius:14px;--sidebar-w:300px;
  /* light-specific tokens */
  --login-bg:#f0f2f5;
  --login-card-shadow:0 4px 24px rgba(0,0,0,0.08);
  --card-shadow:0 1px 3px rgba(0,0,0,0.06);
  --table-header-bg:#f9fafb;
  --input-bg:#ffffff;
  --input-border:#d1d5db;
  --topbar-bg:#ffffff;
  --topbar-border:#e5e7eb;
  --cb-unchecked-border:#d1d5db;
  --cb-unchecked-bg:#ffffff;
  --progress-track:#e5e7eb;
  --scrollbar-thumb:#c4c8cc;
  --scrollbar-track:#f1f1f1;
}

/* THEME: DARK */
[data-theme="dark"]{
  --dark:#0a0a1a;
  --mid:#111128;
  --surface:#171730;
  --surface2:#1e1e3a;
  --border:#2a2a4a;
  --border2:#3a3a5a;
  --text:#e8e8f0;
  --text2:#a0a0b8;
  --text3:#707088;
  --accent:#6366f1;
  --accent2:#818cf8;
  --accent-glow:rgba(99,102,241,0.15);
  --green:#10b981;
  --green-bg:rgba(16,185,129,0.12);
  --red:#ef4444;
  --red-bg:rgba(239,68,68,0.12);
  --amber:#f59e0b;
  --amber-bg:rgba(245,158,11,0.12);
  --blue:#3b82f6;
  --blue-bg:rgba(59,130,246,0.12);
  --purple:#a855f7;
  --purple-bg:rgba(168,85,247,0.12);
  --cyan:#06b6d4;
  --cyan-bg:rgba(6,182,212,0.12);
  /* dark-specific tokens */
  --login-bg:#0a0a1a;
  --login-card-shadow:none;
  --card-shadow:none;
  --table-header-bg:transparent;
  --input-bg:var(--mid);
  --input-border:var(--border);
  --topbar-bg:var(--mid);
  --topbar-border:var(--border);
  --cb-unchecked-border:var(--border2);
  --cb-unchecked-bg:transparent;
  --progress-track:var(--mid);
  --scrollbar-thumb:#3a3a5a;
  --scrollbar-track:#111128;
}

/* SMOOTH TRANSITIONS */
body,.sidebar,.topbar,.kpi-card,.section-block,.story-card,.task-card,.ac-item,.task-item,.notes-section,.login-screen,.login-box,.filter-chip,.nav-item,.topbar-btn,.badge{
  transition:background-color 0.3s,color 0.3s,border-color 0.3s,box-shadow 0.3s;
}

/* SCROLLBAR THEMING */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{opacity:.8}

/* SIDEBAR: always dark in both themes */
[data-theme="light"] .sidebar{background:#1e2a3a;border-right-color:#2a3a4e}
[data-theme="light"] .sidebar-header{background:linear-gradient(135deg,#162233,#1e2a3a);border-bottom-color:#2a3a4e}
[data-theme="light"] .sidebar-search{border-bottom-color:#2a3a4e}
[data-theme="light"] .sidebar-search input{background:#263548;border-color:#2a3a4e;color:#e8e8f0}
[data-theme="light"] .sidebar-search input::placeholder{color:#708090}
[data-theme="light"] .sidebar-filters{border-bottom-color:#2a3a4e}
[data-theme="light"] .filter-chip{background:#263548;border-color:#2a3a4e;color:#a0b0c0}
[data-theme="light"] .filter-chip:hover,[data-theme="light"] .filter-chip.active{background:rgba(59,130,246,0.15);border-color:#3b82f6;color:#93c5fd}
[data-theme="light"] .nav-section{color:#708090}
[data-theme="light"] .nav-item{color:#c0d0e0}
[data-theme="light"] .nav-item:hover{background:rgba(59,130,246,.08)}
[data-theme="light"] .nav-item.active{background:rgba(59,130,246,.15);color:#fff}
[data-theme="light"] .nav-item .nav-count{color:#708090}
[data-theme="light"] .nav-story{color:#a0b0c0}
[data-theme="light"] .nav-story:hover{background:rgba(59,130,246,.06);color:#fff}
[data-theme="light"] .nav-story.active{background:rgba(59,130,246,.15);color:#fff}
[data-theme="light"] .sidebar-brand{color:#fff}
[data-theme="light"] .sidebar-sub{color:#93c5fd}
[data-theme="light"] .sidebar-link{color:#708090}
[data-theme="light"] .sidebar-link:hover{color:#93c5fd}

/* THEME TOGGLE BUTTON */
#themeToggleBtn{font-size:1.1em !important;min-width:34px;text-align:center}

body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;display:flex;min-height:100vh}
a{color:var(--accent2);text-decoration:none}a:hover{text-decoration:underline}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--mid);border-right:1px solid var(--border);position:fixed;top:0;left:0;overflow-y:auto;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0d0d24,#1a1a4a)}
.sidebar-brand{font-size:1.1em;font-weight:900;color:#fff;letter-spacing:-0.5px}
.sidebar-sub{font-size:.68em;color:var(--accent2);font-weight:600;margin-top:2px}
.sidebar-link{display:block;padding:4px 20px;font-size:.72em;color:var(--text3);font-weight:500;margin-top:8px;transition:color .2s}
.sidebar-link:hover{color:var(--accent2);text-decoration:none}
.sidebar-search{padding:12px 16px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.8em;font-family:inherit;outline:none;transition:border .2s}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text3)}
.sidebar-filters{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px}
.filter-chip{background:var(--surface);border:1px solid var(--border);color:var(--text3);padding:3px 8px;border-radius:6px;font-size:.65em;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.filter-chip:hover,.filter-chip.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent2)}
.sidebar-nav{padding:8px 0}
.nav-section{padding:8px 16px 4px;font-size:.6em;text-transform:uppercase;letter-spacing:2px;color:var(--text3);font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:.78em}
.nav-item:hover{background:rgba(99,102,241,.06);border-left-color:var(--accent)}
.nav-item.active{background:var(--accent-glow);border-left-color:var(--accent);color:#fff;font-weight:600}
.nav-item .nav-badge{margin-left:auto;padding:1px 6px;border-radius:4px;font-size:.8em;font-weight:700}
.nav-item .badge-p1{background:var(--red-bg);color:var(--red)}
.nav-item .badge-p2{background:var(--amber-bg);color:var(--amber)}
.nav-item .badge-p3{background:var(--green-bg);color:var(--green)}
.nav-item .badge-p4{background:var(--blue-bg);color:var(--blue)}
.nav-item .nav-count{margin-left:auto;color:var(--text3);font-size:.85em}
.nav-story{padding:5px 16px 5px 36px;cursor:pointer;font-size:.72em;color:var(--text2);transition:all .15s;border-left:3px solid transparent;display:none}
.nav-story:hover{background:rgba(99,102,241,.04);color:#fff}
.nav-story.active{background:var(--accent-glow);border-left-color:var(--accent2);color:#fff;font-weight:600}
.nav-story .sz{padding:1px 5px;border-radius:3px;font-size:.85em;font-weight:700;margin-left:4px}
.nav-story .sz-s{background:var(--green-bg);color:var(--green)}
.nav-story .sz-m{background:var(--blue-bg);color:var(--blue)}
.nav-story .sz-l{background:var(--amber-bg);color:var(--amber)}
.stories-visible .nav-story{display:block}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
.topbar{background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);padding:12px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:.85em;font-weight:700;color:var(--text);flex:1}
.topbar-back{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:.72em;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.topbar-back:hover{border-color:var(--accent);color:var(--accent2)}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.4em;cursor:pointer;padding:4px 8px}
.content{padding:32px}

/* HOME */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;transition:all .3s;cursor:pointer;box-shadow:var(--card-shadow)}
.kpi-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(99,102,241,0.15)}
.kpi-card .kval{font-size:2em;font-weight:900;letter-spacing:-1px;color:var(--text)}
.kpi-card .kval.accent{color:var(--accent2)}
.kpi-card .kval.green{color:var(--green)}
.kpi-card .kval.amber{color:var(--amber)}
.kpi-card .klabel{font-size:.62em;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:600;margin-top:4px}
.progress-section{margin-bottom:28px}
.progress-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(42,42,74,.4)}
.progress-row:last-child{border:none}
.progress-row .plabel{width:280px;font-size:.78em;font-weight:600;color:var(--text);flex-shrink:0}
.progress-row .pbar{flex:1;height:8px;background:var(--progress-track);border-radius:4px;overflow:hidden}
.progress-row .pfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s}
.progress-row .pval{width:40px;text-align:right;font-size:.72em;font-weight:700;color:var(--text2)}

/* EPIC / STORY DETAIL */
.detail-header{margin-bottom:28px}
.detail-header h1{font-size:1.6em;font-weight:900;color:var(--text);letter-spacing:-0.5px;margin-bottom:8px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.badge{padding:3px 10px;border-radius:6px;font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.badge-p1{background:var(--red-bg);color:var(--red)}.badge-p2{background:var(--amber-bg);color:var(--amber)}
.badge-p3{background:var(--green-bg);color:var(--green)}.badge-p4{background:var(--blue-bg);color:var(--blue)}
.badge-draft{background:rgba(112,112,136,.15);color:var(--text3)}
.badge-agent{background:var(--purple-bg);color:var(--purple)}
.badge-size{padding:2px 8px;border-radius:4px;font-size:.72em;font-weight:700}
.badge-s{background:var(--green-bg);color:var(--green)}.badge-m{background:var(--blue-bg);color:var(--blue)}
.badge-l{background:var(--amber-bg);color:var(--amber)}
.detail-meta{font-size:.78em;color:var(--text2);display:flex;gap:20px;flex-wrap:wrap}
.detail-meta span{display:flex;align-items:center;gap:4px}
.section-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--card-shadow)}
.section-block h2{font-size:.8em;text-transform:uppercase;letter-spacing:2px;font-weight:800;color:var(--accent2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-block h2::before{content:'';width:24px;height:3px;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;flex-shrink:0}
.section-block p,.section-block li{font-size:.85em;color:var(--text2);line-height:1.7}
.section-block ul,.section-block ol{padding-left:20px}
.section-block li{margin-bottom:4px}
.section-block table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.82em}
.section-block th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--text3);font-weight:700;text-transform:uppercase;font-size:.75em;letter-spacing:1px;background:var(--table-header-bg)}
.section-block td{padding:7px 10px;border-bottom:1px solid rgba(42,42,74,.4);color:var(--text2)}
.section-block tr:hover td{background:rgba(99,102,241,.03)}

/* CHECKBOXES */
.ac-item,.task-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:.82em;color:var(--text2)}
.ac-item .cb,.task-item .cb{width:16px;height:16px;border:2px solid var(--cb-unchecked-border);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:.65em;color:transparent;background:var(--cb-unchecked-bg)}
.ac-item .cb.checked,.task-item .cb.checked{background:var(--green);border-color:var(--green);color:#fff}
.ac-item .cb.checked::after,.task-item .cb.checked::after{content:'OK';font-weight:900}
.ac-item .cb,.task-item .cb{cursor:pointer;transition:all .2s}
.ac-item .cb:hover,.task-item .cb:hover{border-color:var(--accent);transform:scale(1.1)}
.ev-upload-area{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.ev-upload-area:hover{border-color:var(--accent);background:var(--accent-glow)}
.ev-upload-area .ev-icon{font-size:1.5em;margin-bottom:4px}
.ev-upload-area .ev-text{font-size:.72em;color:var(--text3)}
.ev-upload-area .ev-formats{font-size:.6em;color:var(--text3);margin-top:4px}
.ev-file-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ev-file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:.72em}
.ev-file-item a{color:var(--accent2);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-file-item .ev-type{padding:2px 6px;border-radius:4px;font-size:.8em;font-weight:700;text-transform:uppercase}
.ev-file-item .ev-type-img{background:var(--green-bg);color:var(--green)}
.ev-file-item .ev-type-pdf{background:var(--red-bg);color:var(--red)}
.ev-file-item .ev-type-doc{background:var(--blue-bg);color:var(--blue)}
.ev-file-item .ev-type-other{background:var(--amber-bg);color:var(--amber)}
.ev-file-item .ev-delete{background:none;border:none;color:var(--red);cursor:pointer;font-size:1.1em;padding:2px 4px;opacity:.6;transition:opacity .2s}
.ev-file-item .ev-delete:hover{opacity:1}
.ev-uploading{font-size:.7em;color:var(--cyan);margin-top:4px;display:none}
.ev-uploading.show{display:block}
.notes-section{margin-top:16px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.notes-section h3{font-size:.85em;color:var(--accent2);margin-bottom:8px;font-weight:700}
.notes-textarea{width:100%;min-height:120px;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:12px;border-radius:8px;font-size:.82em;font-family:inherit;outline:none;resize:vertical;line-height:1.6;transition:border .2s}
.notes-textarea:focus{border-color:var(--accent)}
.notes-textarea::placeholder{color:var(--text3)}
.notes-save{margin-top:8px;padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.75em;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.notes-save:hover{background:var(--accent2)}
.notes-saved{display:inline-block;margin-left:8px;font-size:.72em;color:var(--green);font-weight:600;opacity:0;transition:opacity .3s}
.notes-saved.show{opacity:1}

/* STORIES LIST IN EPIC */
.stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-top:12px}
.story-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .3s;box-shadow:var(--card-shadow)}
.story-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.story-card .sc-title{font-size:.85em;font-weight:700;color:var(--text);margin-bottom:6px}
.story-card .sc-meta{display:flex;gap:6px;flex-wrap:wrap}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .stories-grid{grid-template-columns:1fr}
  .progress-row .plabel{width:160px;font-size:.7em}
  .detail-header h1{font-size:1.2em}
}
@media(max-width:500px){
  .kpi-grid{grid-template-columns:1fr}
  .content{padding:16px}
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.overlay.show{display:block}

/* LOGIN SCREEN */
.login-screen{position:fixed;inset:0;background:var(--login-bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-screen.hidden{display:none}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:360px;max-width:90vw;text-align:center;box-shadow:var(--login-card-shadow)}
.login-box h1{font-size:1.4em;font-weight:900;color:var(--text);margin-bottom:4px}
.login-box .login-sub{font-size:.75em;color:var(--accent2);font-weight:600;margin-bottom:28px}
.login-box label{display:block;text-align:left;font-size:.72em;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.login-box select,.login-box input[type="password"]{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:.85em;font-family:inherit;outline:none;margin-bottom:16px;transition:border .2s}
.login-box select:focus,.login-box input[type="password"]:focus{border-color:var(--accent)}
.login-box select option{background:var(--surface);color:var(--text)}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.85em;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.login-btn:hover{background:var(--accent2)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{color:var(--red);font-size:.75em;font-weight:600;margin-top:8px;min-height:20px}

/* LOGOUT & ADMIN BUTTONS */
.topbar-user{display:flex;align-items:center;gap:8px}
.topbar-user .user-name{font-size:.72em;color:var(--text2);font-weight:600}
.topbar-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:.72em;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent2)}
.topbar-btn.admin-btn{border-color:var(--purple);color:var(--purple)}
.topbar-btn.admin-btn:hover{background:var(--purple-bg)}

/* ADMIN PANEL */
.admin-panel{margin-bottom:28px}
.admin-user-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.admin-user-section h3{font-size:.82em;font-weight:700;color:var(--accent2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.admin-user-section .user-color{width:10px;height:10px;border-radius:50%;display:inline-block}
.admin-note-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.admin-note-item .note-author{font-size:.72em;font-weight:700;color:var(--accent2);margin-bottom:4px}
.admin-note-item .note-date{font-size:.65em;color:var(--text3);margin-left:8px}
.admin-note-item .note-content{font-size:.82em;color:var(--text2);line-height:1.6;white-space:pre-wrap}

// ========================================================
// THEME: Light / Dark toggle
// ========================================================
(function initTheme(){
  const saved = localStorage.getItem('ctl_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon(saved);
})();
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ctl_theme', next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme){
  const btn = document.getElementById('themeToggleBtn');
  if(!btn) return;
  // Sun = light active, Moon = dark active
  btn.textContent = theme === 'dark' ? '\u263D' : '\u2600';
  btn.title = theme === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro';
}

async function supaFetch(table, method, params) {
  const url = SUPABASE_URL + '/rest/v1/' + table + (params?.query || '');
  const res = await fetch(url, {
    method: method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': params?.prefer || 'return=representation'
    },
    body: params?.body ? JSON.stringify(params.body) : undefined
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadLoginUsers() {
  try {
    allUsers = await supaFetch('portal_users', 'GET', { query: '?select=id,name,is_admin&order=name' });
    const sel = document.getElementById('loginUser');
    sel.innerHTML = '<option value="">Selecione seu nome...</option>' +
      allUsers.map(u => '<option value="' + u.id + '">' + u.name + '</option>').join('');
  } catch(e) {
    document.getElementById('loginError').textContent = 'Erro ao carregar usuarios. Verifique sua conexao.';
  }
}

async function doLogin() {
  const sel = document.getElementById('loginUser');
  const pin = document.getElementById('loginPin').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!sel.value) { errEl.textContent = 'Selecione um usuario.'; return; }
  if (!pin) { errEl.textContent = 'Digite seu PIN.'; return; }
  document.getElementById('loginBtn').disabled = true;
  try {
    const res = await supaFetch('portal_users', 'GET', {
      query: '?id=eq.' + sel.value + '&pin=eq.' + pin + '&select=id,name,is_admin'
    });
    if (!res || res.length === 0) {
      errEl.textContent = 'PIN incorreto. Tente novamente.';
      document.getElementById('loginBtn').disabled = false;
      return;
    }
    const user = res[0];
    currentUserId = user.id;
    currentUserName = user.name;
    currentUserAdmin = user.is_admin;
    sessionStorage.setItem('ctl_user_id', user.id);
    sessionStorage.setItem('ctl_user_name', user.name);
    sessionStorage.setItem('ctl_user_admin', user.is_admin ? 'true' : 'false');
    enterPortal();
  } catch(e) {
    errEl.textContent = 'Erro de conexao. Tente novamente.';
    document.getElementById('loginBtn').disabled = false;
  }
}

function doLogout() {
  sessionStorage.removeItem('ctl_user_id');
  sessionStorage.removeItem('ctl_user_name');
  sessionStorage.removeItem('ctl_user_admin');
  currentUserId = null;
  currentUserName = '';
  currentUserAdmin = false;
  checksCache = {}; checksCacheLoaded = {};
  allChecksCache = {}; allChecksCacheLoaded = {};
  notesCache = {}; notesCacheLoaded = {};
  allNotesCache = {}; allNotesCacheLoaded = {};
  tasksCache = {}; tasksCacheLoaded = {}; expandedTasks = {};
  viewMode = 'mine';
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginPin').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginBtn').disabled = false;
}

function enterPortal() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('topbarUserName').textContent = currentUserName;
  document.getElementById('adminBtn').style.display = currentUserAdmin ? 'inline-block' : 'none';
  showHome();
}

async function loadChecksForStory(storyId) {
  if (checksCacheLoaded[storyId]) return;
  try {
    const data = await supaFetch('portal_checks', 'GET', {
      query: '?user_id=eq.' + currentUserId + '&story_id=eq.' + storyId + '&select=check_type,check_index,checked'
    });
    data.forEach(r => {
      checksCache[currentUserId + '_' + storyId + '_' + r.check_type + '_' + r.check_index] = r.checked;
    });
    checksCacheLoaded[storyId] = true;
  } catch(e) { console.error('loadChecks error:', e); }
}

async function loadAllChecksForStory(storyId) {
  if (allChecksCacheLoaded[storyId]) return;
  try {
    const data = await supaFetch('portal_checks', 'GET', {
      query: '?story_id=eq.' + storyId + '&select=user_id,check_type,check_index,checked'
    });
    data.forEach(r => {
      allChecksCache[r.user_id + '_' + storyId + '_' + r.check_type + '_' + r.check_index] = r.checked;
    });
    allChecksCacheLoaded[storyId] = true;
  } catch(e) { console.error('loadAllChecks error:', e); }
}

function getCheckState(storyId, type, index) {
  const key = currentUserId + '_' + storyId + '_' + type + '_' + index;
  if (key in checksCache) return checksCache[key];
  // fallback to inline data
  const s = STORIES.find(x => x.id === storyId);
  if (!s) return false;
  const arr = type === 'ac' ? s.ac : s.tasks;
  return arr[index] ? arr[index].c : false;
}

async function setCheckState(storyId, type, index, val) {
  const key = currentUserId + '_' + storyId + '_' + type + '_' + index;
  checksCache[key] = val;
  // Also update allChecksCache so admin view stays consistent
  allChecksCache[key] = val;
  try {
    await supaFetch('portal_checks', 'POST', {
      prefer: 'return=representation,resolution=merge-duplicates',
      body: {
        user_id: currentUserId,
        story_id: storyId,
        check_type: type,
        check_index: index,
        checked: val,
        updated_at: new Date().toISOString()
      }
    });
  } catch(e) { console.error('setCheck error:', e); }
}

async function toggleCheck(storyId, type, index) {
  const current = getCheckState(storyId, type, index);
  await setCheckState(storyId, type, index, !current);
  showStory(storyId);
}

function renderCheckbox(checked, storyId, type, index) {
  const isChecked = getCheckState(storyId, type, index);
  let extra = '';
  // In admin "all" view mode, show who checked
  if (currentUserAdmin && viewMode === 'all') {
    const checkedBy = allUsers.filter(u => {
      const k = u.id + '_' + storyId + '_' + type + '_' + index;
      return allChecksCache[k] === true;
    });
    if (checkedBy.length > 0) {
      extra = checkedBy.map(u =>
        '<span class="check-badge" style="background:' + getUserColor(u.id) + '20;color:' + getUserColor(u.id) + '">' +
        u.name.split(' ')[0] + '</span>'
      ).join('');
    }
  }
  return '<div class="cb' + (isChecked ? ' checked' : '') + '" onclick="event.stopPropagation();toggleCheck(\'' + storyId + '\',\'' + type + '\',' + index + ')"></div>' + extra;
}

    notesCache[storyId] = (data.length > 0) ? data[0].content : '';

  } catch(e) { console.error('loadNotes error:', e); }
}

async function loadAllNotesForStory(storyId) {
  if (allNotesCacheLoaded[storyId]) return;
  try {
    const data = await supaFetch('portal_notes', 'GET', {
      query: '?story_id=eq.' + storyId + '&select=user_id,content,updated_at&order=updated_at.desc'
    });
    allNotesCache[storyId] = data.map(r => ({
      user_id: r.user_id,
      user_name: getUserName(r.user_id),
      content: r.content,
      updated_at: r.updated_at
    }));
    allNotesCacheLoaded[storyId] = true;

async function loadTasksForStory(storyId) {
  if (tasksCacheLoaded[storyId]) return;
  try {
    const data = await supaFetch('portal_tasks', 'GET', {
      query: '?story_id=eq.' + storyId + '&select=task_index,status,assignee,deadline,notes,evidence_url,evidence_files,block_reason,updated_by,updated_at'
    });
    data.forEach(r => {
      tasksCache[storyId + '_' + r.task_index] = {
        status: r.status || 'pending',
        assignee: r.assignee || '',
        deadline: r.deadline || '',
        notes: r.notes || '',
        evidence_url: r.evidence_url || '',
        evidence_files: JSON.stringify(r.evidence_files || []),
        block_reason: r.block_reason || '',
        updated_by: r.updated_by || '',
        updated_at: r.updated_at || ''
      };
    });
    tasksCacheLoaded[storyId] = true;
  } catch(e) { console.error('loadTasks error:', e); }
}

function getTaskData(storyId, taskIndex) {
  const key = storyId + '_' + taskIndex;
  return tasksCache[key] || { status: 'pending', assignee: '', deadline: '', notes: '', evidence_url: '', evidence_files: '[]', block_reason: '', updated_by: '', updated_at: '' };
}

async function saveTaskData(storyId, taskIndex) {
  const prefix = 'tf_' + storyId + '_' + taskIndex + '_';
  const statusEl = document.getElementById(prefix + 'status');
  const assigneeEl = document.getElementById(prefix + 'assignee');
  const deadlineEl = document.getElementById(prefix + 'deadline');
  const notesEl = document.getElementById(prefix + 'notes');
  const blockEl = document.getElementById(prefix + 'block');
  const btn = document.getElementById(prefix + 'btn');
  const msg = document.getElementById(prefix + 'msg');

  if (!statusEl) return;
  const data = {
    status: statusEl.value,
    assignee: assigneeEl.value,
    deadline: deadlineEl.value || null,
    notes: notesEl.value,
    block_reason: blockEl ? blockEl.value : '',
    updated_by: currentUserId,
    updated_at: new Date().toISOString()
  };

  // Update cache
  const key = storyId + '_' + taskIndex;
  tasksCache[key] = { ...data, updated_by: currentUserId, updated_at: data.updated_at };

  if (btn) btn.disabled = true;
  try {
    await supaFetch('portal_tasks', 'POST', {
      prefer: 'return=representation,resolution=merge-duplicates',
      body: {
        story_id: storyId,
        task_index: taskIndex,
        status: data.status,
        assignee: data.assignee,
        deadline: data.deadline,
        notes: data.notes,
        block_reason: data.block_reason,
        updated_by: currentUserId,
        updated_at: data.updated_at
      }
    });
    if (msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2000); }
  } catch(e) {
    console.error('saveTask error:', e);
    if (msg) { msg.textContent = 'Erro!'; msg.style.color = 'var(--red)'; msg.classList.add('show'); setTimeout(() => { msg.classList.remove('show'); msg.textContent = 'Salvo!'; msg.style.color = ''; }, 3000); }
  }
  if (btn) btn.disabled = false;
  // Refresh the story view to update counters and badges
  showStory(storyId);
}

function toggleTaskCard(storyId, taskIndex) {
  const key = storyId + '_' + taskIndex;
  expandedTasks[key] = !expandedTasks[key];
  const card = document.getElementById('tcard_' + storyId + '_' + taskIndex);

function onTaskStatusChange(storyId, taskIndex) {
  const prefix = 'tf_' + storyId + '_' + taskIndex + '_';
  const statusEl = document.getElementById(prefix + 'status');
  const blockWrapper = document.getElementById(prefix + 'block_wrap');
  if (blockWrapper) {
    blockWrapper.style.display = statusEl.value === 'blocked' ? 'flex' : 'none';
  }
}

function isTaskOverdue(taskData) {
  if (taskData.status === 'done' || !taskData.deadline) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(taskData.deadline + 'T00:00:00');
  return dl < today;
}

function getTaskStatusCounts(storyId, tasks) {
  const counts = { pending: 0, in_progress: 0, done: 0, blocked: 0 };
  tasks.forEach((t, i) => {
    const td = getTaskData(storyId, i);
    counts[td.status] = (counts[td.status] || 0) + 1;
  });
  return counts;
}

function renderTaskCard(storyId, task, taskIndex) {
  const td = getTaskData(storyId, taskIndex);
  const isExpanded = expandedTasks[storyId + '_' + taskIndex] || false;
  const overdue = isTaskOverdue(td);
  const prefix = 'tf_' + storyId + '_' + taskIndex + '_';

  let html = '<div id="tcard_' + storyId + '_' + taskIndex + '" class="task-card status-' + td.status + (isExpanded ? ' expanded' : '') + '">';

  // Header (collapsed view)
  html += '<div class="task-card-header" onclick="toggleTaskCard(\'' + storyId + '\',' + taskIndex + ')">';
  html += '<div class="cb' + (td.status === 'done' ? ' checked' : '') + '" onclick="event.stopPropagation();toggleCheck(\'' + storyId + '\',\'task\',' + taskIndex + ')" style="flex-shrink:0"></div>';
  html += '<span class="task-card-title">' + task.t + '</span>';
  if (td.assignee) html += '<span class="task-badge task-badge-assignee">' + td.assignee.split(' ')[0] + '</span>';
  if (overdue) html += '<span class="task-badge task-badge-overdue">ATRASADA</span>';
  else if (td.deadline) {
    const dlDate = new Date(td.deadline + 'T00:00:00');
    html += '<span class="task-deadline-icon">' + dlDate.toLocaleDateString('pt-BR') + '</span>';
  }
  html += '<span class="task-badge task-badge-' + td.status + '">' + TASK_STATUS_LABELS[td.status] + '</span>';
  html += '<span class="task-expand-arrow">&#9660;</span>';
  html += '</div>';

  // Body (expanded view)
  html += '<div class="task-card-body"><div class="task-card-grid">';

  // Status
  html += '<div class="task-field"><label>Status</label><select id="' + prefix + 'status" onchange="onTaskStatusChange(\'' + storyId + '\',' + taskIndex + ')">';
  TASK_STATUS_OPTIONS.forEach(opt => {
    html += '<option value="' + opt + '"' + (td.status === opt ? ' selected' : '') + '>' + TASK_STATUS_LABELS[opt] + '</option>';
  });
  html += '</select></div>';

  // Assignee
  html += '<div class="task-field"><label>Responsavel</label><select id="' + prefix + 'assignee"><option value="">-- Ninguem --</option>';
  ASSIGNEE_NAMES.forEach(name => {
    html += '<option value="' + name + '"' + (td.assignee === name ? ' selected' : '') + '>' + name + '</option>';
  });
  html += '</select></div>';

  // Deadline
  html += '<div class="task-field"><label>Prazo</label><input type="date" id="' + prefix + 'deadline" value="' + (td.deadline || '') + '"></div>';

  // Evidence Files (upload)
  html += renderEvidenceFiles(storyId, taskIndex, td);

  // Notes (full width)
  html += '<div class="task-field task-field-full"><label>Notas da Task</label><textarea id="' + prefix + 'notes" placeholder="Anotacoes especificas desta task...">' + (td.notes || '').replace(/</g, '&lt;') + '</textarea></div>';

  // Block reason (only visible if blocked)
  html += '<div id="' + prefix + 'block_wrap" class="task-field task-field-full" style="display:' + (td.status === 'blocked' ? 'flex' : 'none') + '"><label>Motivo do Bloqueio</label><textarea id="' + prefix + 'block" placeholder="Descreva o motivo do bloqueio...">' + (td.block_reason || '').replace(/</g, '&lt;') + '</textarea></div>';

  // Save row
  html += '<div class="task-save-row"><button id="' + prefix + 'btn" class="task-save-btn" onclick="event.stopPropagation();saveTaskData(\'' + storyId + '\',' + taskIndex + ')">Salvar</button><span id="' + prefix + 'msg" class="task-saved-msg">Salvo!</span></div>';

  // Updated info
  if (td.updated_at) {
    const updatedByName = td.updated_by ? getUserName(td.updated_by) : 'Desconhecido';
    html += '<div class="task-updated-info">Ultima atualizacao: ' + formatDate(td.updated_at) + ' por ' + updatedByName + '</div>';
  }

  html += '</div></div>'; // close grid and body
  html += '</div>'; // close card
  return html;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

// FILE UPLOAD: Evidências
// ========================================================
function getFileTypeClass(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','avif','svg'].includes(ext)) return 'img';
  if (ext === 'pdf') return 'pdf';
  if (['doc','docx','xls','xlsx','ppt','pptx','txt','csv'].includes(ext)) return 'doc';
  return 'other';
}

function getFileTypeLabel(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','avif','svg'].includes(ext)) return 'IMG';
  if (ext === 'pdf') return 'PDF';
  if (['doc','docx'].includes(ext)) return 'DOC';
  if (['xls','xlsx','csv'].includes(ext)) return 'XLS';
  if (['ppt','pptx'].includes(ext)) return 'PPT';
  return ext.toUpperCase();
}

async function uploadEvidence(storyId, taskIndex) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv';
  input.multiple = true;
  input.onchange = async function() {
    const files = input.files;
    if (!files.length) return;
    const loadingEl = document.getElementById('ev_loading_' + storyId + '_' + taskIndex);
    if (loadingEl) { loadingEl.classList.add('show'); loadingEl.textContent = 'Enviando...'; }
    const key = storyId + '_' + taskIndex;
    const td = tasksCache[key] || {};
    let existingFiles = [];
    try { existingFiles = JSON.parse(td.evidence_files || '[]'); } catch(e) { existingFiles = []; }

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const ts = Date.now();
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = storyId + '/' + taskIndex + '/' + ts + '_' + safeName;
      if (loadingEl) loadingEl.textContent = 'Enviando ' + (i+1) + '/' + files.length + '...';
      try {
        const res = await fetch(SUPABASE_URL + '/storage/v1/object/evidencias/' + path, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': file.type },
          body: file
        });
        if (res.ok) {
          const publicUrl = SUPABASE_URL + '/storage/v1/object/public/evidencias/' + path;
          existingFiles.push({ name: file.name, url: publicUrl, path: path, type: file.type, size: file.size, uploaded_at: new Date().toISOString(), uploaded_by: currentUserName });
        }
      } catch(e) { console.error('Upload error:', e); }
    }

    // Save files list to portal_tasks
    if (!td.status) td.status = 'pending';
    tasksCache[key] = { ...td, evidence_files: JSON.stringify(existingFiles) };
    await supaFetch('portal_tasks', 'POST', {
      prefer: 'return=representation,resolution=merge-duplicates',
      body: { story_id: storyId, task_index: taskIndex, evidence_files: existingFiles, updated_by: currentUserId, updated_at: new Date().toISOString() }
    });
    if (loadingEl) { loadingEl.textContent = 'Enviado!'; setTimeout(() => loadingEl.classList.remove('show'), 2000); }
    showStory(currentStoryId);
  };
  input.click();
}

async function deleteEvidence(storyId, taskIndex, fileIndex) {
  if (!confirm('Remover este arquivo?')) return;
  const key = storyId + '_' + taskIndex;
  const td = tasksCache[key] || {};
  let files = [];
  try { files = JSON.parse(td.evidence_files || '[]'); } catch(e) { files = []; }
  const file = files[fileIndex];
  if (!file) return;

  // Delete from storage
  try {
    await fetch(SUPABASE_URL + '/storage/v1/object/evidencias/' + file.path, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
  } catch(e) { console.error('Delete storage error:', e); }

  // Remove from list and update DB
  files.splice(fileIndex, 1);
  tasksCache[key] = { ...td, evidence_files: JSON.stringify(files) };
  await supaFetch('portal_tasks', 'POST', {
    prefer: 'return=representation,resolution=merge-duplicates',
    body: { story_id: storyId, task_index: taskIndex, evidence_files: files, updated_by: currentUserId, updated_at: new Date().toISOString() }
  });
  showStory(currentStoryId);
}

function renderEvidenceFiles(storyId, taskIndex, td) {
  let files = [];
  try { files = JSON.parse(td.evidence_files || '[]'); } catch(e) { files = []; }
  let html = '<div class="task-field task-field-full"><label>Evidencias / Anexos</label>';
  html += '<div class="ev-upload-area" onclick="event.stopPropagation();uploadEvidence(\'' + storyId + '\',' + taskIndex + ')">';
  html += '<div class="ev-icon">+</div>';
  html += '<div class="ev-text">Clique para anexar arquivo</div>';
  html += '<div class="ev-formats">PDF, DOC, XLS, PPT, imagens (JPG, PNG) e outros</div>';
  html += '</div>';
  html += '<div id="ev_loading_' + storyId + '_' + taskIndex + '" class="ev-uploading">Enviando...</div>';
  if (files.length > 0) {
    html += '<div class="ev-file-list">';
    files.forEach((f, i) => {
      const typeClass = getFileTypeClass(f.name);
      const typeLabel = getFileTypeLabel(f.name);
      html += '<div class="ev-file-item">';
      html += '<span class="ev-type ev-type-' + typeClass + '">' + typeLabel + '</span>';
      html += '<a href="' + f.url + '" target="_blank" title="' + f.name + '">' + f.name + '</a>';
      if (f.uploaded_by) html += '<span style="font-size:.85em;color:var(--text3)">' + f.uploaded_by + '</span>';
      html += '<button class="ev-delete" onclick="event.stopPropagation();deleteEvidence(\'' + storyId + '\',' + taskIndex + ',' + i + ')" title="Remover">x</button>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function getPriorityClass(p){ return p==='P1'?'badge-p1':p==='P2'?'badge-p2':p==='P3'?'badge-p3':'badge-p4'; }

function buildSidebar(){
  const nav=document.getElementById('sidebarNav');
  let html='<div class="nav-section">Navegacao</div>';
  html+='<div class="nav-item'+(currentView==='home'?' active':'')+'" onclick="showHome()">Visao Geral</div>';
  if(currentUserAdmin) html+='<div class="nav-item'+(currentView==='admin'?' active':'')+'" onclick="showAdmin()">Painel Admin</div>';
  html+='<div class="nav-section" style="margin-top:12px">10 Epics</div>';
  EPICS.forEach(e=>{
    if(currentFilter!=='all' && e.priority!==currentFilter) return;
    const stories=getEpicStories(e.id);
    const matchesSearch=!searchTerm||e.title.toLowerCase().includes(searchTerm)||stories.some(s=>s.title.toLowerCase().includes(searchTerm));
    if(!matchesSearch) return;
    const expanded=expandedEpics[e.id];
    html+='<div class="nav-item'+(currentView==='epic'&&currentEpicId===e.id?' active':'')+'" onclick="showEpic('+e.id+')"><span>'+e.num+' '+e.title+'</span><span class="nav-badge '+getNavBadgeClass(e.priority)+'">'+e.priority+'</span></div>';

      });
    }
  });
  nav.innerHTML=html;
}

  stories.forEach(s=>{
    const tac=s.ac.length;const cac=s.ac.filter(x=>x.c).length;const pct=tac?Math.round(cac/tac*100):0;
    html+='<div class="story-card" onclick="showStory(\''+s.id+'\')"><div class="sc-title">'+s.id+' -- '+s.title+'</div><div class="sc-meta"><span class="badge '+getSizeClass(s.size)+'">'+s.size+'</span><span class="badge badge-agent">'+s.agent+'</span><span class="badge badge-draft">'+s.status+'</span><span style="font-size:.68em;color:var(--text3);margin-left:auto">AC: '+pct+'%</span></div></div>';
  });
  html+='</div></div>';
  document.getElementById('content').innerHTML=html;
  buildSidebar();
  closeSidebar();
  window.scrollTo(0,0);
}

async function showStory(id){
  currentView='story';currentStoryId=id;
  const s=STORIES.find(x=>x.id===id);
  const e=EPICS.find(x=>x.id===s.epicId);
  currentEpicId=e.id;
  expandedEpics[e.id]=true;
  document.getElementById('topbarTitle').textContent='Story '+s.id+' -- '+s.title;

  // Load data from Supabase
  await loadChecksForStory(s.id);
  await loadNotesForStory(s.id);
  await loadTasksForStory(s.id);
  if (currentUserAdmin && viewMode === 'all') {
    await loadAllChecksForStory(s.id);
    await loadAllNotesForStory(s.id);
  }

  let html='<div style="margin-bottom:12px"><button class="topbar-back" onclick="showEpic('+e.id+')">Voltar ao Epic '+e.num+'</button></div>';
  html+='<div class="detail-header"><h1>Story '+s.id+' -- '+s.title+'</h1><div class="detail-badges"><span class="badge '+getPriorityClass(s.priority)+'">'+s.priority+'</span><span class="badge '+getSizeClass(s.size)+'">'+s.size+'</span><span class="badge badge-agent">'+s.agent+'</span><span class="badge badge-draft">'+s.status+'</span></div><div class="detail-meta"><span>Epic: '+e.num+' -- '+e.title+'</span></div></div>';

  // Admin view toggle
  if (currentUserAdmin) {
    html+='<div class="view-toggle"><button class="'+(viewMode==='mine'?'active':'')+'" onclick="toggleViewMode(\'mine\')">Meus checks</button><button class="'+(viewMode==='all'?'active':'')+'" onclick="toggleViewMode(\'all\')">Ver de todos</button></div>';
  }

  html+='<div class="section-block"><h2>Descricao</h2><p>'+s.desc+'</p></div>';
  const tac=s.ac.length;let cac=0;s.ac.forEach((a,i)=>{if(getCheckState(s.id,'ac',i))cac++;});
  html+='<div class="section-block"><h2>Acceptance Criteria ('+cac+'/'+tac+')</h2>';
  s.ac.forEach((a,i)=>{html+='<div class="ac-item">'+renderCheckbox(a.c,s.id,'ac',i)+'<span>'+a.t+'</span></div>';});
  html+='</div>';
  const ttask=s.tasks.length;
  const taskCounts = getTaskStatusCounts(s.id, s.tasks);
  const taskSummaryParts = [];
  if (taskCounts.done > 0) taskSummaryParts.push('<span style="color:var(--green)">' + taskCounts.done + ' concluida' + (taskCounts.done > 1 ? 's' : '') + '</span>');
  if (taskCounts.in_progress > 0) taskSummaryParts.push('<span style="color:var(--cyan)">' + taskCounts.in_progress + ' em andamento</span>');
  if (taskCounts.blocked > 0) taskSummaryParts.push('<span style="color:var(--red)">' + taskCounts.blocked + ' bloqueada' + (taskCounts.blocked > 1 ? 's' : '') + '</span>');
  if (taskCounts.pending > 0) taskSummaryParts.push('<span style="color:var(--text3)">' + taskCounts.pending + ' pendente' + (taskCounts.pending > 1 ? 's' : '') + '</span>');
  const taskSummary = taskSummaryParts.join(' / ') + ' de ' + ttask;
  html+='<div class="section-block"><h2>Tasks Tecnicas (' + ttask + ')</h2>';
  html+='<div class="tasks-summary">' + taskSummary + '</div>';
  s.tasks.forEach((t,i)=>{html+=renderTaskCard(s.id, t, i);});
  html+='</div>';
  html+='<div class="section-block"><h2>Dependencias</h2><ul>'+s.deps.map(d=>'<li>'+d+'</li>').join('')+'</ul></div>';
  html+='<div class="section-block"><h2>Riscos e Mitigacao</h2><table><tr><th>Risco</th><th>Mitigacao</th></tr>'+s.risks.map(r=>'<tr><td>'+r.r+'</td><td>'+r.m+'</td></tr>').join('')+'</table></div>';

  // Notes section
  const savedNotes=getNotes(s.id);
  html+='<div class="notes-section"><h3>Notas / Entrevistas / Observacoes</h3>';
  html+='<textarea id="notes-'+s.id+'" class="notes-textarea" placeholder="Registre aqui informacoes de entrevistas, observacoes, decisoes tomadas...">'+savedNotes.replace(/</g,'&lt;')+'</textarea>';
  html+='<button class="notes-save" onclick="saveNotes(\''+s.id+'\')">Salvar Notas</button>';
  html+='<span id="notes-saved-'+s.id+'" class="notes-saved">Salvo!</span>';
  html+='</div>';

  // Admin: show all users' notes
  if (currentUserAdmin && viewMode === 'all') {
    await loadAllNotesForStory(s.id);
    const allNotes = allNotesCache[s.id] || [];
    if (allNotes.length > 0) {
      html+='<div class="others-notes"><h4>Notas de todos os usuarios</h4>';
      allNotes.forEach(n => {
        const color = getUserColor(n.user_id);
        html+='<div class="admin-note-item"><div class="note-author"><span class="user-color" style="background:'+color+'"></span> '+n.user_name.replace(/</g,'&lt;')+'<span class="note-date">'+formatDate(n.updated_at)+'</span></div><div class="note-content">'+n.content.replace(/</g,'&lt;')+'</div></div>';
      });
      html+='</div>';
    }
  }

  document.getElementById('content').innerHTML=html;
  buildSidebar();
  closeSidebar();
  window.scrollTo(0,0);
}

function scrollToSection(id){
  const el=document.getElementById('sec-'+id);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}
function filterAndScrollToEpics(priority){
  // Filtra sidebar pela prioridade e navega ao primeiro epic dessa prioridade
  currentFilter=priority;
  document.querySelectorAll('.filter-chip').forEach(c=>{
    c.classList.toggle('active',c.textContent.trim()===priority);
  });
  buildSidebar();
  const firstEpic=EPICS.find(e=>e.priority===priority);
  if(firstEpic) showEpic(firstEpic.id);
}
function handleSearch(val){
  searchTerm=val.toLowerCase();
  buildSidebar();
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  buildSidebar();
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar(){
  if(window.innerWidth<=900){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
}

// ========================================================
// ADMIN PANEL
// ========================================================
async function showAdmin() {
  if (!currentUserAdmin) return;
  currentView = 'admin'; currentEpicId = null; currentStoryId = null;
  document.getElementById('topbarTitle').textContent = 'Painel Admin -- Visao Consolidada';

  let html = '<div class="detail-header"><h1>Painel Admin</h1><div class="detail-meta"><span>Visao consolidada de todos os usuarios</span></div></div>';

  // Load all checks and notes for all stories
  html += '<div class="section-block"><h2>Carregando dados...</h2></div>';
  document.getElementById('content').innerHTML = html;

  // Fetch ALL checks and notes in bulk
  try {
    const [allChecks, allNotes] = await Promise.all([
      supaFetch('portal_checks', 'GET', { query: '?select=user_id,story_id,check_type,check_index,checked&checked=eq.true' }),
      supaFetch('portal_notes', 'GET', { query: '?select=user_id,story_id,content,updated_at&order=updated_at.desc' })
    ]);

    html = '<div class="detail-header"><h1>Painel Admin</h1><div class="detail-meta"><span>Visao consolidada de todos os usuarios</span></div></div>';

    // Build per-story summary
    html += '<div class="section-block"><h2>Progresso por Story (com checks de todos)</h2>';
    EPICS.forEach(e => {
      const stories = getEpicStories(e.id);
      html += '<div style="margin-top:16px"><strong style="color:var(--accent2);font-size:.82em">Epic ' + e.num + ' -- ' + e.title + '</strong></div>';
      stories.forEach(s => {
        const storyChecks = allChecks.filter(c => c.story_id === s.id);
        // Group by user
        const byUser = {};
        storyChecks.forEach(c => {
          if (!byUser[c.user_id]) byUser[c.user_id] = { ac: 0, task: 0 };
          if (c.check_type === 'ac') byUser[c.user_id].ac++;
          else byUser[c.user_id].task++;
        });
        const userSummaries = Object.keys(byUser).map(uid =>
          '<span style="color:' + getUserColor(uid) + ';font-size:.72em;font-weight:600">' +
          getUserName(uid).split(' ')[0] + ' (AC:' + byUser[uid].ac + '/' + s.ac.length + ', T:' + byUser[uid].task + '/' + s.tasks.length + ')</span>'
        ).join(' | ');

        html += '<div style="padding:6px 0;border-bottom:1px solid rgba(42,42,74,.3);font-size:.82em;cursor:pointer" onclick="showStory(\'' + s.id + '\')">';
        html += '<span style="color:var(--text)">' + s.id + ' -- ' + s.title + '</span><br>';
        html += userSummaries || '<span style="font-size:.72em;color:var(--text3)">Nenhum check registrado</span>';
        html += '</div>';
      });
    });
    html += '</div>';

    // All notes section
    const storiesWithNotes = {};
    allNotes.forEach(n => {
      if (!storiesWithNotes[n.story_id]) storiesWithNotes[n.story_id] = [];
      storiesWithNotes[n.story_id].push(n);
    });

    html += '<div class="section-block"><h2>Todas as Notas</h2>';
    if (Object.keys(storiesWithNotes).length === 0) {
      html += '<p style="color:var(--text3);font-size:.82em">Nenhuma nota registrada ainda.</p>';
    } else {
      Object.keys(storiesWithNotes).forEach(storyId => {
        const s = STORIES.find(x => x.id === storyId);
        if (!s) return;
        html += '<div class="admin-user-section"><h3 onclick="showStory(\'' + storyId + '\')" style="cursor:pointer">' + storyId + ' -- ' + s.title + '</h3>';
        storiesWithNotes[storyId].forEach(n => {
          const color = getUserColor(n.user_id);
          html += '<div class="admin-note-item"><div class="note-author"><span class="user-color" style="background:' + color + '"></span> ' + getUserName(n.user_id).replace(/</g, '&lt;') + '<span class="note-date">' + formatDate(n.updated_at) + '</span></div><div class="note-content">' + (n.content || '').replace(/</g, '&lt;') + '</div></div>';
        });
        html += '</div>';
      });
    }
    html += '</div>';

  } catch(e) {
    html = '<div class="section-block"><h2>Erro ao carregar dados</h2><p>' + e.message + '</p></div>';
  }

  document.getElementById('content').innerHTML = html;
  buildSidebar();
  closeSidebar();
  window.scrollTo(0, 0);
}
