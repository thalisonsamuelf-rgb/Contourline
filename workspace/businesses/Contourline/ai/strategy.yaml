metadata:
  version: '1.0'
  company_name: Contourline
  product_name: egio_roberto
  status: IN_PROGRESS
  last_updated: '2026-03-14'
  owner: CAIO / Egio Roberto (CEO)
  notes: 'CEO tem background de programacao e visao clara de onde IA agrega valor.

    Problema atual: uso fragmentado, sem coordenacao.

    Meta: sistema coordenado de agentes para marketing + financeiro.

    '
strategy_scope:
  primary_objectives:
  - Sistema coordenado de IA (sair de acoes isoladas)
  - Reduzir folha de R$700-800k/mes em 30%
  - Automatizar marketing (14 pessoas)
  - Automatizar gestao financeira (complementar Totvs)
  - SDR com IA funcional (ja tentou, 'apanhando')
  - Compliance Anvisa com IA (Chat PDF ja em uso)
  target_capabilities:
  - Coordenacao de agentes entre areas
  - Marketing automatizado (criacao de conteudo, analise)
  - SDR/tratamento de leads com IA
  - Gestao financeira personalizada
  - Compliance/juridico com IA
  autonomy_level: medium-high — CEO quer sistema que ele valida mas opera autonomamente
  constraints:
    budget_monthly: FILL_THIS
    risk_tolerance: Medio — quer resultado mas e cetico saudavel ('parece bom demais')
    compliance:
    - Anvisa — todas as comunicacoes de equipamentos medicos devem seguir normas
model_policy:
  preferred_provider: FILL_THIS
  default_model: FILL_THIS
agent_topology:
  orchestration_pattern: AIOX — squads com agentes especializados
  specialist_squads:
  - Marketing Squad (14 pessoas a otimizar com IA)
  - Sales Squad (SDR com IA)
  - Finance Squad (complementar Totvs)
  - Compliance Squad (Chat PDF upgrade)
  escalation_rules:
  - CEO aprova decisoes estrategicas
  - Diretor financeiro aprova gastos
  human_in_the_loop: CEO para validacao estrategica, diretor financeiro para aprovacao de pagamentos
use_cases:
  priority_1:
    name: Marketing Coordenado com IA
    success_metric: Producao de conteudo 3x sem aumentar time
    owner: Head de Marketing
    current_state: 14 pessoas, acoes isoladas com IA
    desired_state: Squad de marketing com agentes coordenados
  priority_2:
    name: SDR com IA
    success_metric: Leads qualificados tratados automaticamente
    owner: Head Comercial
    current_state: Apanhando — tentou mas nao funciona
    desired_state: SDR autonomo que qualifica e encaminha leads
  priority_3:
    name: Gestao Financeira com IA
    success_metric: Relatorios automaticos, previsibilidade
    owner: Diretor Financeiro
    current_state: Totvs — funcional mas limitado
    desired_state: Totvs + IA personalizada para insights e automacao
  priority_4:
    name: Compliance Anvisa com IA
    success_metric: Consultas normativas automatizadas
    owner: Juridico
    current_state: Chat PDF para consultas pontuais
    desired_state: Agente especializado em normativas Anvisa
cross_references:
