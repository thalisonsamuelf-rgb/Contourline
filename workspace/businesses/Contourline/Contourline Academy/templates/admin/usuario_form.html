{% extends "base.html" %}
{% block title %}Novo Usuario - Contourline DB{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <a href="{{ url_for('admin_usuarios') }}" class="btn btn-sm btn-outline-secondary mb-3">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>

    <div class="form-container">
        <h4 class="mb-4">Novo Usuario</h4>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Nome *</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Email *</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Cargo *</label>
                    <select name="cargo" class="form-select" required>
                        <option value="vendedor">Vendedor</option>
                        <option value="tecnico">Tecnico</option>
                        <option value="marketing">Marketing</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Senha *</label>
                    <input type="password" name="senha" class="form-control" minlength="6" required>
                    <div class="form-text">Minimo 6 caracteres</div>
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Criar Usuario
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
