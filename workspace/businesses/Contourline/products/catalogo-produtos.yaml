        aplicacao: Avaliacao corporal — composicao, postura, medidas
        status: ACTIVE

  indiba:
    nome: Indiba
    tipo: Fabricante parceiro
    total_produtos: 1
    produtos:
      - nome: Reverso
        tecnologia: Radiofrequencia fracionada com microagulhas (VPP — Variable Pulse Profile + VSP — Very Sharp Pin 15 graus)
        aplicacao: Resurfacing cutaneo, cicatrizes (incluindo pos-acne), estrias, remodelacao tecidual
        descricao: RF fracionada com energia constante durante o pulso. Agulhas ultrafinas a 15 graus penetram ate 1mm de profundidade. Emite pulsos a cada segundo cobrindo ~2cm2 por pulso. Energia de ate 10W por pino. Adequado para todos os tipos de pele. Design premiado internacionalmente.
        diferencial: Tecnologia VPP (energia constante) + agulhas VSP (15 graus) para penetracao precisa
        status: ACTIVE

