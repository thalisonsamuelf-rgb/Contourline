    Lumenis representa 24% da receita (R$ 47M) mas com margem de apenas 9%,
    sinalizando necessidade de revisao estrategica de precificacao para
    equilibrar volume e rentabilidade.
  insight_3: |
    Visbody apresenta a combinacao ideal de crescimento com rentabilidade
    (62% de margem) no seu lancamento oficial no Brasil, representando
    oportunidade significativa de expansao.
  insight_4: |
    Empresa em crescimento acelerado (40% YoY) com divida controlada
    (1.97x Divida Liquida/EBITDA) e EBITDA robusto de R$ 51M (33% de margem).
  insight_5: |
    Fraquezas identificadas em processos manuais, baixa automatizacao e
    dependencia de pessoas-chave representam riscos ao crescimento de 40%
    projetado, requerendo investimento em tecnologia e gestao.
