# =============================================================================
validation:
  required_decisions:
    - "identified_level: 4 (Product Aware)"
    - "identified_stage: 4 (Master)"
  validation_checks:
    - "[x] Level and stage both selected (no null values)"
    - "[x] Confidence assessments provided (85% and 80%)"
    - "[x] Reasoning explains the assessment with market evidence"
  status: "VALIDATED"
