# SOP Factory - Elite Standard Operating Procedures Squad v1.0
# Squad Configuration

name: gerador-pop
version: "1.0.0"
description: "Elite SOP creation, extraction, analysis, grading and AI-optimization squad. Creates world-class SOPs for humans and AI agents based on Deming, Gawande, Juran, Toyota, ISO 9001, FDA/GMP, and Six Sigma methodologies."
entry_agent: pop-chief
author: "AIOX Team"
created_at: "2026-03-09"
tested: true

pack:
  name: gerador-pop
  title: "SOP Factory - Elite Process Documentation Squad"
  version: "1.0.0"
  author: "AIOX Team"
  description: "Creates, extracts, analyzes, grades and converts SOPs using the world's best process documentation methodologies. Dual-output: human-readable and AI/ML-consumable formats."
  icon: "&#x2699;"
  slash_prefix: "sop"

metadata:
  version: "1.0.0"
  score: 9.0

# ==============================================================================
# SQUAD TYPE & INTEGRATION
# ==============================================================================
squad_type: pipeline
# pipeline = Sequential flow: Input -> Process -> Quality Gate -> Output

expert_dna_sources:
  - name: "W. Edwards Deming"
    domain: "Quality Management, PDCA Cycle, System of Profound Knowledge"
    applied_to: "Overall squad philosophy, continuous improvement loops"
  - name: "Atul Gawande"
    domain: "Checklist Manifesto, surgical safety checklists"
    applied_to: "Checklist design, simplicity principles, safety-critical SOPs"
  - name: "Joseph Juran"
    domain: "Quality Trilogy (Planning, Control, Improvement)"
    applied_to: "SOP lifecycle management, quality gates"
  - name: "Taiichi Ohno"
    domain: "Toyota Production System, Lean Manufacturing, Gemba"
    applied_to: "Process extraction, waste elimination, standardized work"
  - name: "Michael Gerber"
    domain: "E-Myth, Business Systematization"
    applied_to: "Franchise-ready SOPs, work ON the system"
  - name: "Philip Crosby"
    domain: "Zero Defects, Quality is Free"
    applied_to: "SOP quality auditing, conformance standards"
  - name: "ISO 9001:2015"
    domain: "Quality Management Systems"
    applied_to: "Document control, process approach, risk-based thinking"
  - name: "FDA 21 CFR Part 11 / GMP"
    domain: "Pharmaceutical SOP Gold Standard"
    applied_to: "Regulated SOP format, version control, approval workflows"
  - name: "Six Sigma DMAIC"
    domain: "Define-Measure-Analyze-Improve-Control"
    applied_to: "SOP analysis methodology, statistical process control"

mmos_integration:
  enabled: false
  fallback_behavior: "graceful"

workspace_integration:
  level: controlled_runtime_consumer
  rationale: >-
    SOP Factory remains shared-safe by default, but it can consume canonical
    business operations context when the COO resolves readiness for an explicit
    business. Portable docs mode remains the default whenever readiness is not
    proven or the command has no business context.
  read_paths:
    - workspace/workspace.yaml
    - workspace/businesses/
    - workspace/_templates/operations/
  write_paths: []
  readiness_owner: coo-orchestrator
  readiness_resolver: squads/c-level/scripts/resolve-squad-workspace-readiness.cjs
  readiness_context_type: operations

distribution_contract:
  shared_default_access_tier: opensource
  environment_contract_script: squads/gerador-pop/scripts/resolve-environment-contract.cjs
  default_runtime_mode: portable_docs_mode
  docs_projection_path: docs/squad/gerador-pop/operational-projection.yaml
  shared_safe_outputs_root: outputs/gerador-pop/
  full_workspace_requires:
    - access tier resolved to pro or enterprise
    - canonical COO readiness support for the operations context
    - explicit business/product/app context when required
  enterprise_assumptions_allowed: false

# ==============================================================================
# AGENTS
# ==============================================================================
agents:
  - id: pop-chief
    name: "SOP Chief"
    role: "Squad orchestrator and SOP lifecycle coordinator"
    tier: orchestrator
    specialty: "Routes requests, coordinates agents, enforces quality standards"

  - id: pop-analista
    name: "SOP Analyst"
    role: "Analyzes and grades existing SOPs"
    tier: 1
    specialty: "Multi-dimensional SOP scoring, gap detection, compliance assessment"

  - id: pop-criador
    name: "SOP Creator"
    role: "Creates human-readable SOPs from scratch"
    tier: 1
    specialty: "FDA/GMP-grade process documentation, visual SOPs, decision trees"

  - id: pop-ml-arquiteto
    name: "SOP ML Architect"
    role: "Creates machine-readable/AI-consumable SOPs"
    tier: 1
    specialty: "YAML/JSON structured SOPs, state machines, agent-executable procedures"

  - id: pop-extrator
    name: "SOP Extractor"
    role: "Extracts SOPs from existing processes"
    tier: 1
    specialty: "Process mining, tribal knowledge capture, unstructured-to-structured conversion"

  - id: pop-auditor
    name: "SOP Auditor"
    role: "Quality gate and compliance validation"
    tier: 2
    specialty: "ISO 9001/FDA audit, zero-defect validation, remediation planning"

# ==============================================================================
# TASKS
# ==============================================================================
tasks:
  # --- Creation ---
  - id: create-sop-human
    name: "Create Human-Readable SOP"
    category: creation
    description: "Create a complete SOP optimized for human consumption"

  - id: create-sop-ml
    name: "Create AI/ML-Readable SOP"
    category: creation
    description: "Create a structured SOP for AI agent consumption (YAML/JSON)"

  - id: create-checklist
    name: "Create Checklist from SOP"
    category: creation
    description: "Generate operational checklist from existing SOP"

  # --- Analysis ---
  - id: analyze-sop
    name: "Analyze & Grade SOP"
    category: analysis
    description: "Multi-dimensional analysis and scoring of an existing SOP"

  - id: benchmark-sop
    name: "Benchmark SOP Against Standards"
    category: analysis
    description: "Compare SOP against ISO/FDA/industry gold standards"

  # --- Extraction ---
  - id: extract-sop
    name: "Extract SOP from Process"
    category: extraction
    description: "Extract structured SOP from unstructured process description"

  - id: extract-from-video
    name: "Extract SOP from Video/Transcript"
    category: extraction
    description: "Convert video tutorial or transcript into structured SOP"

  - id: structured-interview
    name: "Structured Interview for Process Extraction"
    category: extraction
    description: "5-phase structured interview protocol for extracting SOP-ready process knowledge"

  # --- Conversion ---
  - id: convert-sop-format
    name: "Convert SOP Format"
    category: conversion
    description: "Convert between human-readable and ML formats"

  # --- Audit ---
  - id: audit-sop
    name: "Full SOP Audit"
    category: audit
    description: "Comprehensive compliance and quality audit"

  - id: audit-batch
    name: "Batch SOP Audit"
    category: audit
    description: "Audit multiple SOPs at once with comparative scoring"

  - id: compliance-check
    name: "Compliance Check"
    category: audit
    description: "Check SOP against a specific compliance standard"

  - id: re-audit
    name: "Re-Audit SOP"
    category: audit
    description: "Re-audit after remediation and compare findings"

  - id: certify-sop
    name: "Certify SOP"
    category: audit
    description: "Issue formal SOP certification when audit gates pass"


# ==============================================================================
# WORKFLOWS
# ==============================================================================
workflows:
  - id: wf-sop-creation-pipeline
    name: "SOP Creation Pipeline"
    category: creation
    description: "End-to-end SOP creation: gather requirements -> draft -> review -> refine -> validate -> publish"

  - id: wf-sop-audit-pipeline
    name: "SOP Audit Pipeline"
    category: audit
    description: "Full audit: ingest -> analyze -> score -> benchmark -> remediate -> certify"

  - id: wf-sop-extraction-pipeline
    name: "SOP Extraction Pipeline"
    category: extraction
    description: "Extract: capture input -> identify steps -> structure -> validate -> format -> publish"

# ==============================================================================
# TEMPLATES
# ==============================================================================
templates:
  - id: sop-human-tmpl
    name: "Human-Readable SOP Template"

  - id: sop-ml-tmpl
    name: "AI/ML-Readable SOP Template"

  - id: sop-analysis-report-tmpl
    name: "SOP Analysis Report Template"

  - id: sop-scorecard-tmpl
    name: "SOP Scorecard Template"

  - id: checklist-from-sop-tmpl
    name: "Checklist Generation Template"

  - id: certification-template
    name: "SOP Certification Template"

# ==============================================================================
# CHECKLISTS
# ==============================================================================
checklists:
  - id: sop-quality-checklist
    name: "SOP Quality Checklist"

  - id: sop-completeness-checklist
    name: "SOP Completeness Checklist"

  - id: sop-ml-validation-checklist
    name: "SOP ML/AI Validation Checklist"

# ==============================================================================
# DATA (Knowledge Bases)
# ==============================================================================
data:
  - id: sop-scoring-rubric
    name: "SOP Scoring Rubric"
    description: "10-dimension scoring rubric with weights and signal definitions"

  - id: sop-standards-reference
    name: "SOP Standards Reference"
    description: "Cross-reference of ISO 9001, FDA/GMP, TPS, Six Sigma requirements"

  - id: sop-ml-schema
    name: "SOP ML Schema Definition"
    description: "YAML/JSON schema for machine-readable SOPs"

# ==============================================================================
# DEPENDENCIES & TAGS
# ==============================================================================
dependencies:
  squads:
    - aiox-core

tags:
  - sop
  - standard-operating-procedures
  - process-documentation
  - quality-management
  - iso-9001
  - fda-gmp
  - six-sigma
  - lean
  - toyota-production-system
  - checklist
  - ai-readable-sop
  - machine-learning
  - process-extraction
  - compliance
  - audit
  - deming
  - gawande
  - juran
