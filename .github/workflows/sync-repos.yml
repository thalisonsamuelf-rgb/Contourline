name: Sync — Pull Source & Propagate to Business Repos

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync Source → Template → Business Repos
    runs-on: ubuntu-latest

    env:
      SOURCE_REPO: oalanicolas/aiox-imersao
      SYNC_FILES: "AGENTS.md pro-installed-manifest.yaml pro-version.json"
      SYNC_DIRS: "squads"
      TEMPLATE_FILES: ".env .env.example .gitignore"
      FRAMEWORK_DIRS: ".agent .aiox-core .antigravity .claude .codex .cursor .gemini .github"

    steps:
      # ── Phase 1: Checkout source and template ─────────────────────────
      - name: Checkout source (oalanicolas/aiox-imersao)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.AIOXSQUAD_PAT }}
          path: source

      - name: Checkout template (this repo)
        uses: actions/checkout@v4
        with:
          path: template
          token: ${{ secrets.AIOXSQUAD_PAT }}

      - name: Get source commit info
        id: source
        run: |
          cd source
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      # ── Phase 2: Sync source → template ───────────────────────────────
      - name: Sync source → template
        run: |
          for dir in $SYNC_DIRS; do
            rm -rf "template/$dir"
            cp -a "source/$dir" "template/$dir"
          done

          for file in $SYNC_FILES; do
            if [ -f "source/$file" ]; then
              cp "source/$file" "template/$file"
            fi
          done

      - name: Commit & push template
        run: |
          cd template
          git config user.name "AIOXsquad-bot"
          git config user.email "aioxsquad-bot@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "template_changed=false" >> "$GITHUB_ENV"
            echo "✅ Template already up to date — skipping propagation"
            exit 0
          fi

          git add -A
          git commit -m "sync: update from source (${{ steps.source.outputs.short_sha }} ${{ steps.source.outputs.message }})"
          git push
          echo "template_changed=true" >> "$GITHUB_ENV"
          echo "✅ Template updated and pushed"

      # ── Phase 3: Propagate template → business repos ──────────────────
      - name: Re-checkout template (fresh state)
        if: env.template_changed == 'true'
        uses: actions/checkout@v4
        with:
          path: template-fresh
          token: ${{ secrets.AIOXSQUAD_PAT }}

      - name: Propagate to business repos
        if: env.template_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.AIOXSQUAD_PAT }}
        run: |
          BUSINESSES=(
            brasil_em_dobro conta_magic daniel_tenorio ecossistema_builder
            eduardo_colautti eu_medico_residente grupo_fabio_avelar grupo_scalco
            grupo_wv italo_gustavo level8_herobase matheus_vinicius
            mentoria_andre_franco nexos_educacao nutraself omni_hypnosis
            optimus_isystem youfront
          )

          TPL="template-fresh"
          COMMIT_MSG="sync: update from template (${{ steps.source.outputs.short_sha }} ${{ steps.source.outputs.message }})"
          SYNCED=0
          FAILED=0
          SKIPPED=0

          for biz in "${BUSINESSES[@]}"; do
            echo ""
            echo "── $biz ──"

            if ! git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/AIOXsquad/${biz}.git" "repos/$biz" 2>/dev/null; then
              echo "❌ Clone failed"
              FAILED=$((FAILED + 1))
              continue
            fi

            cd "repos/$biz"

            # Sync squads/
            for dir in squads; do
              rm -rf "$dir"
              cp -a "../../$TPL/$dir" "$dir"
            done

            # Sync root files from source
            for file in AGENTS.md pro-installed-manifest.yaml pro-version.json; do
              if [ -f "../../$TPL/$file" ]; then
                cp "../../$TPL/$file" "$file"
              fi
            done

            # Sync template-only files
            for file in .env .env.example .gitignore; do
              if [ -f "../../$TPL/$file" ]; then
                cp "../../$TPL/$file" "$file"
              fi
            done

            # Sync framework dirs (NEVER touch workspace/)
            for dir in .agent .aiox-core .antigravity .claude .codex .cursor .gemini .github; do
              if [ -d "../../$TPL/$dir" ]; then
                rm -rf "$dir"
                cp -a "../../$TPL/$dir" "$dir"
              fi
            done

            git config user.name "AIOXsquad-bot"
            git config user.email "aioxsquad-bot@users.noreply.github.com"

            if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
              echo "⏭️  Already up to date"
              SKIPPED=$((SKIPPED + 1))
              cd ../..
              continue
            fi

            git add -A
            git add --force .env 2>/dev/null || true
            git commit -q -m "$COMMIT_MSG"

            if git push -q; then
              echo "✅ Synced and pushed"
              SYNCED=$((SYNCED + 1))
            else
              echo "❌ Push failed"
              FAILED=$((FAILED + 1))
            fi

            cd ../..
          done

          echo ""
          echo "============================================"
          echo "  🚀 $SYNCED pushed, ⏭️ $SKIPPED up-to-date, ❌ $FAILED failed"
          echo "  Total: ${#BUSINESSES[@]} repos"
          echo "============================================"

          if [ $FAILED -gt 0 ]; then
            exit 1
          fi
